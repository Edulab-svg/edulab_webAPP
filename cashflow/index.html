<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>資金繰り・預金残高管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f0f2f5;--sidebar:#1e2a3a;--sidebar-hover:#2d3f55;
  --primary:#2563eb;--primary-h:#1d4ed8;
  --success:#16a34a;--danger:#dc2626;--warning:#d97706;
  --card:#fff;--border:#e2e8f0;--text:#1e293b;--text-sub:#64748b;
  --header-h:52px;--sidebar-w:210px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Meiryo,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
button{cursor:pointer}
button:disabled{cursor:not-allowed;opacity:.45}

/* Layout */
header{position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;z-index:100;gap:12px}
header .logo{font-weight:700;font-size:15px;color:var(--primary)}
aside{position:fixed;top:var(--header-h);left:0;bottom:0;width:var(--sidebar-w);
  background:var(--sidebar);overflow-y:auto;z-index:99;padding:10px 0}
aside .nav-item{display:flex;align-items:center;gap:10px;padding:11px 18px;
  color:#cbd5e1;font-size:13px;cursor:pointer;transition:background .15s}
aside .nav-item:hover,aside .nav-item.active{background:var(--sidebar-hover);color:#fff}
aside .nav-sep{padding:10px 18px 4px;font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.08em}
main{margin-top:var(--header-h);margin-left:var(--sidebar-w);padding:22px;min-height:calc(100vh - var(--header-h))}

/* Card */
.card{background:var(--card);border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:18px 20px;margin-bottom:18px}
.card-title{font-size:14px;font-weight:600;margin-bottom:14px}
.page-title{font-size:19px;font-weight:700;margin-bottom:18px;color:var(--text)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:18px}
.kpi{background:var(--card);border-radius:10px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.kpi .label{font-size:11px;color:var(--text-sub);margin-bottom:5px}
.kpi .value{font-size:22px;font-weight:700}
.kpi .sub{font-size:11px;color:var(--text-sub);margin-top:3px}
.kpi.income .value{color:var(--success)}
.kpi.expense .value{color:var(--danger)}
.kpi.net-plus .value{color:var(--primary)}
.kpi.net-minus .value{color:var(--danger)}

/* Alert */
.alert-item{padding:9px 13px;border-radius:7px;margin-bottom:7px;font-size:13px;display:flex;align-items:center;gap:7px}
.alert-item.danger{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.alert-item.warning{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.no-alert{color:var(--text-sub);font-size:13px}

/* Grid table */
.grid-wrap{overflow-x:auto}
/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.year-nav{display:flex;align-items:center;gap:5px}
.year-nav button{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:#fff;font-size:13px}
.year-nav button:hover{background:var(--bg)}
.year-nav span{font-weight:700;min-width:55px;text-align:center}
.tab-group{display:flex;gap:2px;background:var(--bg);border-radius:7px;padding:3px}
.tab-btn{padding:5px 16px;border:none;border-radius:5px;background:transparent;font-size:13px;font-weight:500;color:var(--text-sub)}
.tab-btn.active{background:#fff;color:var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* Forms */
.form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group label{font-size:11px;color:var(--text-sub);font-weight:500}
.form-group input,.form-group select{padding:7px 10px;border:1px solid var(--border);
  border-radius:6px;font-size:13px;background:#fff}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary)}

/* Buttons */
.btn{padding:7px 16px;border-radius:6px;border:none;font-size:13px;font-weight:500}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-h)}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#15803d}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--text)}.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:4px 10px;font-size:12px}

/* Master table */
.master-table{width:100%;border-collapse:collapse;font-size:13px}
.master-table th,.master-table td{border:1px solid var(--border);padding:8px 12px}
.master-table th{background:#f8fafc;font-weight:600}
.master-table tr:hover td{background:#fafafa}
.master-table .cell-reorder{white-space:nowrap;text-align:center;vertical-align:middle}
.master-table .cell-reorder .btn-sm{min-width:34px;padding:4px 6px}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-income{background:#dcfce7;color:#15803d}
.badge-expense{background:#fee2e2;color:#b91c1c}
.badge-op{background:#dbeafe;color:#1d4ed8}
.badge-inv{background:#fef9c3;color:#854d0e}
.badge-fin{background:#f3e8ff;color:#7e22ce}

/* Balance */
.balance-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:16px}
.balance-card{background:var(--card);border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:15px 17px}
.balance-card h3{font-size:13px;font-weight:600;color:var(--primary);margin-bottom:4px}
.balance-card .bank{font-size:11px;color:var(--text-sub);margin-bottom:10px}
.balance-amount{font-size:21px;font-weight:700;text-align:right}
.balance-date{font-size:11px;color:var(--text-sub);text-align:right;margin-top:2px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);
  z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:26px;width:440px;max-width:96vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:15px;font-weight:700;margin-bottom:18px}
.modal .form-group{margin-bottom:11px}
.modal-footer{display:flex;justify-content:flex-end;gap:9px;margin-top:18px}

/* Toast */
#toast{position:fixed;bottom:22px;right:22px;padding:9px 16px;border-radius:8px;
  background:#1e293b;color:#fff;font-size:13px;z-index:9999;
  opacity:0;pointer-events:none;transition:opacity .25s}
#toast.show{opacity:1}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text-sub);gap:10px}
.spinner{width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--primary);
  border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Daily CF grid */
.daily-grid{border-collapse:collapse;font-size:12px;min-width:max-content;width:100%}
.daily-grid th,.daily-grid td{border:1px solid var(--border);padding:3px 5px;white-space:nowrap}
.daily-grid th{background:#f8fafc;font-weight:600;text-align:center;font-size:11px;line-height:1.4}
.daily-grid th.sticky-col,.daily-grid td.sticky-col{
  position:sticky;left:0;z-index:2;background:inherit}
.daily-grid th.sticky-col{background:#f8fafc;z-index:3}
.daily-grid .income-row td{background:#f0fdf4}
.daily-grid .expense-row td{background:#fff5f5}
.daily-grid .total-row td{font-weight:700;background:#f1f5f9}
.daily-grid .net-row td{font-weight:800;background:#eff6ff;font-size:13px}
.daily-grid .bal-row td{background:#fafafa;font-size:11px;color:var(--text-sub)}
.daily-grid td.sticky-col{font-weight:500}
.daily-grid .income-row td.sticky-col{background:#f0fdf4}
.daily-grid .expense-row td.sticky-col{background:#fff5f5}
.daily-grid .total-row td.sticky-col{background:#f1f5f9}
.daily-grid .net-row td.sticky-col{background:#eff6ff}
.daily-grid .bal-row td.sticky-col{background:#fafafa}
.daily-grid input[type=number]{border:none;background:transparent;width:72px;
  text-align:right;font-size:12px;outline:none;padding:2px 3px;
  -moz-appearance:textfield;appearance:textfield}
.daily-grid input[type=number]::-webkit-outer-spin-button,
.daily-grid input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.daily-grid input[type=number]:focus{background:#dbeafe;border-radius:3px}
.daily-grid .num{text-align:right}
.daily-grid .sat{color:var(--primary)}
.daily-grid .sun{color:var(--danger)}
.daily-grid .today-col th,.daily-grid .today-col td{background:#fef9c3 !important}
.daily-grid tr.income-row.daily-cf-row-active td{background:#bbf7d1 !important}
.daily-grid tr.expense-row.daily-cf-row-active td{background:#fecaca !important}
.daily-grid tr.income-row.daily-cf-row-active td.sticky-col{background:#86efac !important}
.daily-grid tr.expense-row.daily-cf-row-active td.sticky-col{background:#f87171 !important;color:#1e293b !important}
.daily-grid .daily-cf-bal-td{text-align:right;vertical-align:middle;white-space:nowrap}
.daily-grid .daily-bal-cell-amt{display:inline}
.daily-grid .daily-bal-to-input{padding:2px 8px;font-size:10px;margin-left:4px;vertical-align:middle;line-height:1.2}

/* 予定残高アラート */
.daily-grid td.plan-bal-alert-cell{background:#fef2f2 !important;color:#dc2626 !important;font-weight:600}
.plan-bal-alert-banner{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;
  border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;line-height:1.5}
</style>
</head>
<body>

<header>
  <span class="logo">💰 資金繰り・預金残高管理</span>
</header>

<aside>
  <div class="nav-sep">メイン</div>
  <div class="nav-item active" onclick="nav('dashboard')" data-p="dashboard">📈 予定残高グラフ</div>
  <div class="nav-item" onclick="nav('daily')" data-p="daily">📅 日次CF</div>
  <div class="nav-item" onclick="nav('balance')" data-p="balance">🏦 預金残高</div>
  <div class="nav-sep">設定</div>
  <div class="nav-item" onclick="nav('categories')" data-p="categories">🗂 科目マスタ</div>
  <div class="nav-item" onclick="nav('accounts')" data-p="accounts">💳 口座マスタ</div>
  <div class="nav-item" onclick="nav('alerts')" data-p="alerts">🔔 アラート設定</div>
</aside>

<main id="mc"></main>

<!-- Category Modal -->
<div class="modal-overlay" id="cat-modal">
  <div class="modal">
    <h2 id="cat-modal-ttl">科目</h2>
    <input type="hidden" id="cat-id">
    <div class="form-group"><label>種別</label>
      <select id="cat-type"><option value="income">収入</option><option value="expense">支出</option></select>
    </div>
    <div class="form-group"><label>CF区分</label>
      <select id="cat-cf">
        <option value="operating">営業活動</option>
        <option value="investing">投資活動</option>
        <option value="financing">財務活動</option>
      </select>
    </div>
    <div class="form-group"><label>科目名</label><input type="text" id="cat-name"></div>
    <div class="form-group"><label>並び順</label><input type="number" id="cat-sort" value="0"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeM('cat-modal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveCat()">保存</button>
    </div>
  </div>
</div>

<!-- 日次CFテンプレート Modal -->
<div class="modal-overlay" id="cdt-modal">
  <div class="modal">
    <h2 id="cdt-modal-ttl">日次テンプレート</h2>
    <input type="hidden" id="cdt-id" value="">
    <div class="form-group"><label>科目</label>
      <select id="cdt-cat"></select>
    </div>
    <div class="form-group"><label>日（1〜31・31は短い月は月末）</label>
      <input type="number" id="cdt-dom" min="1" max="31" value="1">
    </div>
    <div class="form-group"><label>金額（円・予定）</label>
      <input type="number" id="cdt-amt" min="0" value="" placeholder="0">
    </div>
    <div class="form-group"><label>メモ（任意・空なら反映時「テンプレート反映」）</label>
      <input type="text" id="cdt-memo" maxlength="255">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeM('cdt-modal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveCdt()">保存</button>
    </div>
  </div>
</div>

<!-- Account Modal -->
<div class="modal-overlay" id="acc-modal">
  <div class="modal">
    <h2 id="acc-modal-ttl">口座</h2>
    <input type="hidden" id="acc-id">
    <div class="form-group"><label>口座名</label><input type="text" id="acc-name"></div>
    <div class="form-group"><label>金融機関名</label><input type="text" id="acc-bank"></div>
    <div class="form-group"><label>並び順</label><input type="number" id="acc-sort" value="0"></div>
    <div class="form-group"><label>状態</label>
      <select id="acc-active"><option value="1">有効</option><option value="0">無効</option></select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeM('acc-modal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveAcc()">保存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
//  API helper
// ============================================================
const API = 'api/index.php';

async function apiGet(action, params={}) {
  const qs = new URLSearchParams({action, ...params, _t: Date.now()});
  const r  = await fetch(`${API}?${qs}`, {headers:{'Cache-Control':'no-cache'}});
  const j  = await r.json();
  if (!j.success) throw new Error(j.error||'API error');
  return j;
}
async function apiPost(action, data={}) {
  const r = await fetch(API, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({action, ...data})
  });
  const j = await r.json();
  if (!j.success) throw new Error(j.error||'API error');
  return j;
}

// ============================================================
//  UI helpers
// ============================================================
const mc = () => document.getElementById('mc');
let planBalDashChart = null;
let planBalDashYear = new Date().getFullYear(), planBalDashMonth = new Date().getMonth() + 1;
let _dailyStickyCleanup = null;
function loading() {
  if (planBalDashChart) { planBalDashChart.destroy(); planBalDashChart = null; }
  if (typeof _dailyStickyCleanup === 'function') { _dailyStickyCleanup(); _dailyStickyCleanup = null; }
  mc().innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中…</div>';
}
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = (type==='ok'?'✅ ':'❌ ') + msg;
  el.style.background = type==='ok' ? '#16a34a' : '#dc2626';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}
function openM(id)  { document.getElementById(id).classList.add('open') }
function closeM(id) { document.getElementById(id).classList.remove('open') }
const fmt = n => (n==null ? '' : Number(n).toLocaleString('ja-JP'));
const cfL = {operating:'営業',investing:'投資',financing:'財務'};

// ============================================================
//  アラート閾値キャッシュ
// ============================================================
let _alertThresholdCache = undefined; // undefined=未取得, null=無効/未設定, number=閾値

async function getAlertThreshold() {
  if (_alertThresholdCache !== undefined) return _alertThresholdCache;
  try {
    const d = await apiGet('alerts_list');
    const a = d.alerts.find(x => x.alert_type === 'plan_balance_low' && parseInt(x.is_active));
    _alertThresholdCache = (a != null && Number.isFinite(parseInt(a.threshold, 10)))
      ? parseInt(a.threshold, 10) : null;
  } catch { _alertThresholdCache = null; }
  return _alertThresholdCache;
}

function invalidateAlertCache() { _alertThresholdCache = undefined; }

// ============================================================
//  Navigation
// ============================================================
const pages = {};
function nav(p) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.p===p));
  loading();
  pages[p] && pages[p]();
}
window.addEventListener('DOMContentLoaded', () => nav('dashboard'));

// ============================================================
//  予定残高グラフ（日次CFの「予定残高」行と同一計算）
// ============================================================
pages.dashboard = () => renderPlanBalDashboard();

async function renderPlanBalDashboard() {
  loading();
  try {
    const [carryIn, d, threshold] = await Promise.all([
      planCarryInFromPreviousMonthEnd(planBalDashYear, planBalDashMonth),
      apiGet('daily_grid', { year: planBalDashYear, month: planBalDashMonth }),
      getAlertThreshold()
    ]);
    const { days, planBalMap, balMap, hasPlanBal } = deriveDailyPlanBalanceFromApi(d, carryIn);
    const ymLabel = `${planBalDashYear}年${planBalDashMonth}月`;

    if (planBalDashChart) {
      planBalDashChart.destroy();
      planBalDashChart = null;
    }

    const labels   = days.map(dt => `${parseInt(dt.slice(8), 10)}日`);
    const planData = days.map(dt => (planBalMap[dt] != null ? planBalMap[dt] : null));
    const actData  = days.map(dt => (balMap[dt]     != null ? balMap[dt]     : null));

    // アラート判定
    const alertDays = threshold !== null
      ? days.filter(dt => planBalMap[dt] != null && planBalMap[dt] < threshold)
      : [];
    const minBal = alertDays.length > 0
      ? Math.min(...alertDays.map(dt => planBalMap[dt])) : null;
    const alertBanner = alertDays.length > 0 ? `
      <div class="plan-bal-alert-banner">
        ⚠️ <strong>${alertDays.length}日間</strong>の予定残高が警戒ライン（¥${fmt(threshold)}）を下回っています
        （最小: ¥${fmt(minBal)}）
      </div>` : '';

    const noPlan = !hasPlanBal;
    mc().innerHTML = `
      <div class="page-title">📈 予定残高グラフ</div>
      ${alertBanner}
      <div class="toolbar">
        <div class="year-nav">
          <button type="button" data-mc-nav="planbal-month" data-dir="prev">◀</button>
          <span>${ymLabel}</span>
          <button type="button" data-mc-nav="planbal-month" data-dir="next">▶</button>
        </div>
        <span style="font-size:12px;color:var(--text-sub)">日次CFの「予定残高」と同じ計算です。<strong>前月末の予定残高</strong>を翌月1日目に引き継ぎ、その月は日次の予定収支差を積み上げます。前月もデータがない場合のみ、当月で最初に実残高がある日を起点にします。</span>
      </div>
      ${noPlan ? `<div class="card"><p style="color:var(--text-sub);line-height:1.6">${ymLabel}では予定残高を表示できません。前月までに予定の積み上げが始まっているか、または当月に<strong>預金残高</strong>の実残高（起点）を1日以上入力してください。</p></div>` : ''}
      <div class="card" style="${noPlan ? 'opacity:.45' : ''}">
        <div class="card-title">予定残高の推移（${ymLabel}）</div>
        <div style="position:relative;height:min(420px,55vh);min-height:260px">
          <canvas id="planbal-chart"></canvas>
        </div>
      </div>`;

    if (noPlan) return;

    // ポイント色: 閾値未満の日を赤に
    const pointColors = planData.map(v =>
      threshold !== null && v !== null && v < threshold ? '#dc2626' : '#2563eb'
    );

    const datasets = [
      {
        label: '予定残高',
        data: planData,
        borderColor: '#2563eb',
        backgroundColor: 'rgba(37,99,235,.12)',
        fill: true,
        tension: 0.25,
        borderWidth: 2,
        pointRadius: planData.map(v => v != null ? 3 : 0),
        pointHoverRadius: 5,
        pointBackgroundColor: pointColors,
        pointBorderColor: pointColors,
        spanGaps: false
      },
      {
        label: '実残高（入力がある日のみ）',
        data: actData,
        borderColor: '#64748b',
        backgroundColor: 'transparent',
        fill: false,
        tension: 0.2,
        borderWidth: 2,
        borderDash: [6, 4],
        pointRadius: 2,
        pointHoverRadius: 5,
        spanGaps: true
      }
    ];

    // 閾値ラインを赤い点線データセットとして追加
    if (threshold !== null) {
      datasets.push({
        label: `警戒ライン（¥${fmt(threshold)}）`,
        data: days.map(() => threshold),
        borderColor: '#dc2626',
        backgroundColor: 'transparent',
        fill: false,
        tension: 0,
        borderWidth: 1.5,
        borderDash: [5, 4],
        pointRadius: 0,
        pointHoverRadius: 0,
        order: 99
      });
    }

    const ctx = document.getElementById('planbal-chart');
    planBalDashChart = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: true, position: 'bottom', labels: { boxWidth: 12, padding: 16 } },
          tooltip: {
            callbacks: {
              label(ctx) {
                const v = ctx.raw;
                if (v == null) return `${ctx.dataset.label}: —`;
                return `${ctx.dataset.label}: ¥${fmt(v)}`;
              }
            }

function dailyCfFocusIn(ev) {

  if (!inp || inp.tagName !== 'INPUT' || inp.type !== 'number') return;

  if (!tr || (!tr.classList.contains('income-row') && !tr.classList.contains('expense-row'))) return;
  tr.classList.add('daily-cf-row-active');
}
function dailyCfFocusOut(ev) {
  const inp = ev.target;
  if (!inp || inp.tagName !== 'INPUT') return;
  const tr = inp.closest('tr');
  if (!tr || !tr.classList.contains('daily-cf-row-active')) return;
  const rel = ev.relatedTarget;
  if (rel && tr.contains(rel)) return;
  tr.classList.remove('daily-cf-row-active');
}

/** 列順はそのままに、横スクロールで当日列が科目列のすぐ右付近に来るようにする */
function scrollDailyGridToTodayIfApplicable() {
  const wrap = document.querySelector('#mc .grid-wrap');
  const table = wrap?.querySelector('table.daily-grid');
  if (!wrap || !table) return;
  const todayTh = table.querySelector('thead th.today-col');
  const stickyTh = table.querySelector('thead th.sticky-col');
  if (!todayTh || !stickyTh) return;

}

function setDailyCfSectionFilter(mode) {

}

function applyDailyCfSectionFilter() {
  const table = document.querySelector('#mc .daily-grid');
  const bar = document.querySelector('#daily-cf-filter');
  if (!table) return;
  const showInc = dailyCfSectionFilter === 'all' || dailyCfSectionFilter === 'income';
  const showExp = dailyCfSectionFilter === 'all' || dailyCfSectionFilter === 'expense';
  table.querySelectorAll('.daily-cf-block-inc').forEach(tr => { tr.style.display = showInc ? '' : 'none'; });
  table.querySelectorAll('.daily-cf-block-exp').forEach(tr => { tr.style.display = showExp ? '' : 'none'; });
  if (bar) {
    bar.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === dailyCfSectionFilter);
    });
  }
}

function dailyCfVisibleDataRows() {
  return [...document.querySelectorAll('#mc .daily-grid tbody tr.income-row, #mc .daily-grid tbody tr.expense-row')]
    .filter(tr => tr.style.display !== 'none');
}

function dailyCfMoveFromInput(inp, dir) {
  const tr = inp.closest('tr');
  if (!tr) return;
  const rowInputs = [...tr.querySelectorAll('input[type=number][data-date][data-cid]')];
  const idxInRow = rowInputs.indexOf(inp);
  if (dir === 'left' && idxInRow > 0) {
    rowInputs[idxInRow - 1].focus();
    return;
  }
  if (dir === 'right' && idxInRow >= 0 && idxInRow < rowInputs.length - 1) {
    rowInputs[idxInRow + 1].focus();
    return;
  }
  const date = inp.dataset.date;
  if (!date) return;
  const dataRows = dailyCfVisibleDataRows();
  const ri = dataRows.indexOf(tr);
  if (dir === 'up' && ri > 0) {
    const prev = dataRows[ri - 1].querySelector(`input[type=number][data-date="${date}"][data-cid]`);
    if (prev) prev.focus();
    return;
  }
  if (dir === 'down' && ri >= 0 && ri < dataRows.length - 1) {
    const next = dataRows[ri + 1].querySelector(`input[type=number][data-date="${date}"][data-cid]`);
    if (next) next.focus();
  }
}

function dailyCfKeydown(ev) {
  const inp = ev.target;
  if (!inp || inp.tagName !== 'INPUT' || inp.type !== 'number' || !inp.closest('.daily-grid')) return;
  const k = ev.key;
  if (k !== 'ArrowLeft' && k !== 'ArrowRight' && k !== 'ArrowUp' && k !== 'ArrowDown') return;
  ev.preventDefault();
  const dir = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' }[k];
  dailyCfMoveFromInput(inp, dir);
}

/** 口座ごとに「その日以前の最新残高」を足し合わせた日別合計（入力が無い日は前回までの合計を表示） */
function buildDailyBalanceCarryForwardMap(days, balances) {
  const byAcc = {};
  (balances || []).forEach(b => {
    const aid = String(b.account_id);
    if (!byAcc[aid]) byAcc[aid] = [];
    byAcc[aid].push({ date: b.balance_date, bal: parseInt(b.balance, 10) || 0 });
  });
  Object.keys(byAcc).forEach(aid => {
    byAcc[aid].sort((x, y) => x.date.localeCompare(y.date));
  });
  const accIds = Object.keys(byAcc);
  const balMap = {};
  if (!accIds.length) return balMap;

  for (const dt of days) {
    let sum = 0;
    let any = false;
    for (const aid of accIds) {
      const rows = byAcc[aid];
      let best = null;
      for (let i = 0; i < rows.length; i++) {
        if (rows[i].date <= dt) best = rows[i];
        else break;
      }
      if (best !== null) {
        sum += best.bal;
        any = true;
      }
    }
    if (any) balMap[dt] = sum;
  }
  return balMap;
}

/** 前月末の予定残高をメモ化（再計算削減。日次セル保存・テンプレ反映後は clear する） */
const monthEndPlanMemo = new Map();

function invalidateMonthEndPlanMemo() {
  monthEndPlanMemo.clear();
}

function prevCalendarYearMonth(y, m) {
  if (m <= 1) return { y: y - 1, m: 12 };
  return { y, m: m - 1 };
}

/**
 * 指定月末日時点の予定残高（前月からの引き継ぎ込みで算出）
 * @param {number} depthRemain さかのぼる最大月数（API負荷防止）
 */
async function monthEndPlanBalance(year, month, depthRemain = 36) {
  const key = `${year}-${month}`;
  if (monthEndPlanMemo.has(key)) return monthEndPlanMemo.get(key);

  let carryIn = null;
  if (depthRemain > 0) {
    const p = prevCalendarYearMonth(year, month);
    carryIn = await monthEndPlanBalance(p.y, p.m, depthRemain - 1);
  }

  const d = await apiGet('daily_grid', { year, month });
  const der = deriveDailyPlanBalanceFromApi(d, carryIn);
  const lastDt = der.days.length ? der.days[der.days.length - 1] : null;
  const endVal = lastDt != null && der.planBalMap[lastDt] != null ? der.planBalMap[lastDt] : null;
  monthEndPlanMemo.set(key, endVal);
  return endVal;
}

/** 当月1日目に引き継ぐ値＝前月末の予定残高 */
async function planCarryInFromPreviousMonthEnd(year, month) {
  const p = prevCalendarYearMonth(year, month);
  return monthEndPlanBalance(p.y, p.m);
}

/**
 * 日次グリッドAPIレスポンスから予定の日次合計・実残高・予定残高を算出
 * @param {number|null|undefined} carryInFromPrevMonthEnd 前月末の予定残高（あれば1日目から日次差引を積み上げ）
 */
function deriveDailyPlanBalanceFromApi(d, carryInFromPrevMonthEnd = null) {
  const days = d.days;
  const eMap = {};
  d.entries.forEach(e => {
    if (!eMap[e.category_id]) eMap[e.category_id] = {};
    if (!eMap[e.category_id][e.entry_date]) eMap[e.category_id][e.entry_date] = { plan: 0, actual: 0 };
    eMap[e.category_id][e.entry_date][e.entry_type] =
      (eMap[e.category_id][e.entry_date][e.entry_type] || 0) + (parseInt(e.amount, 10) || 0);
  });
  const balMap = buildDailyBalanceCarryForwardMap(days, d.balances);
  const income = d.categories.filter(c => c.type === 'income');
  const expense = d.categories.filter(c => c.type === 'expense');
  const dayIncTot = {}, dayExpTot = {};
  days.forEach(dt => { dayIncTot[dt] = 0; dayExpTot[dt] = 0; });
  income.forEach(cat => {
    days.forEach(dt => { dayIncTot[dt] += (eMap[cat.id]?.[dt]?.plan) || 0; });
  });
  expense.forEach(cat => {
    days.forEach(dt => { dayExpTot[dt] += (eMap[cat.id]?.[dt]?.plan) || 0; });
  });

  const planBalMap = {};
  let running =
    carryInFromPrevMonthEnd != null && Number.isFinite(carryInFromPrevMonthEnd)
      ? carryInFromPrevMonthEnd
      : null;

  for (const dt of days) {
    if (running === null) {
      if (balMap[dt] != null) {
        running = balMap[dt];
        planBalMap[dt] = running;
      }
    } else {
      running += (dayIncTot[dt] - dayExpTot[dt]);
      planBalMap[dt] = running;
    }
  }

  const baseDate = days.find(dt => balMap[dt] != null);
  const hasPlanBal = days.some(dt => planBalMap[dt] != null);
  const carryInUsed =
    carryInFromPrevMonthEnd != null && Number.isFinite(Number(carryInFromPrevMonthEnd))
      ? Number(carryInFromPrevMonthEnd)
      : null;

  return { days, eMap, dayIncTot, dayExpTot, balMap, planBalMap, baseDate, hasPlanBal, carryInUsed };
}

// ============================================================
//  日次CFグリッド: スクロール同期型スティッキーヘッダー
//  overflow-x:auto コンテナ内でも確実に動作する JS 実装
// ============================================================
function setupStickyDailyHeader() {
  const wrap  = document.querySelector('#mc .grid-wrap');
  const table = wrap?.querySelector('.daily-grid');
  if (!wrap || !table) return null;
  const thead = table.querySelector('thead');
  if (!thead) return null;

  // 固定表示用オーバーレイを body 直下に作成
  const overlay = document.createElement('div');
  overlay.id = 'daily-sticky-hdr';
  Object.assign(overlay.style, {
    position: 'fixed', zIndex: '50', overflow: 'hidden',
    visibility: 'hidden', pointerEvents: 'none',
    boxShadow: '0 2px 6px rgba(0,0,0,.1)'
  });

  const cloneTable = document.createElement('table');
  cloneTable.className = 'daily-grid';
  Object.assign(cloneTable.style, {
    position: 'absolute', top: '0', left: '0',
    tableLayout: 'fixed', borderCollapse: 'collapse', borderSpacing: '0', margin: '0'
  });
  const cloneThead = thead.cloneNode(true);
  cloneTable.appendChild(cloneThead);
  overlay.appendChild(cloneTable);
  document.body.appendChild(overlay);

  const HEADER_H = parseInt(
    getComputedStyle(document.documentElement).getPropertyValue('--header-h')
  ) || 52;
  let widthsSynced = false;

  function syncWidths() {
    const origThs  = thead.querySelectorAll('th');
    const cloneThs = cloneThead.querySelectorAll('th');
    let totalW = 0;
    origThs.forEach((o, i) => {
      const w = o.getBoundingClientRect().width;
      totalW += w;
      if (cloneThs[i]) {
        cloneThs[i].style.width    = w + 'px';
        cloneThs[i].style.minWidth = w + 'px';
        cloneThs[i].style.maxWidth = w + 'px';
      }
    });
    cloneTable.style.width = totalW + 'px';
    widthsSynced = true;
  }

  function update() {
    const wr = wrap.getBoundingClientRect();
    const tr = thead.getBoundingClientRect();
    const show = tr.top < HEADER_H && wr.bottom > HEADER_H + 20;

    if (show && !widthsSynced) syncWidths();
    overlay.style.visibility   = show ? 'visible' : 'hidden';
    overlay.style.pointerEvents = show ? 'auto'   : 'none';
    if (!show) return;

    overlay.style.top    = HEADER_H + 'px';
    overlay.style.left   = wr.left + 'px';
    overlay.style.width  = wr.width + 'px';
    overlay.style.height = tr.height + 'px';
    cloneTable.style.transform = `translateX(${-wrap.scrollLeft}px)`;
  }

  const onResize = () => { widthsSynced = false; update(); };
  window.addEventListener('scroll',  update,   { passive: true });
  wrap.addEventListener(  'scroll',  update,   { passive: true });
  window.addEventListener('resize',  onResize, { passive: true });

  // 初回レイアウト確定後に幅を同期
  requestAnimationFrame(() => { syncWidths(); update(); });

  return function cleanup() {
    window.removeEventListener('scroll',  update);
    window.removeEventListener('resize',  onResize);
    wrap.removeEventListener(  'scroll',  update);
    overlay.remove();
  };
}

function dailyParseInputAmt(inp) {
  const s = String(inp.value ?? '').trim();
  if (s === '') return 0;
  return parseInt(s, 10) || 0;
}

function dailyParseBalCellText(txt) {
  const t = String(txt ?? '').trim();
  if (!t) return null;
  const n = parseInt(t.replace(/[^\d-]/g, ''), 10);
  return Number.isFinite(n) ? n : null;
}

/** 日次グリッドの入力値から、合計行・差引・予定残高・残高差額を再計算してDOM更新 */
function refreshDailyDerivedRows() {
  const table = document.querySelector('.daily-grid');
  if (!table || !table.dataset.days) return;
  const days = table.dataset.days.split('|');
  const dayIncTot = {}, dayExpTot = {};
  days.forEach(dt => { dayIncTot[dt] = 0; dayExpTot[dt] = 0; });

  table.querySelectorAll('tr.income-row input[data-date]').forEach(inp => {
    dayIncTot[inp.dataset.date] += dailyParseInputAmt(inp);
  });
  table.querySelectorAll('tr.expense-row input[data-date]').forEach(inp => {
    dayExpTot[inp.dataset.date] += dailyParseInputAmt(inp);
  });

  table.querySelectorAll('tr.income-row, tr.expense-row').forEach(tr => {
    let rowSum = 0;
    tr.querySelectorAll('input[data-date]').forEach(inp => { rowSum += dailyParseInputAmt(inp); });
    const cells = tr.querySelectorAll('td');
    const last = cells[cells.length - 1];
    if (last) last.textContent = rowSum ? fmt(rowSum) : '-';
  });

  const trInc = table.querySelector('tr[data-daily-summary="inc"]');
  if (trInc) {
    let sum = 0;
    const tds = trInc.querySelectorAll('td');
    days.forEach((dt, i) => {
      const v = dayIncTot[dt];
      sum += v;
      const td = tds[i + 1];
      if (td) {
        td.textContent = v ? fmt(v) : '-';
        td.style.color = 'var(--success)';
      }
    });
    const lastTd = tds[days.length + 1];
    if (lastTd) {
      lastTd.textContent = fmt(sum);
      lastTd.style.color = 'var(--success)';
    }
  }

  const trExp = table.querySelector('tr[data-daily-summary="exp"]');
  if (trExp) {
    let sum = 0;
    const tds = trExp.querySelectorAll('td');
    days.forEach((dt, i) => {
      const v = dayExpTot[dt];
      sum += v;
      const td = tds[i + 1];
      if (td) {
        td.textContent = v ? fmt(v) : '-';
        td.style.color = 'var(--danger)';
      }
    });
    const lastTd = tds[days.length + 1];
    if (lastTd) {
      lastTd.textContent = fmt(sum);
      lastTd.style.color = 'var(--danger)';
    }
  }

  const trNet = table.querySelector('tr[data-daily-summary="net"]');
  if (trNet) {
    const tds = trNet.querySelectorAll('td');
    days.forEach((dt, i) => {
      const net = dayIncTot[dt] - dayExpTot[dt];
      const td = tds[i + 1];
      if (td) {
        td.textContent = net ? fmt(net) : '-';
        td.style.color = net > 0 ? 'var(--primary)' : net < 0 ? 'var(--danger)' : 'inherit';
      }
    });
  }

  const trBal = table.querySelector('tr[data-daily-summary="bal"]');
  const balMap = {};
  if (trBal) {
    const tds = trBal.querySelectorAll('td');
    days.forEach((dt, i) => {
      const td = tds[i + 1];
      if (!td) return;
      const amtEl = td.querySelector('.daily-bal-cell-amt');
      const raw = amtEl ? amtEl.textContent : td.textContent;
      const v = dailyParseBalCellText(raw);
      if (v != null) balMap[dt] = v;
    });
  }

  const carryRaw = table.dataset.planCarryIn;
  let carryIn = null;
  if (carryRaw !== undefined && carryRaw !== '') {
    const n = parseInt(carryRaw, 10);
    if (!Number.isNaN(n)) carryIn = n;
  }

  const planBalMap = {};
  let running = carryIn;
  for (const dt of days) {
    if (running === null) {
      if (balMap[dt] != null) {
        running = balMap[dt];
        planBalMap[dt] = running;
      }
    } else {
      running += (dayIncTot[dt] - dayExpTot[dt]);
      planBalMap[dt] = running;
    }
  }

  const thresholdRaw = table.dataset.alertThreshold;
  const alertThreshold = (thresholdRaw !== undefined && thresholdRaw !== '')
    ? parseInt(thresholdRaw, 10) : null;

  const trPlan = table.querySelector('tr[data-daily-summary="plan-bal"]');
  if (trPlan) {
    const tds = trPlan.querySelectorAll('td');
    days.forEach((dt, i) => {
      const td = tds[i + 1];
      if (!td) return;
      const p = planBalMap[dt];
      const isAlert = alertThreshold !== null && p != null && p < alertThreshold;
      td.textContent = p != null ? (isAlert ? '⚠ ' : '') + '¥' + fmt(p) : '';
      td.classList.toggle('plan-bal-alert-cell', isAlert);
    });
  }

  const trDiff = table.querySelector('tr[data-daily-summary="bal-diff"]');
  if (trDiff) {
    const tds = trDiff.querySelectorAll('td');
    days.forEach((dt, i) => {
      const td = tds[i + 1];
      if (!td) return;
      const a = balMap[dt];
      const p = planBalMap[dt];
      if (a == null || p == null) {
        td.textContent = '';
        td.style.color = '';
        return;
      }
      const diff = a - p;
      const color = diff > 0 ? 'var(--primary)' : diff < 0 ? 'var(--danger)' : 'inherit';
      const sign = diff > 0 ? '+' : '';
      td.textContent = sign + fmt(diff);
      td.style.color = color;
    });
  }
}

function parseYearMonthInput(v) {
  const m = /^(\d{4})-(\d{2})$/.exec(String(v || '').trim());
  if (!m) return null;
  const y = parseInt(m[1], 10);
  const mo = parseInt(m[2], 10);
  if (mo < 1 || mo > 12) return null;
  return { y, m: mo };
}

async function applyDailyTemplates() {
  const from = new Date().toISOString().slice(0, 10);
  const elF = document.getElementById('dapply-ym-from');
  const elT = document.getElementById('dapply-ym-to');
  const start = parseYearMonthInput(elF?.value);
  const end = parseYearMonthInput(elT?.value);
  if (!start || !end) {
    toast('反映範囲の開始月・終了月を選んでください', 'err');
    return;
  }
  if (start.y * 12 + start.m > end.y * 12 + end.m) {
    toast('開始月は終了月以前にしてください', 'err');
    return;
  }
  const rangeLabel =
    start.y === end.y && start.m === end.m
      ? `${start.y}年${start.m}月`
      : `${start.y}年${start.m}月 ～ ${end.y}年${end.m}月`;
  if (!confirm(
    `${rangeLabel} の範囲で、${from} 以降の日について、テンプレートに合う「予定がまだ0円のセル」だけに金額を入れます。既に予定があるセルはスキップします。よろしいですか？`
  )) return;
  try {
    const r = await apiPost('daily_apply_templates', {
      year: start.y,
      month: start.m,
      to_year: end.y,
      to_month: end.m,
      from_date: from,
      only_empty: true
    });
    invalidateMonthEndPlanMemo();
    toast(`テンプレート反映: 適用 ${r.applied} 件／スキップ ${r.skipped} 件`);
    renderDailyCF();
  } catch (e) { toast(e.message, 'err'); }
}

async function saveDailyCell(inp) {
  try {
    const raw = String(inp.value ?? '').trim();
    const amt = raw === '' ? 0 : (parseInt(raw, 10) || 0);
    const last = parseInt(inp.dataset.lastSaved || '0', 10) || 0;
    if (amt === last) return;

    await apiPost('daily_cell_save', {
      category_id: inp.dataset.cid,
      entry_date:  inp.dataset.date,
      entry_type:  inp.dataset.dtype,
      amount:      amt
    });
    invalidateMonthEndPlanMemo();
    inp.dataset.lastSaved = String(amt);
    inp.value = amt > 0 ? String(amt) : '';
    refreshDailyDerivedRows();
    inp.style.background = '#bbf7d0';
    setTimeout(() => inp.style.background = '', 700);
  } catch(e) { toast(e.message, 'err'); }
}

  const d = await apiGet('alerts_list');

  mc().innerHTML = `
    <div class="page-title">🔔 アラート設定</div>
    ${d.alerts.map(a=>`
      <div class="card">
        <div class="card-title">${typeLabel[a.alert_type]||a.alert_type}</div>

          </div>
          <div class="form-group"><label>警戒ライン（円）</label>
            <input type="number" id="al-thr-${a.id}" value="${a.threshold}" style="width:140px">

        </div>
      </div>`).join('')}`;
}

async function saveAlert(id) {
  try {
    await apiPost('alert_save', {
      id,
      label:     document.getElementById(`al-lbl-${id}`).value,
      threshold: document.getElementById(`al-thr-${id}`).value,
      is_active: document.getElementById(`al-act-${id}`).value
    });
    invalidateAlertCache();
    toast('保存しました');
  } catch(e) { toast(e.message,'err'); }
}

// 年月ナビは innerHTML の onclick だと let 変数と解決できない環境があるため、#mc へ委譲する
(function initMcNavDelegation() {
  const root = document.getElementById('mc');
  if (!root) return;
  root.addEventListener('click', (e) => {
    // ボタン内のテキスト（◀▶）直クリックだと target が Text ノードで closest が無い
    const el = e.target instanceof Element ? e.target : e.target.parentElement;
    const t = el && el.closest('[data-mc-nav]');
    if (!t) return;
    const kind = t.dataset.mcNav;
    if (kind === 'bal-month') {
      if (t.dataset.dir === 'prev') {
        balM--;
        if (balM < 1) { balM = 12; balY--; }
      } else if (t.dataset.dir === 'next') {
        balM++;
        if (balM > 12) { balM = 1; balY++; }
      } else return;
      renderBal();
      return;
    }
    if (kind === 'daily-month') {
      if (t.dataset.dir === 'prev') {
        dailyMonth--;
        if (dailyMonth < 1) { dailyMonth = 12; dailyYear--; }
      } else if (t.dataset.dir === 'next') {
        dailyMonth++;
        if (dailyMonth > 12) { dailyMonth = 1; dailyYear++; }
      } else return;
      renderDailyCF();
      return;
    }
    if (kind === 'planbal-month') {
      if (t.dataset.dir === 'prev') {
        planBalDashMonth--;
        if (planBalDashMonth < 1) { planBalDashMonth = 12; planBalDashYear--; }
      } else if (t.dataset.dir === 'next') {
        planBalDashMonth++;
        if (planBalDashMonth > 12) { planBalDashMonth = 1; planBalDashYear++; }
      } else return;
      renderPlanBalDashboard();
    }
  });
})();
</script>
