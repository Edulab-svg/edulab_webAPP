<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まんてん個別 | 広告配布管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f5f7fa;
  --surface: #ffffff;
  --surface2: #f0f3f7;
  --border: #dde2ea;
  --text: #1a2030;
  --muted: #7a869a;
  --accent: #1a9e3f;
  --accent2: #1a6fd4;
  --accent3: #d4680a;
  --accent4: #7c3aed;
  --danger: #d93025;
  --posting-color: #1a6fd4;
  --oricom-color: #d4680a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

/* ─── TOP BAR ─── */
.top-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 24px; display: flex; align-items: center; height: 56px; gap: 16px;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.logo { font-size: 16px; font-weight: 700; color: var(--accent2); letter-spacing: .5px; flex-shrink: 0; }
.logo span { color: var(--muted); font-weight: 300; }
.sheet-tabs { display: flex; gap: 4px; overflow-x: auto; flex: 1; }
.sheet-tab {
  padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
  color: var(--muted); white-space: nowrap; transition: all .15s; border: 1px solid transparent;
}
.sheet-tab:hover { color: var(--text); background: var(--surface2); }
.sheet-tab.active { color: var(--accent2); background: rgba(26,111,212,.08); border-color: rgba(26,111,212,.3); }
.sheet-add-btn {
  padding: 5px 10px; border-radius: 6px; border: 1px dashed var(--border);
  background: none; color: var(--muted); cursor: pointer; font-size: 13px; white-space: nowrap;
  transition: all .15s;
}
.sheet-add-btn:hover { border-color: var(--accent2); color: var(--accent2); }

/* ─── NAV ─── */
.nav-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; }
.nav-tab {
  padding: 12px 20px; cursor: pointer; font-size: 13px; color: var(--muted);
  border-bottom: 2px solid transparent; transition: all .15s; display: flex; align-items: center; gap: 6px;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }

/* ─── MAIN ─── */
.main { padding: 24px; max-width: 1440px; margin: 0 auto; }

/* ─── STATS ─── */
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.stat-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.stat-value { font-size: 24px; font-weight: 700; font-family: 'DM Mono', monospace; }
.stat-value.green { color: var(--accent); }
.stat-value.blue  { color: var(--accent2); }
.stat-value.orange{ color: var(--accent3); }
.stat-value.purple{ color: var(--accent4); }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ─── TOOLBAR ─── */
.toolbar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
.search-box { flex: 1; min-width: 200px; position: relative; }
.search-box input {
  width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text);
  padding: 8px 12px 8px 36px; border-radius: 8px; font-size: 13px; font-family: inherit; transition: border-color .15s;
}
.search-box input:focus { outline: none; border-color: var(--accent2); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }
.filter-select {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  padding: 8px 12px; border-radius: 8px; font-size: 13px; font-family: inherit; cursor: pointer;
}
.filter-select:focus { outline: none; border-color: var(--accent2); }
.btn {
  padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
  font-size: 13px; font-family: inherit; font-weight: 500;
  display: inline-flex; align-items: center; gap: 6px; transition: all .15s; white-space: nowrap;
}
.btn-primary { background: var(--accent2); color: #fff; }
.btn-primary:hover { background: #1558b0; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }
.btn-danger { background: rgba(217,48,37,.08); color: var(--danger); border: 1px solid rgba(217,48,37,.25); }
.btn-danger:hover { background: rgba(217,48,37,.15); }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* ─── CLASSROOM CARD ─── */
.classroom-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  margin-bottom: 12px; overflow: hidden; transition: border-color .15s, box-shadow .15s;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.classroom-card:hover { border-color: #b0bdd0; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.classroom-header {
  padding: 16px 20px; display: flex; align-items: center; gap: 12px;
  cursor: pointer; user-select: none;
}
.classroom-name { font-size: 15px; font-weight: 600; flex: 1; }
.classroom-badge { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace; }
.badge-blue   { background: rgba(26,111,212,.1); color: var(--accent2); }
.badge-orange { background: rgba(212,104,10,.1);  color: var(--accent3); }
.badge-green  { background: rgba(26,158,63,.1);   color: var(--accent); }
.chevron { color: var(--muted); transition: transform .2s; font-size: 12px; }
.classroom-card.open .chevron { transform: rotate(90deg); }
.classroom-body { display: none; border-top: 1px solid var(--border); }
.classroom-card.open .classroom-body { display: block; }

/* ─── TABLE ─── */
.table-wrap { overflow-x: auto; }
.dist-table { width: 100%; border-collapse: collapse; min-width: 900px; }
.dist-table th {
  background: var(--surface2); color: var(--muted); font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .5px; padding: 10px 12px;
  text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap;
}
.dist-table td { padding: 9px 12px; border-bottom: 1px solid rgba(221,226,234,.6); font-size: 13px; vertical-align: middle; }
.dist-table tr:last-child td { border-bottom: none; }
.dist-table tbody tr:hover td { background: rgba(26,111,212,.03); }
.type-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.type-posting { background: rgba(26,111,212,.1); color: var(--posting-color); }
.type-oricom  { background: rgba(212,104,10,.1);  color: var(--oricom-color); }
.mono { font-family: 'DM Mono', monospace; }
.actions { display: flex; gap: 6px; }
.dist-subtotal td { background: var(--surface2); font-weight: 600; font-family: 'DM Mono', monospace; color: var(--accent3); border-top: 1px solid var(--border); }

/* ─── PRINTPACK ─── */
.pp-steps { display: flex; flex-direction: column; gap: 4px; min-width: 120px; }
.pp-step {
  display: flex; align-items: center; gap: 6px; font-size: 11px; cursor: pointer;
  padding: 3px 6px; border-radius: 4px; border: 1px solid transparent; transition: all .15s; user-select: none;
}
.pp-step:hover { background: rgba(26,111,212,.05); border-color: var(--border); }
.pp-check {
  width: 16px; height: 16px; border-radius: 4px; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 10px;
  flex-shrink: 0; transition: all .15s; background: var(--surface2);
}
.pp-step.checked .pp-check { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 900; }
.pp-step-label { color: var(--muted); font-size: 11px; }
.pp-step.checked .pp-step-label { color: var(--accent); }
.pp-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; font-family: 'DM Mono', monospace; }
.pp-pill-none    { background: rgba(122,134,154,.12); color: var(--muted); }
.pp-pill-partial { background: rgba(212,104,10,.1);   color: var(--accent3); }
.pp-pill-done    { background: rgba(26,158,63,.1);    color: var(--accent); }

/* ─── ADD-ROW FORM ─── */
.add-row-form { padding: 16px 20px; border-top: 1px solid var(--border); background: rgba(26,111,212,.02); display: none; }
.add-row-form.visible { display: block; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 10px; margin-bottom: 12px; }
.form-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
.form-group input, .form-group select {
  width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text);
  padding: 7px 10px; border-radius: 6px; font-size: 12px; font-family: inherit; transition: border-color .15s;
}
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent2); }
.form-actions { display: flex; gap: 8px; }

/* ─── CARD FOOTER ─── */
.card-footer { padding: 12px 16px; display: flex; gap: 8px; border-top: 1px solid var(--border); }

/* ─── CALENDAR ─── */
#calendarView { display: none; }
.calendar-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
.calendar-month { font-size: 20px; font-weight: 700; flex: 1; }
.calendar-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-day-header { text-align: center; padding: 8px; font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
.cal-day { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; min-height: 80px; padding: 6px; transition: border-color .15s; }
.cal-day:hover { border-color: #b0bdd0; }
.cal-day.other-month { opacity: .35; }
.cal-day.today { border-color: var(--accent2); }
.cal-day-num { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.cal-day.today .cal-day-num { color: var(--accent2); font-weight: 700; }
.cal-event { font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-event.delivery { background: rgba(26,111,212,.12); color: var(--accent2); }
.cal-event.order    { background: rgba(26,158,63,.12);   color: var(--accent); }
.cal-event.arrival  { background: rgba(212,104,10,.12);  color: var(--accent3); }
.legend { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }

/* ─── ANALYTICS ─── */
#analyticsView { display: none; }
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.chart-title { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: .5px; }
.chart-full { grid-column: 1 / -1; }
canvas { max-height: 280px; }

/* ─── MODAL ─── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.visible { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 580px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.15); }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

/* ─── TOAST ─── */
.toast {
  position: fixed; bottom: 24px; right: 24px; background: #1a2030; border: 1px solid #2d3a4a;
  border-radius: 8px; padding: 12px 20px; font-size: 13px; color: #fff;
  z-index: 2000; transform: translateY(100px); opacity: 0; transition: all .3s;
  display: flex; align-items: center; gap: 8px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: rgba(26,158,63,.6); }
.toast.error   { border-color: rgba(217,48,37,.6); }

/* ─── LOADING ─── */
.loading-overlay { display: none; position: fixed; inset: 0; background: rgba(245,247,250,.7); z-index: 500; align-items: center; justify-content: center; }
.loading-overlay.visible { display: flex; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent2); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── PP PROGRESS BAR (stats) ─── */
.pp-progress-bar { height: 4px; border-radius: 2px; background: var(--surface2); overflow: hidden; margin-top: 6px; }
.pp-progress-fill { height: 100%; border-radius: 2px; transition: width .4s; }

@media (max-width: 768px) {
  .stats-grid { grid-template-columns: repeat(2,1fr); }
  .chart-grid { grid-template-columns: 1fr; }
  .chart-full { grid-column: auto; }
  .main { padding: 16px; }
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<!-- Top Bar -->
<div class="top-bar">
  <div class="logo">まんてん個別 <span>/ 広告配布管理</span></div>
  <div class="sheet-tabs" id="sheetTabs"></div>
  <button class="sheet-add-btn" onclick="openAddSheetModal()">＋ 月追加</button>
</div>

<!-- Nav -->
<div class="nav-bar">
  <div class="nav-tab active" onclick="switchView('list',this)">📋 一覧</div>
  <div class="nav-tab" onclick="switchView('calendar',this)">📅 カレンダー</div>
  <div class="nav-tab" onclick="switchView('analytics',this)">📊 分析</div>
</div>

<!-- LIST VIEW -->
<div class="main" id="listView">
  <div class="stats-grid" id="statsGrid"></div>
  <div class="toolbar">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="教室名・業者名で検索..." oninput="applyFilters()">
    </div>
    <select class="filter-select" id="typeFilter" onchange="applyFilters()">
      <option value="">全種別</option>
      <option value="ポスティング">ポスティング</option>
      <option value="折込">折込</option>
    </select>
    <select class="filter-select" id="vendorFilter" onchange="applyFilters()">
      <option value="">全業者</option>
    </select>
    <button class="btn btn-primary" onclick="openAddClassroomModal()">＋ 教室追加</button>
  </div>
  <div id="classroomList"></div>
</div>

<!-- CALENDAR VIEW -->
<div class="main" id="calendarView">
  <div class="calendar-header">
    <button class="btn btn-secondary" onclick="changeMonth(-1)">◀</button>
    <div class="calendar-month" id="calMonthTitle"></div>
    <button class="btn btn-secondary" onclick="changeMonth(1)">▶</button>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:rgba(26,111,212,.5)"></div>配布日</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(26,158,63,.5)"></div>発注日</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(212,104,10,.5)"></div>到着日</div>
  </div>
  <div class="calendar-grid" id="calendarGrid"></div>
</div>

<!-- ANALYTICS VIEW -->
<div class="main" id="analyticsView">
  <div class="chart-grid">
    <div class="chart-card chart-full"><div class="chart-title">教室別 総費用</div><canvas id="chartByClassroom"></canvas></div>
    <div class="chart-card"><div class="chart-title">印刷費 vs 配布費</div><canvas id="chartCostBreakdown"></canvas></div>
    <div class="chart-card"><div class="chart-title">種別割合（部数）</div><canvas id="chartTypeRatio"></canvas></div>
    <div class="chart-card chart-full"><div class="chart-title">教室別 配布部数</div><canvas id="chartCopies"></canvas></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">✏️ 配布情報を編集</div>
    <div class="modal-grid" id="editFormGrid"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('editModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- ADD CLASSROOM MODAL -->
<div class="modal-overlay" id="addClassroomModal">
  <div class="modal">
    <div class="modal-title">＋ 新しい教室を追加</div>
    <div class="form-group" style="margin-bottom:16px">
      <label>教室名</label>
      <input type="text" id="newClassroomName" placeholder="例: 神戸教室">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('addClassroomModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="addClassroom()">追加</button>
    </div>
  </div>
</div>

<!-- ADD SHEET MODAL -->
<div class="modal-overlay" id="addSheetModal">
  <div class="modal">
    <div class="modal-title">＋ 新しい月シートを追加</div>
    <div class="form-group" style="margin-bottom:16px">
      <label>シート名</label>
      <input type="text" id="newSheetName" placeholder="例: 2026年5月配布">
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label>教室・配布情報をコピーする元の月</label>
      <select id="copySourceSheet" style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:13px;font-family:inherit;">
        <option value="">コピーしない（空で作成）</option>
      </select>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">※ 教室名・依頼先・部数などをコピーします。日付・費用・PPチェックはリセットされます。</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('addSheetModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="addSheet()">追加</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// STATE
// ============================================================
const API = 'api/index.php';
let sheets        = [];   // [{id, name, sort_order}]
let currentSheetId = null;
let classrooms    = [];   // [{id, name, distributions:[...]}]
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth() + 1;
let editTarget = null;    // {distId}
let charts = {};
let openCards = new Set(); // 開いているカードのciを記憶

// ============================================================
// API ヘルパー
// ============================================================
async function apiGet(params) {
  const qs = new URLSearchParams({ ...params, _t: Date.now() });
  const res = await fetch(`${API}?${qs}`);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'API Error');
  return json.data;
}

async function apiPost(body) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'API Error');
  return json.data;
}

function loading(show) {
  document.getElementById('loadingOverlay').classList.toggle('visible', show);
}

// ============================================================
// INIT
// ============================================================
async function init() {
  loading(true);
  try {
    sheets = await apiGet({ action: 'sheets' });
    if (!sheets.length) {
      // シートが1件もなければ案内
      document.getElementById('classroomList').innerHTML =
        '<div style="text-align:center;padding:60px;color:var(--muted)">「＋ 月追加」でシートを作成してください</div>';
      renderSheetTabs();
      loading(false);
      return;
    }
    currentSheetId = sheets[0].id;
    renderSheetTabs();
    await loadSheetData();
  } catch(e) {
    showToast('⚠️ ' + e.message, 'error');
  }
  loading(false);
}

async function loadSheetData() {
  loading(true);
  try {
    const data = await apiGet({ action: 'all', sheet_id: currentSheetId });
    classrooms = data.classrooms;
    renderStats();
    renderClassroomList();
    populateVendorFilter();
  } catch(e) {
    showToast('⚠️ ' + e.message, 'error');
  }
  loading(false);
}

// ============================================================
// SHEETS
// ============================================================
function renderSheetTabs() {
  const el = document.getElementById('sheetTabs');
  el.innerHTML = sheets.map(s =>
    `<div class="sheet-tab ${s.id===currentSheetId?'active':''}" onclick="selectSheet(${s.id})">
      ${s.name}
      <span onclick="event.stopPropagation();deleteSheet(${s.id})" style="margin-left:6px;color:var(--muted);font-size:11px;opacity:.5;transition:opacity .15s;" onmouseover="this.style.opacity=1;this.style.color='var(--danger)'" onmouseout="this.style.opacity=.5;this.style.color='var(--muted)'">✕</span>
    </div>`
  ).join('');
}

async function selectSheet(id) {
  currentSheetId = id;
  openCards.clear();
  renderSheetTabs();
  await loadSheetData();
  if (document.getElementById('analyticsView').style.display !== 'none') renderCharts();
}

function openAddSheetModal() {
  // コピー元リストを現在のシート一覧で更新
  const sel = document.getElementById('copySourceSheet');
  sel.innerHTML = '<option value="">コピーしない（空で作成）</option>' +
    sheets.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  document.getElementById('addSheetModal').classList.add('visible');
}

async function addSheet() {
  const name = document.getElementById('newSheetName').value.trim();
  if (!name) return;
  const copySourceId = parseInt(document.getElementById('copySourceSheet').value) || 0;
  try {
    // 新しいシートを作成
    const s = await apiPost({ action: 'add_sheet', name });
    sheets.push(s);
    closeModal('addSheetModal');
    document.getElementById('newSheetName').value = '';
    document.getElementById('copySourceSheet').value = '';
    currentSheetId = s.id;
    classrooms = [];

    // コピー元が指定されていればデータを複製
    if (copySourceId) {
      loading(true);
      try {
        const srcData = await apiGet({ action: 'all', sheet_id: copySourceId });
        const srcClassrooms = srcData.classrooms || [];
        for (const srcC of srcClassrooms) {
          // 教室を作成
          const newC = await apiPost({ action: 'add_classroom', sheet_id: s.id, name: srcC.name });
          // 各配布情報をコピー（日付・費用・PPはリセット）
          for (const srcD of srcC.distributions) {
            await apiPost({
              action: 'add_distribution',
              classroom_id: newC.id,
              type:      srcD.type,
              vendor:    srcD.vendor,
              copies:    srcD.copies,
              order_qty: srcD.order_qty,
              times:     srcD.times || 1,
              order_date: '', arrival_date: '', delivery_date: '',
              print_cost: srcD.print_cost,
              dist_cost:  srcD.dist_cost,
              total_cost: srcD.total_cost,
              campaign:   srcD.campaign,
              period:     srcD.period,
            });
          }
        }
      } catch(e) {
        showToast('⚠️ コピー中にエラー: ' + e.message, 'error');
      }
      loading(false);
    }

    renderSheetTabs();
    await loadSheetData();
    showToast(`✅ 「${name}」を追加しました${copySourceId?' (コピー完了)':''}`, 'success');
  } catch(e) { showToast('⚠️ ' + e.message, 'error'); }
}

async function deleteSheet(id) {
  const sheet = sheets.find(s => s.id === id);
  if (!sheet) return;
  if (!confirm(`「${sheet.name}」を削除しますか？\n※ この月の教室・配布情報もすべて削除されます。`)) return;
  try {
    await apiPost({ action: 'delete_sheet', id });
    sheets = sheets.filter(s => s.id !== id);
    // 削除したシートが表示中だった場合、別のシートに切り替え
    if (currentSheetId === id) {
      openCards.clear();
      if (sheets.length) {
        currentSheetId = sheets[0].id;
        renderSheetTabs();
        await loadSheetData();
      } else {
        currentSheetId = null;
        classrooms = [];
        renderSheetTabs();
        renderStats();
        renderClassroomList();
      }
    } else {
      renderSheetTabs();
    }
    showToast(`🗑️ 「${sheet.name}」を削除しました`);
  } catch(e) { showToast('⚠️ ' + e.message, 'error'); }
}

function toggleAddForm(ci) { document.getElementById(`addForm_${ci}`).classList.toggle('visible'); }

function openEditModal(distId) {
  // 全教室から配布情報を探す
  let dist = null;
  for (const c of classrooms) {
    dist = c.distributions.find(d => d.id === distId);
    if (dist) break;
  }
  if (!dist) return;
  editTarget = { distId };

  const fields = [
    { key:'type',          label:'種別',       type:'select', options:['ポスティング','折込'] },
    { key:'vendor',        label:'依頼先',      type:'text' },
    { key:'copies',        label:'部数',        type:'number' },
    { key:'order_qty',     label:'発注数',      type:'number' },
    { key:'order_date',    label:'発注日',      type:'date' },
    { key:'arrival_date',  label:'到着日',      type:'date' },
    { key:'delivery_date', label:'配布日',      type:'date' },
    { key:'print_cost',    label:'印刷費',      type:'number' },
    { key:'dist_cost',     label:'配布費',      type:'number' },
    { key:'total_cost',    label:'合計費用',    type:'number' },
    { key:'campaign',      label:'キャンペーン',type:'text' },
    { key:'period',        label:'使用期間',    type:'text' },
  ];
  document.getElementById('editFormGrid').innerHTML = fields.map(f => `
    <div class="form-group">
      <label>${f.label}</label>
      ${f.type==='select'
        ? `<select id="ef_${f.key}">${f.options.map(o=>`<option${dist[f.key]===o?' selected':''}>${o}</option>`).join('')}</select>`
        : `<input type="${f.type}" id="ef_${f.key}" value="${esc(String(dist[f.key]??''))}">`
      }
    </div>`).join('');
  document.getElementById('editModal').classList.add('visible');
}

function closeModal(id) { document.getElementById(id).classList.remove('visible'); }

async function saveEdit() {
  const { distId } = editTarget;
  const g = k => document.getElementById(`ef_${k}`)?.value ?? '';
  const numKeys = ['copies','order_qty','print_cost','dist_cost','total_cost'];
  const body = {
    action: 'update_distribution', id: distId,
    type: g('type'), vendor: g('vendor'),
    copies: +g('copies'), order_qty: +g('order_qty'), times: 1,
    order_date: g('order_date'), arrival_date: g('arrival_date'), delivery_date: g('delivery_date'),
    print_cost: +g('print_cost'), dist_cost: +g('dist_cost'), total_cost: +g('total_cost'),
    campaign: g('campaign'), period: g('period'),
  };
  try {
    await apiPost(body);
    // ローカル状態更新
    for (const c of classrooms) {
      const d = c.distributions.find(d => d.id===distId);
      if (d) { Object.assign(d, body); break; }
    }
    closeModal('editModal');
    renderStats();
    renderClassroomList();
    showToast('✅ 保存しました', 'success');
  } catch(e) { showToast('⚠️ ' + e.message, 'error'); }
}

async function addDistribution(ci, classroomId) {
  const g = id => document.getElementById(id)?.value ?? '';
  const pc = +g(`nf_print_cost_${ci}`) || 0;
  const dc = +g(`nf_dist_cost_${ci}`)  || 0;
  const body = {
    action: 'add_distribution',
    classroom_id: classroomId,
    type:          g(`nf_type_${ci}`),
    vendor:        g(`nf_vendor_${ci}`),
    copies:       +g(`nf_copies_${ci}`)    || 0,
    order_qty:    +g(`nf_order_qty_${ci}`) || 0,
    times: 1,
    order_date:    g(`nf_order_date_${ci}`),
    arrival_date:  g(`nf_arrival_date_${ci}`),
    delivery_date: g(`nf_delivery_date_${ci}`),
    print_cost:   pc,
    dist_cost:    dc,
    total_cost:   pc + dc,
    campaign:      g(`nf_campaign_${ci}`),
    period:        g(`nf_period_${ci}`),
  };
  try {
    const newDist = await apiPost(body);
    classrooms[ci].distributions.push(newDist);
    renderStats();
    renderClassroomList();
    showToast('✅ 追加しました', 'success');
  } catch(e) { showToast('⚠️ ' + e.message, 'error'); }
}

async function deleteDist(distId, ci) {
  if (!confirm('この配布情報を削除しますか？')) return;
  try {
    await apiPost({ action: 'delete_distribution', id: distId });
    classrooms[ci].distributions = classrooms[ci].distributions.filter(d => d.id !== distId);
    renderStats();
    renderClassroomList();
    showToast('🗑️ 削除しました');
  } catch(e) { showToast('⚠️ ' + e.message, 'error'); }
}

async function deleteClassroom(classroomId, ci) {
  const name = classrooms[ci].name;
  if (!confirm(`「${name}」を削除しますか？`)) return;
  try {
    await apiPost({ action: 'delete_classroom', id: classroomId });
    classrooms.splice(ci, 1);
    renderStats();
    renderClassroomList();
    showToast('🗑️ 削除しました');
  } catch(e) { showToast('⚠️ ' + e.message, 'error'); }
}

function openAddClassroomModal() { document.getElementById('addClassroomModal').classList.add('visible'); }

async function addClassroom() {
  const name = document.getElementById('newClassroomName').value.trim();
  if (!name) return;
  try {
    const c = await apiPost({ action: 'add_classroom', sheet_id: currentSheetId, name });
    classrooms.push(c);
    closeModal('addClassroomModal');
    document.getElementById('newClassroomName').value = '';
    renderStats();
    renderClassroomList();
    showToast(`✅ 「${name}」を追加しました`, 'success');
  } catch(e) { showToast('⚠️ ' + e.message, 'error'); }
}

// ============================================================
// PRINTPACK TOGGLE
// ============================================================
async function togglePP(distId, field, value) {
  try {
    const res = await apiPost({ action: 'toggle_pp', id: distId, field, value });
    // ローカル更新
    for (const c of classrooms) {
      const d = c.distributions.find(d => d.id===distId);
      if (d) { d.pp_registered = res.pp_registered; d.pp_delivered = res.pp_delivered; break; }
    }
    const label = field==='pp_registered' ? '①登録' : '②納品（発注）';
    renderStats();
    renderClassroomList();
    showToast(value ? `✅ ${label} 完了` : `↩️ ${label} 取消`, value ? 'success' : '');
  } catch(e) { showToast('⚠️ ' + e.message, 'error'); }
}

function renderCalendar() {
  document.getElementById('calMonthTitle').textContent = `${calYear}年 ${calMonth}月`;
  const firstDay    = new Date(calYear, calMonth-1, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth, 0).getDate();
  const today = new Date();

  const events = {};
  classrooms.forEach(c => c.distributions.forEach(d => {
    const add = (ds, type) => {
      if (!ds) return;
      const [y,m,day] = ds.split('-').map(Number);
      if (y===calYear && m===calMonth) {
        (events[day] = events[day]||[]).push({ type, label: `${type==='delivery'?'配布':type==='order'?'発注':'到着'}:${c.name}` });
      }
    };
    add(d.delivery_date,'delivery'); add(d.order_date,'order'); add(d.arrival_date,'arrival');
  }));

  const heads = ['日','月','火','水','木','金','土'].map(d=>`<div class="cal-day-header">${d}</div>`).join('');
  let cells = Array.from({length:firstDay},()=>'<div class="cal-day other-month"></div>').join('');
  for (let day=1; day<=daysInMonth; day++) {
    const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth-1 && today.getDate()===day;
    const evs = (events[day]||[]);
    cells += `<div class="cal-day${isToday?' today':''}">
      <div class="cal-day-num">${day}</div>
      ${evs.slice(0,3).map(e=>`<div class="cal-event ${e.type}" title="${e.label}">${e.label}</div>`).join('')}
      ${evs.length>3?`<div style="font-size:10px;color:var(--muted)">+${evs.length-3}件</div>`:''}
    </div>`;
  }
  document.getElementById('calendarGrid').innerHTML = heads + cells;
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth>12){calMonth=1;calYear++;}
  if (calMonth<1) {calMonth=12;calYear--;}
  renderCalendar();
}

// ============================================================
// CHARTS
// ============================================================
function renderCharts() {
  Object.values(charts).forEach(c=>c.destroy()); charts={};
  Chart.defaults.color='#7a869a'; Chart.defaults.borderColor='#dde2ea';
  const C=['#1a9e3f','#1a6fd4','#d4680a','#7c3aed','#e53935','#2e7d32','#1565c0','#e65100','#4a148c'];

  const labels = classrooms.map(c=>c.name);
  const totalCosts = classrooms.map(c=>c.distributions.reduce((s,d)=>s+d.total_cost,0));
  charts.c1 = new Chart(document.getElementById('chartByClassroom'),{type:'bar',data:{labels,datasets:[{label:'総費用',data:totalCosts,backgroundColor:C[1]+'88',borderColor:C[1],borderWidth:1}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#7a869a',font:{size:11}},grid:{color:'#dde2ea'}},y:{ticks:{color:'#7a869a',callback:v=>'¥'+v.toLocaleString()},grid:{color:'#dde2ea'}}}}});

  const printTotal = classrooms.reduce((s,c)=>s+c.distributions.reduce((ss,d)=>ss+d.print_cost,0),0);
  const distTotal  = classrooms.reduce((s,c)=>s+c.distributions.reduce((ss,d)=>ss+d.dist_cost,0),0);
  charts.c2 = new Chart(document.getElementById('chartCostBreakdown'),{type:'doughnut',data:{labels:['印刷費','配布費'],datasets:[{data:[printTotal,distTotal],backgroundColor:[C[1]+'99',C[2]+'99'],borderColor:[C[1],C[2]],borderWidth:2}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{color:'#1a2030'}}}}});

  const postCopies=classrooms.reduce((s,c)=>s+c.distributions.filter(d=>d.type==='ポスティング').reduce((ss,d)=>ss+d.copies,0),0);
  const oriCopies =classrooms.reduce((s,c)=>s+c.distributions.filter(d=>d.type==='折込').reduce((ss,d)=>ss+d.copies,0),0);
  charts.c3 = new Chart(document.getElementById('chartTypeRatio'),{type:'pie',data:{labels:['ポスティング','折込'],datasets:[{data:[postCopies,oriCopies],backgroundColor:[C[1]+'99',C[2]+'99'],borderColor:[C[1],C[2]],borderWidth:2}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{color:'#1a2030'}}}}});

  charts.c4 = new Chart(document.getElementById('chartCopies'),{type:'bar',data:{labels,datasets:[
    {label:'ポスティング',data:classrooms.map(c=>c.distributions.filter(d=>d.type==='ポスティング').reduce((s,d)=>s+d.copies,0)),backgroundColor:C[1]+'88',borderColor:C[1],borderWidth:1},
    {label:'折込',        data:classrooms.map(c=>c.distributions.filter(d=>d.type==='折込').reduce((s,d)=>s+d.copies,0)),backgroundColor:C[2]+'88',borderColor:C[2],borderWidth:1},
  ]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{color:'#1a2030'}}},scales:{x:{stacked:true,ticks:{color:'#7a869a',font:{size:11}},grid:{color:'#dde2ea'}},y:{stacked:true,ticks:{color:'#7a869a',callback:v=>v.toLocaleString()+'部'},grid:{color:'#dde2ea'}}}}});
}

// ============================================================
// VIEW SWITCH
// ============================================================
function switchView(view, tabEl) {
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  tabEl.classList.add('active');
  ['listView','calendarView','analyticsView'].forEach(id=>document.getElementById(id).style.display='none');
  if (view==='list')      { document.getElementById('listView').style.display='block'; }
  else if (view==='calendar') { document.getElementById('calendarView').style.display='block'; renderCalendar(); }
  else if (view==='analytics'){ document.getElementById('analyticsView').style.display='block'; renderCharts(); }
}

// ============================================================
// UTILS
// ============================================================
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),2500);
}

// Close modals on overlay click
['editModal','addClassroomModal','addSheetModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{
    if(e.target.id===id) closeModal(id);
  });
});

// Start
init();
</script>
