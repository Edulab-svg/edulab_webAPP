<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRシステム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f8fafc;color:#1e293b;font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif;min-height:100vh;display:flex}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#e2e8f0}::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:3px}
input,select,textarea{background:#ffffff;border:1px solid #cbd5e1;color:#1e293b;border-radius:8px;padding:10px 14px;width:100%;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:#6366f1}
input::placeholder{color:#94a3b8}
select option{background:#ffffff}
.btn{border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.btn-success:hover{opacity:.88;transform:translateY(-1px)}
.btn-danger{background:linear-gradient(135deg,#f43f5e,#e11d48);color:#fff}
.btn-danger:hover{opacity:.88}
.btn-ghost{background:transparent;border:1px solid #cbd5e1;color:#64748b}
.btn-ghost:hover{border-color:#6366f1;color:#6366f1}
.btn-sm{background:#f1f5f9;border:1px solid #cbd5e1;color:#64748b;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-sm:hover{border-color:#6366f1;color:#6366f1}
.btn-sm-danger{background:#fff;border:1px solid #fca5a5;color:#ef4444;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit}
.btn-sm-danger:hover{background:#fee2e244}
.card{background:#ffffff;border:1px solid #e2e8f0;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.overlay{position:fixed;inset:0;background:rgba(100,116,139,.4);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#ffffff;border:1px solid #e2e8f0;border-radius:20px;padding:32px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal.modal-wide{max-width:min(1120px,98vw);padding:28px}
.modal.modal-wide .salary-history-wrap{overflow-x:auto;max-height:420px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal.modal-wide table.salary-history-table th{font-size:10px;padding:6px 7px;letter-spacing:.02em}
.modal.modal-wide table.salary-history-table td{font-size:12px;padding:7px 7px}
.modal.modal-wide table.salary-history-table td.memo-cell{white-space:normal;max-width:160px;word-break:break-word;color:#64748b;line-height:1.35}
.nav-item{padding:10px 16px;border-radius:10px;cursor:pointer;transition:all .2s;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item:hover{background:#e8edf5;color:#334155}
.nav-item.active{background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(139,92,246,.1));color:#6366f1;border:1px solid rgba(99,102,241,.25)}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:500}
.pbar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .5s ease}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e2e8f0;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:#6366f1}
th.sort-active{color:#6366f1}
td{padding:9px 10px;font-size:13px;border-bottom:1px solid #f1f5f9}
tr.emp-row{transition:background .12s;cursor:pointer}
tr.emp-row:hover{background:#f8fafc}
label{display:block;font-size:13px;font-weight:500;color:#64748b;margin-bottom:6px}
.fg{margin-bottom:16px}
.filter-chip{padding:5px 14px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #e2e8f0;background:transparent;color:#94a3b8;transition:all .15s;font-family:inherit}
.filter-chip.active{background:#fee2e244;border-color:#f43f5e;color:#ef4444}
.filter-chip.active-warn{background:#fef3c7;border-color:#d97706;color:#92400e}
.view-toggle-btn{background:#f1f5f9;border:1px solid #e2e8f0;color:#94a3b8;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:16px;line-height:1;font-family:inherit}
.view-toggle-btn.active{background:rgba(99,102,241,.1);border-color:#6366f1;color:#6366f1}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.fadein{animation:fadeUp .3s ease}
.toast-wrap{position:fixed;top:24px;right:24px;z-index:300;animation:toastIn .3s ease;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.toast-ok{background:#dcfce7;border:1px solid #86efac;color:#166534}
.toast-err{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b}
.dp-wrap{position:relative}
.dp-input{background:#ffffff;border:1px solid #cbd5e1;color:#1e293b;border-radius:8px;padding:10px 14px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;transition:border-color .2s;width:100%}
.dp-input.open{border-color:#6366f1}
.dp-input .placeholder{color:#94a3b8}
.dp-popup{position:absolute;top:calc(100% + 8px);left:0;z-index:500;background:#ffffff;border:1px solid #e2e8f0;border-radius:14px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.1);min-width:280px}
.dp-day{text-align:center;padding:7px 2px;border-radius:7px;font-size:13px;cursor:pointer;border:1px solid transparent;transition:background .12s}
.dp-day:hover{background:#f1f5f9}
.dp-day.selected{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-weight:700}
.dp-day.today{background:#eff6ff;border-color:#6366f155;font-weight:700}
.dp-day.disabled{color:#d1d5db;cursor:not-allowed}
.dp-day.sun{color:#ef4444}.dp-day.sat{color:#3b82f6}
</style>
</head>
<body>

<div id="sidebar" style="width:210px;flex-shrink:0;background:#f8fafc;border-right:1px solid #e2e8f0;padding:24px 16px;display:flex;flex-direction:column;gap:4px">
  <div style="padding:12px 8px 24px">
    <div style="font-size:11px;letter-spacing:.15em;color:#6366f1;font-weight:700;text-transform:uppercase;margin-bottom:4px">HR System</div>
    <div style="font-size:18px;font-weight:700;color:#1e293b">HRシステム</div>
    <div style="font-size:11px;color:#64748b;margin-top:2px">労基法準拠</div>
  </div>
  <div class="nav-item active" data-view="dashboard"><span>◈</span>休暇ダッシュボード</div>
  <div class="nav-item" data-view="employees"><span>◉</span>社員一覧</div>
  <div class="nav-item" data-view="calendar"><span>◫</span>取得カレンダー</div>
  <div class="nav-item" data-view="rules"><span>◎</span>法令ガイド・マニュアル</div>
  <div class="nav-item" data-view="retired"><span>◌</span>退職者</div>
  <div style="margin-top:12px;padding:6px 8px 4px;font-size:10px;letter-spacing:.1em;color:#94a3b8;font-weight:700;text-transform:uppercase">給与</div>
  <div class="nav-item" data-view="salary"><span>¥</span>給与管理</div>
  <div class="nav-item" data-view="monthly"><span>📅</span>月次台帳</div>
  <div class="nav-item" data-view="bonus"><span>🎁</span>賞与台帳</div>
  <div class="nav-item" data-view="roles"><span>◆</span>役職設定</div>
  <div style="margin-top:auto;padding-top:16px;border-top:1px solid #e2e8f0">
    <div style="font-size:11px;color:#64748b">今日</div>
    <div id="today-label" style="font-size:12px;color:#94a3b8;font-family:'IBM Plex Mono',monospace;margin-top:2px"></div>
  </div>
</div>

<div id="main" style="flex:1;min-width:0;overflow:auto;padding:32px"></div>
<div id="toast" style="display:none"></div>
<div id="modal-overlay" class="overlay" style="display:none">
  <div id="modal-box" class="modal"></div>
</div>

<script>
const LEAVE_TABLE={
  full:[{m:6,d:10},{m:18,d:11},{m:30,d:12},{m:42,d:14},{m:54,d:16},{m:66,d:18},{m:78,d:20}],
  part:{
    4:[{m:6,d:7},{m:18,d:8},{m:30,d:9},{m:42,d:10},{m:54,d:12},{m:66,d:13},{m:78,d:15}],
    3:[{m:6,d:5},{m:18,d:6},{m:30,d:6},{m:42,d:8},{m:54,d:9},{m:66,d:10},{m:78,d:11}],
    2:[{m:6,d:3},{m:18,d:4},{m:30,d:4},{m:42,d:5},{m:54,d:6},{m:66,d:6},{m:78,d:7}],
    1:[{m:6,d:1},{m:18,d:2},{m:30,d:2},{m:42,d:2},{m:54,d:3},{m:66,d:3},{m:78,d:3}],
  }
};
const DAYS_JP=['日','月','火','水','木','金','土'];
const MONTHS_JP=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const API='api/index.php';
const AVAIL_WARN=20;

let employees=[];
let currentView='dashboard';
let selectedEmpId=null;
let listViewMode='table';
let searchQuery='';
let filterMandatory=false;
let filterHighLeave=false;
let sortKey='hire_date';
let searchTimer=null;
function handleSearch(val){
  searchQuery=val;
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    const sel=document.activeElement;
    const selStart=sel?.selectionStart;
    const selEnd=sel?.selectionEnd;
    renderEmployeeList();
    const inp=document.getElementById('emp-search');
    if(inp){inp.focus();try{inp.setSelectionRange(selStart,selEnd);}catch(e){}}
  },300);
}
let sortDir='asc';
const TODAY=new Date().toISOString().split('T')[0];

async function apiGet(action,params={}){
  const q=new URLSearchParams({action,...params,_t:Date.now()});
  const res=await fetch(`${API}?${q}`);
  return res.json();
}
async function apiPost(body={}){
  const fd=new FormData();
  for(const[k,v]of Object.entries(body))fd.append(k,v);
  const res=await fetch(API,{method:'POST',body:fd});
  return res.json();
}
async function loadEmployees(){
  const r=await apiGet('get_employees');
  if(r.ok)employees=r.data;
}
async function syncKintoneLeave(empId){
  const emp=employees.find(e=>e.id===empId);
  if(!emp)return;
  const remaining=calcAvail(emp.hire_date,emp.work_days_per_week,emp.leaves);
  const r=await apiPost({action:'sync_kintone_leave',employee_id:empId,remaining_days:remaining});
  if(!r.ok){console.warn('kintone同期失敗:',r.error);showToast('kintone同期失敗: '+r.error,'err');}
}

// ══════════════════════════════════════════════════════════════════
// 計算ロジック
// ══════════════════════════════════════════════════════════════════
function diffMonths(hireDate){
  const h=new Date(hireDate),n=new Date();
  let months=(n.getFullYear()-h.getFullYear())*12+(n.getMonth()-h.getMonth());
  if(n.getDate()<h.getDate())months--;
  return months;
}
function getTable(wdpw){
  return wdpw>=5?LEAVE_TABLE.full:(LEAVE_TABLE.part[wdpw]||LEAVE_TABLE.part[1]);
}
function calcEntitled(hireDate,wdpw){
  const dm=diffMonths(hireDate),tbl=getTable(wdpw);
  let d=0;for(const r of[...tbl].reverse()){if(dm>=r.m){d=r.d;break;}}return d;
}
function calcGrants(hireDate,wdpw){
  const hire=new Date(hireDate),dm=diffMonths(hireDate),tbl=getTable(wdpw);
  return tbl.filter(r=>dm>=r.m).map(r=>{
    const gd=new Date(hire);gd.setMonth(gd.getMonth()+r.m);
    const ed=new Date(gd);ed.setFullYear(ed.getFullYear()+2);
    return{days:r.d,grantDate:gd,expireDate:ed,months:r.m};
  });
}
function calcAvail(hireDate,wdpw,leaves){
  const now=new Date();now.setHours(0,0,0,0);
  const batches=calcGrants(hireDate,wdpw).map(g=>{
    const gd=new Date(g.grantDate);gd.setHours(0,0,0,0);
    const ed=new Date(g.expireDate);ed.setHours(0,0,0,0);
    return{remaining:g.days,grantDate:gd,expireDate:ed};
  });
  const sorted=[...leaves].sort((a,b)=>a.start_date.localeCompare(b.start_date));
  for(const leaf of sorted){
    let toConsume=parseFloat(leaf.days);
    const leafDate=new Date(leaf.start_date);leafDate.setHours(0,0,0,0);
    for(const b of batches){
      if(toConsume<=0)break;
      if(b.grantDate<=leafDate&&b.expireDate>leafDate&&b.remaining>0){
        const consume=Math.min(b.remaining,toConsume);
        b.remaining-=consume;toConsume-=consume;
      }
    }
    if(toConsume>0){
      for(const b of batches){
        if(toConsume<=0)break;
        if(b.expireDate>now&&b.remaining>0){
          const consume=Math.min(b.remaining,toConsume);
          b.remaining-=consume;toConsume-=consume;
        }
      }
    }
  }
  return Math.max(0,batches.reduce((s,b)=>b.expireDate>now?s+b.remaining:s,0));
}
function calcUsedFY(leaves){
  const{start,end}=currentFY();
  return leaves.filter(l=>l.start_date>=start&&l.start_date<=end).reduce((s,l)=>s+parseFloat(l.days),0);
}
function calcUsedTotal(leaves){return leaves.reduce((s,l)=>s+parseFloat(l.days),0);}
function countWorkdays(start,end){
  let n=0,c=new Date(start),e=new Date(end);
  while(c<=e){n++;c.setDate(c.getDate()+1);}
  return n;
}
function getFiscalYear(dateStr){
  const d=new Date(dateStr);
  return d.getMonth()>=3?d.getFullYear():d.getFullYear()-1;
}
function currentFY(){
  const fy=getFiscalYear(TODAY);
  return{fy,start:`${fy}-04-01`,end:`${fy+1}-03-31`};
}
function getMandatory(emp){
  if(calcEntitled(emp.hire_date,emp.work_days_per_week)<10)return null;
  const grants=calcGrants(emp.hire_date,emp.work_days_per_week);
  if(!grants.length)return null;
  const firstFY=getFiscalYear(grants[0].grantDate.toISOString().split('T')[0]);
  const{fy,start,end}=currentFY();
  if(fy<=firstFY)return null;
  const usedFY=emp.leaves.filter(l=>l.start_date>=start&&l.start_date<=end).reduce((s,l)=>s+parseFloat(l.days),0);
  return{rem:Math.max(0,5-usedFY),used:usedFY,fy};
}

// ══════════════════════════════════════════════════════════════════
// 並び替え & フィルター
// ══════════════════════════════════════════════════════════════════
function sortedFiltered(){
  let list=[...employees];
  if(searchQuery.trim()){
    const q=searchQuery.trim().toLowerCase().replace(/\s/g,'');
    list=list.filter(e=>e.name.toLowerCase().replace(/\s/g,'').includes(q));
  }
  if(filterMandatory)list=list.filter(e=>{const m=getMandatory(e);return m&&m.rem>0;});
  if(filterHighLeave)list=list.filter(e=>calcAvail(e.hire_date,e.work_days_per_week,e.leaves)>=AVAIL_WARN);
  list.sort((a,b)=>{
    let va,vb;
    if(sortKey==='name')return sortDir==='asc'?a.name.localeCompare(b.name,'ja'):b.name.localeCompare(a.name,'ja');
    if(sortKey==='hire_date'){va=a.hire_date;vb=b.hire_date;}
    if(sortKey==='avail'){va=calcAvail(a.hire_date,a.work_days_per_week,a.leaves);vb=calcAvail(b.hire_date,b.work_days_per_week,b.leaves);}
    return sortDir==='asc'?(va<vb?-1:va>vb?1:0):(va>vb?-1:va<vb?1:0);
  });
  return list;
}
function handleSort(key){
  if(sortKey===key)sortDir=sortDir==='asc'?'desc':'asc';
  else{sortKey=key;sortDir='asc';}
  renderEmployeeList();
}
function sortIcon(key){
  if(sortKey!==key)return'<span style="color:#cbd5e1;margin-left:4px">↕</span>';
  return`<span style="color:#6366f1;margin-left:4px">${sortDir==='asc'?'↑':'↓'}</span>`;
}

// ══════════════════════════════════════════════════════════════════
// 残日数アラートタグ
// ══════════════════════════════════════════════════════════════════
function highLeaveTag(avail){
  if(avail>=AVAIL_WARN)
    return`<span class="tag" style="background:#fef3c7;color:#92400e;margin-left:6px" title="残日数が${AVAIL_WARN}日以上です">⚠ 残多</span>`;
  return'';
}

// ══════════════════════════════════════════════════════════════════
// DatePicker
// ══════════════════════════════════════════════════════════════════
const dpState={};
function dpCreate(id,value='',options={}){
  dpState[id]={value,viewYear:value?+value.split('-')[0]:new Date().getFullYear(),viewMonth:value?+value.split('-')[1]-1:new Date().getMonth(),options,open:false};
}
function dpRender(id){
  const s=dpState[id];if(!s)return'';
  const{value,viewYear,viewMonth,open,options}=s;
  const disp=value?`${value.split('-')[0]}年${+value.split('-')[1]}月${+value.split('-')[2]}日`:'';
  return`<div class="dp-wrap" id="dpwrap-${id}">
    ${options.label?`<label>${options.label}</label>`:''}
    <div class="dp-input ${open?'open':''}" onclick="dpToggle('${id}')">
      <span class="${disp?'':'placeholder'}">${disp||options.placeholder||'日付を選択'}</span>
      <span style="color:#6366f1">📅</span>
    </div>
    ${open?dpPopup(id):''}
  </div>`;
}
function dpPopup(id){
  const s=dpState[id];
  const{viewYear,viewMonth,value,options}=s;
  const total=new Date(viewYear,viewMonth+1,0).getDate();
  const first=new Date(viewYear,viewMonth,1).getDay();
  const maxDate=options.max?new Date(options.max):null;
  const minDate=options.min?new Date(options.min):null;
  const years=Array.from({length:30},(_,i)=>new Date().getFullYear()-20+i);
  let cells='';
  for(let i=0;i<first;i++)cells+=`<div></div>`;
  for(let d=1;d<=total;d++){
    const dt=new Date(viewYear,viewMonth,d);
    const val=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const sel=value===val,dis=(maxDate&&dt>maxDate)||(minDate&&dt<minDate);
    const tod=val===TODAY;
    const dow=(first+d-1)%7;
    const cls=['dp-day',sel?'selected':tod?'today':'',dis?'disabled':'',dow===0?'sun':dow===6?'sat':''].filter(Boolean).join(' ');
    cells+=`<div class="${cls}" ${dis?'':'onclick="dpSelect(\''+id+'\',\''+val+'\')"'}>${d}</div>`;
  }
  const yOpts=years.map(y=>`<option value="${y}" ${y===viewYear?'selected':''}>${y}年</option>`).join('');
  const mOpts=MONTHS_JP.map((m,i)=>`<option value="${i}" ${i===viewMonth?'selected':''}>${m}</option>`).join('');
  return`<div class="dp-popup">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button onclick="dpNav('${id}',-1)" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:18px;padding:2px 8px">‹</button>
      <div style="display:flex;gap:6px">
        <select onchange="dpSetYear('${id}',this.value)" style="width:auto;padding:4px 8px;font-size:13px">${yOpts}</select>
        <select onchange="dpSetMonth('${id}',this.value)" style="width:auto;padding:4px 8px;font-size:13px">${mOpts}</select>
      </div>
      <button onclick="dpNav('${id}',1)" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:18px;padding:2px 8px">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px">
      ${DAYS_JP.map((d,i)=>`<div style="text-align:center;font-size:11px;font-weight:600;padding:4px 0;color:${i===0?'#f87171':i===6?'#60a5fa':'#64748b'}">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${cells}</div>
    <div style="margin-top:10px;border-top:1px solid #e2e8f0;padding-top:10px;text-align:center">
      <button onclick="dpToday('${id}')" style="background:none;border:1px solid #cbd5e1;color:#64748b;border-radius:6px;padding:5px 16px;font-size:12px;cursor:pointer">今日</button>
      ${s.value?`<button onclick="dpClear('${id}')" style="background:none;border:1px solid #fca5a5;color:#ef4444;border-radius:6px;padding:5px 16px;font-size:12px;cursor:pointer;margin-left:8px">クリア</button>`:''}
    </div>
  </div>`;
}
function dpRefresh(id){const wrap=document.getElementById('dpwrap-'+id);if(wrap)wrap.outerHTML=dpRender(id);}
function dpToggle(id){dpState[id].open=!dpState[id].open;dpRefresh(id);}
function dpSelect(id,val){dpState[id].value=val;dpState[id].open=false;dpRefresh(id);}
function dpNav(id,dir){
  const s=dpState[id];s.viewMonth+=dir;
  if(s.viewMonth>11){s.viewMonth=0;s.viewYear++;}
  if(s.viewMonth<0){s.viewMonth=11;s.viewYear--;}
  dpRefresh(id);
}
function dpSetYear(id,y){dpState[id].viewYear=+y;dpRefresh(id);}
function dpSetMonth(id,m){dpState[id].viewMonth=+m;dpRefresh(id);}
function dpToday(id){
  const s=dpState[id],o=s.options;
  const max=o.max?new Date(o.max):null,min=o.min?new Date(o.min):null,t=new Date(TODAY);
  if((!max||t<=max)&&(!min||t>=min)){s.value=TODAY;s.open=false;}
  else{s.viewYear=t.getFullYear();s.viewMonth=t.getMonth();}
  dpRefresh(id);
}
function dpClear(id){dpState[id].value='';dpState[id].open=false;dpRefresh(id);}
function dpGet(id){return dpState[id]?.value||'';}
document.addEventListener('click',e=>{
  if(!e.target.closest('.dp-wrap')){
    let changed=false;
    for(const id in dpState){if(dpState[id].open){dpState[id].open=false;changed=true;}}
    if(changed)Object.keys(dpState).forEach(id=>{const w=document.getElementById('dpwrap-'+id);if(w)w.outerHTML=dpRender(id);});
  }
});

let toastTimer=null;
function showToast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.className=`toast-wrap toast-${type}`;
  el.textContent=(type==='err'?'⚠️ ':'✅ ')+msg;
  el.style.display='block';
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.style.display='none',3000);
}
function openModal(html,opts){
  opts=opts||{};
  const box=document.getElementById('modal-box');
  box.innerHTML=html;
  box.className='modal'+(opts.wide?' modal-wide':'');
  document.getElementById('modal-overlay').style.display='flex';
}
function closeModal(){
  document.getElementById('modal-overlay').style.display='none';
  document.getElementById('modal-box').className='modal';
}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});

  dpCreate('leaveStart','',{label:'取得日（開始日）',placeholder:'取得日を選択'});
  dpCreate('leaveEnd','',{label:'終了日（連続取得の場合）',placeholder:'1日のみの場合は空欄'});
  openModal(`
  <h2 style="font-size:20px;font-weight:700;margin-bottom:6px;color:#1e293b">有給取得を登録</h2>
  <p style="font-size:14px;color:#64748b;margin-bottom:24px" id="leave-avail-msg"></p>

    <select id="leave-type" onchange="leaveTypeChange()">
      <option value="full">全日</option><option value="half">半日（0.5日）</option>
    </select>
  </div>
  <div class="fg">${dpRender('leaveStart')}</div>
  <div class="fg" id="leave-end-wrap">${dpRender('leaveEnd')}</div>
  <div class="fg"><label>メモ（任意）</label><input id="leave-memo" placeholder="例：夏季休暇、通院 など"></div>
  <div style="display:flex;gap:12px;margin-top:8px">
    <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">キャンセル</button>
    <button class="btn btn-success" style="flex:1" onclick="submitAddLeave()">登録する</button>
  </div>`);
  const emp=employees.find(e=>e.id===selectedEmpId);
  if(emp){
    const avail=calcAvail(emp.hire_date,emp.work_days_per_week,emp.leaves);
    document.getElementById('leave-avail-msg').innerHTML=`${emp.name} — 残 <strong style="color:#047857">${avail}日</strong>`;

function leaveTypeChange(){
  const t=document.getElementById('leave-type').value;
  document.getElementById('leave-end-wrap').style.display=t==='half'?'none':'block';
}
async function submitAddLeave(){
  const emp=employees.find(e=>e.id===selectedEmpId);if(!emp)return;
  const type=document.getElementById('leave-type').value;
  const start=dpGet('leaveStart');
  const endRaw=type==='half'?start:dpGet('leaveEnd');
  const end=endRaw||start;
  const memo=document.getElementById('leave-memo').value.trim();
  if(!start){showToast('取得日を入力してください','err');return;}
  if(end<start){showToast('終了日は開始日以降にしてください','err');return;}
  const days=type==='half'?0.5:countWorkdays(start,end);
  if(days<=0){showToast('取得日数が0日です','err');return;}
  const avail=calcAvail(emp.hire_date,emp.work_days_per_week,emp.leaves);
  if(days>avail){showToast(`残日数不足（残 ${avail} 日）`,'err');return;}
  const r=await apiPost({action:'add_leave',employee_id:emp.id,start_date:start,end_date:end,days,type,memo});

  closeModal();showToast(`${days}日分の取得を登録しました`);
  await loadEmployees();renderCurrent();
  syncKintoneLeave(emp.id);
}

const REVIEW_MONTHS=[4,10]; // 審査月（4月・10月）

function fmtYen(n){return Number(n||0).toLocaleString('ja-JP')+'円';}
function escAttr(s){return String(s??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtW(n){if(!n||n===0)return null;return Number(n).toLocaleString('ja-JP');}
function fmtPeriod(p){if(!p)return'—';const[y,m]=p.split('-');return`${y}年${parseInt(m)}月`;}

function getCurrentReviewPeriod(){
  const now=new Date(),m=now.getMonth()+1,y=now.getFullYear();
  const sorted=[...REVIEW_MONTHS].sort((a,b)=>b-a);
  for(const rm of sorted){if(m>=rm)return`${y}-${String(rm).padStart(2,'0')}`;}
  return`${y-1}-${String(sorted[0]).padStart(2,'0')}`;
}
function getNextReviewPeriod(){
  const now=new Date(),m=now.getMonth()+1,y=now.getFullYear();
  const sorted=[...REVIEW_MONTHS].sort((a,b)=>a-b);
  for(const rm of sorted){if(m<rm)return`${y}-${String(rm).padStart(2,'0')}`;}
  return`${y+1}-${String(sorted[0]).padStart(2,'0')}`;
}
function isReviewDue(emp){
  if(!emp.base_salary&&!emp.role_id)return false;
  return!emp.last_review_period||emp.last_review_period<getCurrentReviewPeriod();
}

        ${isSemiPay&&!isPayMonth?'<span style="display:block;font-size:9px;color:#94a3b8;font-family:sans-serif">半年払(0)</span>':''}
      </td>

      <td style="${P2};font-size:11px;color:#64748b;max-width:110px;white-space:normal">${has&&emp.ms_note?`📝 ${emp.ms_note}`:'—'}</td>

        <div style="display:flex;gap:3px;flex-wrap:wrap">

          ${has&&!excl?`<button class="btn-sm" style="font-size:11px;padding:3px 7px;border-color:#6366f1;color:#6366f1" onclick="refreshMonthlyBaseForEmployee(${emp.id})" title="この社員の基本給・各手当を給与テーブルの現在値で上書き">最新反映</button>`:''}

  }).join('');

  document.getElementById('main').innerHTML=`
  <div class="fadein" style="width:100%">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px">
      <div>
        <h1 style="font-size:24px;font-weight:700;color:#1e293b">月次給与台帳</h1>
        <p style="color:#64748b;font-size:13px;margin-top:3px">月ごとの実支給額を管理 — 特別手当の臨時調整に対応</p>

      <div style="display:flex;gap:8px;align-items:center">
        <select onchange="monthlyChangeYear(this.value)" style="width:auto;padding:8px 12px">${yOpts}</select>

        <button class="btn btn-primary" onclick="generateMonthly()">一括生成</button>

        <button class="btn btn-ghost" onclick="exportMonthlyCsv()" style="border-color:#0891b2;color:#0891b2">CSVダウンロード</button>

        <div style="font-size:12px;color:#16a34a;margin-top:2px">${semiPayTarget.map(e=>e.name).join('、')} — 支給を忘れずに確認してください</div>
      </div>
    </div>`:''}
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
      <div style="background:#ffffff;border:1px solid #e2e8f0;border-radius:14px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:11px;color:#64748b;font-weight:600;letter-spacing:.05em;margin-bottom:6px">月間総支給額</div><div style="font-size:24px;font-weight:700;color:#6366f1;font-family:'IBM Plex Mono',monospace">${fmtYen(totalCost)}</div></div>
        <div style="font-size:28px;color:#6366f1;opacity:.3">¥</div>
      </div>
      <div style="background:#ffffff;border:1px solid #e2e8f0;border-radius:14px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:11px;color:#64748b;font-weight:600;letter-spacing:.05em;margin-bottom:6px">生成済</div><div style="font-size:24px;font-weight:700;color:#047857;font-family:'IBM Plex Mono',monospace">${generatedCount} / ${monthlyData.length}名</div></div>
        <div style="font-size:28px;color:#047857;opacity:.3">✓</div>
      </div>
      <div style="background:#ffffff;border:1px solid #e2e8f0;border-radius:14px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center">

      <div style="overflow-x:auto">

}

function monthlyChangeYear(y){
  const[,m]=currentMonthlyYM.split('-');
  currentMonthlyYM=`${y}-${m}`;
  loadMonthly(currentMonthlyYM).then(()=>renderMonthly());
}
function monthlyChangeMonth(m){
  const[y]=currentMonthlyYM.split('-');
  currentMonthlyYM=`${y}-${m}`;
  loadMonthly(currentMonthlyYM).then(()=>renderMonthly());
}
async function toggleMonthlyExclude(empId, excluded){
  const emp=monthlyData.find(e=>e.id===empId);
  const name=emp?emp.name:'この社員';
  const label=excluded?'除外':'復元';
  if(!confirm(`${name} を月次台帳から${label}しますか？`))return;
  const data=await apiPost({action:'set_monthly_excluded',employee_id:empId,year_month:currentMonthlyYM,excluded});
  if(!data.ok){showToast(data.error||'エラーが発生しました','err');return;}
  showToast(`${name} を${label}しました`);
  await loadMonthly(currentMonthlyYM);
  renderMonthly();
}
function exportMonthlyCsv(){
  if(!monthlyData||monthlyData.length===0){showToast('出力するデータがありません','err');return;}
  const[yr,mo]=currentMonthlyYM.split('-');
  const headers=['氏名','役職','基本給','業務手当','職責手当','役職手当','通勤費手当','住宅手当','特別手当','月額合計','月次備考','状態'];
  const csvRows=[headers];
  const[csvYr,csvMo]=currentMonthlyYM.split('-').map(Number);
  monthlyData.forEach(emp=>{
    const has=!!emp.ms_id;
    const excl=!!emp.ms_excluded;
    // 生成済みの場合はスナップショット値を優先
    const base=has?(emp.ms_base_salary??emp.base_salary):emp.base_salary;
    const biz=has?(emp.ms_business_allowance??emp.business_allowance):emp.business_allowance;
    const duty=has?(emp.ms_duty_allowance??emp.duty_allowance):emp.duty_allowance;
    const roleAllow=has?(emp.ms_role_allowance??emp.role_allowance):emp.role_allowance;
    const housing=has?(emp.ms_housing_allowance??emp.housing_allowance):emp.housing_allowance;
    const sp=has?emp.ms_special:emp.special_allowance;
    const isSemi=emp.commute_cycle==='semi_annual';
    const isPay=isSemi&&emp.commute_months&&emp.commute_months.split(',').map(Number).includes(csvMo);
    const commute=has&&emp.ms_commute!==null ? emp.ms_commute : (isSemi&&!isPay ? 0 : (emp.commute_allowance||0));
    const total=has?emp.ms_total:((base||0)+(biz||0)+(duty||0)+(roleAllow||0)+commute+(housing||0)+(sp||0));
    const status=excl?'除外':has?'生成済':'未生成';
    const note=has&&emp.ms_note?emp.ms_note:'';
    csvRows.push([
      emp.name,
      emp.role_name||'',
      excl?'':base||0,
      excl?'':biz||0,
      excl?'':duty||0,
      excl?'':roleAllow||0,
      excl?'':commute,
      excl?'':housing||0,
      excl?'':sp||0,
      excl?'':total||0,
      note,
      status
    ]);
  });
  // 合計行（除外社員は含まない）
  const totals=monthlyData.reduce((acc,emp)=>{
    if(emp.ms_excluded)return acc;
    const has=!!emp.ms_id;
    // 生成済みの場合はスナップショット値を優先
    const base=has?(emp.ms_base_salary??emp.base_salary):emp.base_salary;
    const biz=has?(emp.ms_business_allowance??emp.business_allowance):emp.business_allowance;
    const duty=has?(emp.ms_duty_allowance??emp.duty_allowance):emp.duty_allowance;
    const roleAllow=has?(emp.ms_role_allowance??emp.role_allowance):emp.role_allowance;
    const housing=has?(emp.ms_housing_allowance??emp.housing_allowance):emp.housing_allowance;
    const isSemi=emp.commute_cycle==='semi_annual';
    const isPay=isSemi&&emp.commute_months&&emp.commute_months.split(',').map(Number).includes(csvMo);
    const commute=has&&emp.ms_commute!==null ? emp.ms_commute : (isSemi&&!isPay ? 0 : (emp.commute_allowance||0));
    const sp=(has?emp.ms_special:emp.special_allowance)||0;
    acc[0]+=(has?emp.ms_total:((base||0)+(biz||0)+(duty||0)+(roleAllow||0)+commute+(housing||0)+sp));
    acc[1]+=(base||0);
    acc[2]+=(biz||0);
    acc[3]+=(duty||0);
    acc[4]+=(roleAllow||0);
    acc[5]+=commute;
    acc[6]+=(housing||0);
    acc[7]+=sp;
    return acc;
  },[0,0,0,0,0,0,0,0]);
  csvRows.push(['合計','',totals[1],totals[2],totals[3],totals[4],totals[5],totals[6],totals[7],totals[0],'','']);

  const csvText=csvRows.map(row=>row.map(v=>{
    const s=String(v);
    return s.includes(',')||s.includes('"')||s.includes('\n')?`"${s.replace(/"/g,'""')}"`:s;
  }).join(',')).join('\r\n');

  // BOM付きUTF-8（Excelで文字化けしないよう）
  const bom='\uFEFF';
  const blob=new Blob([bom+csvText],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`月次給与台帳_${yr}年${mo}月.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`${yr}年${mo}月のCSVをダウンロードしました`);
}

async function loadBonus(ym){

function renderBonus(){

      <td style="padding:9px 14px;font-family:monospace;${hasAdj?'color:#b45309;font-weight:600':'color:#64748b'}">${adj>=0?'+':''}${fmtYen(adj)}</td>
      <td style="padding:9px 14px;font-family:monospace;font-weight:700;color:${excl?'#475569':'#10b981'}">${excl?'—':fmtYen(total)}</td>
      <td style="padding:9px 14px;font-size:12px;color:#64748b;max-width:150px;white-space:normal">${has&&emp.bs_note?`📝 ${emp.bs_note}`:'—'}</td>
      <td style="padding:9px 14px">${statusTag}</td>
      <td style="padding:9px 14px;display:flex;gap:6px" onclick="event.stopPropagation()">
        ${has&&!excl?`<button class="btn-sm" onclick="openBonusEdit(${emp.id})">編集</button>`:''}
        ${exclBtn}
      </td>
    </tr>`;
  }).join('');

function exportBonusCsv(){
  if(!bonusData||bonusData.length===0){showToast('出力するデータがありません','err');return;}
  const[yr,mo]=currentBonusYM.split('-');
  const headers=['氏名','役職','賞与月数','算定基礎賞与','掛け率','インセンティブ','支給額','備考','状態'];
  const csvRows=[headers];
  bonusData.forEach(emp=>{
    const has=!!emp.bs_id;
    const excl=!!emp.bs_excluded;
    const base=has?emp.bs_base:Math.round((emp.base_salary+emp.business_allowance+emp.duty_allowance+emp.role_allowance)*(emp.bonus_months/2));
    const rate=has?(emp.bs_rate??1):1;
    const adj=has?emp.bs_adj:0;
    const total=has?emp.bs_total:base;
    csvRows.push([
      emp.name, emp.role_name||'',
      excl?'':(emp.bonus_months/2).toFixed(1),
      excl?'':base, excl?'':rate.toFixed(2), excl?'':adj, excl?'':total,
      has&&emp.bs_note?emp.bs_note:'',
      excl?'除外':has?'生成済':'未生成'
    ]);
  });
  const active=bonusData.filter(e=>!e.bs_excluded&&e.bs_id);
  const sumBase=active.reduce((s,e)=>s+(e.bs_base||0),0);
  const sumAdj=active.reduce((s,e)=>s+(e.bs_adj||0),0);
  const sumTotal=active.reduce((s,e)=>s+(e.bs_total||0),0);
  csvRows.push(['合計','','',sumBase,'',sumAdj,sumTotal,'','']);
  const csvText=csvRows.map(row=>row.map(v=>{
    const s=String(v);
    return s.includes(',')||s.includes('"')||s.includes('\n')?`"${s.replace(/"/g,'""')}"`:s;
  }).join(',')).join('\r\n');
  const bom='\uFEFF';
  const blob=new Blob([bom+csvText],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`賞与台帳_${yr}年${mo}月.csv`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast(`${yr}年${mo}月の賞与CSVをダウンロードしました`);
}

function reviewToggleRaise(){
  const v=document.getElementById('rv-approved').value;
  document.getElementById('rv-raise-wrap').style.display=v==='1'?'block':'none';
  document.getElementById('rv-after-wrap').style.display=v==='1'?'block':'none';
  reviewCalcPreview();
}
function reviewCalcPreview(){
  const raiseEl=document.getElementById('rv-raise');
  const raiseBizEl=document.getElementById('rv-raise-business');
  const afterBase=document.getElementById('rv-after-val-base');
  const afterBiz=document.getElementById('rv-after-val-business');
  const beforeHidden=document.getElementById('rv-before');
  const beforeBizHidden=document.getElementById('rv-before-business');
  const capHidden=document.getElementById('rv-cap');
  if(!raiseEl||!afterBase||!beforeHidden)return;
  const before=parseInt(beforeHidden.value)||0;
  const beforeBiz=beforeBizHidden?parseInt(beforeBizHidden.value)||0:0;
  const cap=capHidden?parseInt(capHidden.value)||0:0;
  const raise=parseInt(raiseEl.value)||0;
  const raiseBiz=raiseBizEl?(parseInt(raiseBizEl.value)||0):0;
  const after=before+raise;
  const afterBusiness=beforeBiz+raiseBiz;
  if(cap>0&&after>cap){
    afterBase.textContent=fmtYen(after)+' ⚠ 上限超過';
    afterBase.style.color='#f43f5e';
  }else{
    afterBase.textContent=fmtYen(after);
    afterBase.style.color='#10b981';
  }
  if(afterBiz){
    afterBiz.textContent=fmtYen(afterBusiness);
    afterBiz.style.color='#10b981';
  }
}
async function submitSalaryReview(){
  const employee_id=document.getElementById('rv-id').value;
  const review_id_raw=document.getElementById('rv-review-id').value;
  const review_id=review_id_raw?parseInt(review_id_raw,10):0;
  const postSave=document.getElementById('rv-post-save').value;
  const review_period=document.getElementById('rv-period').value;
  const approved=document.getElementById('rv-approved').value;
  const raise_amount=approved==='1'?(parseInt(document.getElementById('rv-raise').value)||0):0;
  const raise_business_amount=approved==='1'?(parseInt(document.getElementById('rv-raise-business').value)||0):0;
  const salary_before=parseInt(document.getElementById('rv-before').value)||0;
  const salary_after=approved==='1'?salary_before+raise_amount:salary_before;
  const business_before=parseInt(document.getElementById('rv-before-business').value)||0;
  const business_after=approved==='1'?business_before+raise_business_amount:business_before;
  const note=document.getElementById('rv-note').value.trim();
  const emp=employees.find(e=>e.id==employee_id);
  if(emp&&emp.salary_cap>0&&salary_after>emp.salary_cap){
    showToast(`上限（${fmtYen(emp.salary_cap)}）を超えています`,'err');return;
  }
  let r;
  if(review_id>0){
    r=await apiPost({action:'update_salary_review',id:review_id,employee_id,approved,raise_amount,raise_business_amount,note});
  }else{
    r=await apiPost({action:'add_salary_review',employee_id,review_period,approved,raise_amount,raise_business_amount,salary_before,salary_after,business_before,business_after,note});
  }
  if(!r.ok){showToast(r.error,'err');return;}
  closeModal();
  let msg='';
  if(approved==='1'){
    const parts=[];
    if(raise_amount>0)parts.push('基本+'+fmtYen(raise_amount));
    if(raise_business_amount>0)parts.push('業務+'+fmtYen(raise_business_amount));
    msg=parts.length?'（'+parts.join(' ')+'）':'（昇給額0の記録）';
  }else msg='（見送り）';
  showToast(review_id>0?('審査内容を更新しました'+msg):('審査を記録しました'+msg));
  await loadEmployees();renderCurrent();
  if(postSave==='history')await openSalaryHistory(employee_id);
}

async function openSalaryHistory(id){

  const rows=reviews.map(rv=>{

    const bizBefore=rv.business_before;
    const bizCell=bizBefore!=null&&rv.business_after!=null
      ?`<span style="font-family:monospace;color:#64748b">${fmtYen(bizBefore)}</span> → <span style="font-family:monospace;font-weight:600;color:#047857">${fmtYen(rv.business_after)}</span>`

      <td>${rv.approved?'<span class="tag" style="background:#dcfce766;color:#16a34a">昇給</span>':'<span class="tag" style="background:#f1f5f9;color:#64748b">見送り</span>'}</td>

      <td style="white-space:nowrap"><span style="font-family:monospace;color:#64748b">${fmtYen(rv.salary_before)}</span> → <span style="font-family:monospace;font-weight:600;color:#047857">${fmtYen(rv.salary_after)}</span></td>
      <td style="white-space:nowrap">${bizCell}</td>
      <td class="memo-cell">${rv.note?escHtml(rv.note):'—'}</td>
      <td style="white-space:nowrap"><button type="button" class="btn-sm" onclick="openSalaryReviewEdit(${id},${rv.id})">修正</button></td>
    </tr>`;
  }).join('');
  openModal(`
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
    <div>
      <h2 style="font-size:18px;font-weight:700;color:#1e293b">昇給審査履歴</h2>
      <p style="font-size:13px;color:#64748b;margin-top:2px">${emp.name}</p>
    </div>
    <span style="font-size:12px;color:#475569;padding-top:4px">${reviews.length}件</span>
  </div>
  ${reviews.length===0
    ?'<p style="color:#475569;text-align:center;padding:24px">審査記録がありません</p>'
    :`<div class="salary-history-wrap"><table class="salary-history-table">
        <thead><tr><th>審査期間</th><th>結果</th><th>基本↑</th><th>業務↑</th><th>基本給（前→後）</th><th>業務手当（前→後）</th><th>メモ</th><th style="width:1%">操作</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`}
  <div style="margin-top:16px">
    <button class="btn btn-ghost" style="width:100%" onclick="closeModal()">閉じる</button>
  </div>`,{wide:true});
}

    <button class="btn btn-primary" style="flex:1" onclick="submitAddRole()">追加する</button>
  </div>`);
}
async function submitAddRole(){
  const name=document.getElementById('ar-name').value.trim();
  if(!name){showToast('役職名は必須です','err');return;}
  const r=await apiPost({action:'add_role',name,
    role_allowance:document.getElementById('ar-allowance').value||0,
    raise_min:document.getElementById('ar-min').value||0,
    raise_max:document.getElementById('ar-max').value||0,
    salary_cap:document.getElementById('ar-cap').value||0,
    bonus_months:document.getElementById('ar-bonus').value,
    sort_order:document.getElementById('ar-order').value||0
  });
  if(!r.ok){showToast(r.error,'err');return;}
  closeModal();showToast(name+' を追加しました');
  await loadRoles();renderCurrent();
}

// ── 役職編集モーダル ──────────────────────────────────
function openEditRole(id){
  const role=roles.find(r=>r.id===id);if(!role)return;
  openModal(`
  <h2 style="font-size:20px;font-weight:700;margin-bottom:24px;color:#1e293b">役職を編集</h2>
  <div class="fg"><label>役職名 *</label><input id="er-name" value="${role.name}"></div>
  <div class="fg"><label>役職手当（円/月）</label><input id="er-allowance" type="number" value="${role.role_allowance||0}" min="0"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="fg"><label>昇給幅 最小（円/月）</label><input id="er-min" type="number" value="${role.raise_min||0}" min="0"></div>
    <div class="fg"><label>昇給幅 最大（円/月）</label><input id="er-max" type="number" value="${role.raise_max||0}" min="0"></div>
  </div>
  <div class="fg"><label>基本給 上限（円/月）　※0=上限なし</label><input id="er-cap" type="number" value="${role.salary_cap||0}" min="0"></div>
  <div class="fg"><label>賞与月数　※想定年収 = （基本給等）×（12＋賞与月数）</label>
    <select id="er-bonus">
      ${[0,1,2,3,4].map(n=>`<option value="${n}" ${(role.bonus_months??2)===n?'selected':''}>${n}ヶ月${n===2?' （夏1＋冬1）':''} → ×${12+n}</option>`).join('')}
    </select>
  </div>
  <div class="fg"><label>表示順</label><input id="er-order" type="number" value="${role.sort_order||0}" min="0"></div>
  <input type="hidden" id="er-id" value="${id}">
  <div style="display:flex;gap:12px;margin-top:8px">
    <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">キャンセル</button>
    <button class="btn btn-primary" style="flex:1" onclick="submitEditRole()">保存する</button>
  </div>`);
}
async function submitEditRole(){
  const id=document.getElementById('er-id').value;
  const name=document.getElementById('er-name').value.trim();
  if(!name){showToast('役職名は必須です','err');return;}
  const r=await apiPost({action:'update_role',id,name,
    role_allowance:document.getElementById('er-allowance').value||0,
    raise_min:document.getElementById('er-min').value||0,
    raise_max:document.getElementById('er-max').value||0,
    salary_cap:document.getElementById('er-cap').value||0,
    bonus_months:document.getElementById('er-bonus').value,
    sort_order:document.getElementById('er-order').value||0
  });
  if(!r.ok){showToast(r.error,'err');return;}
  closeModal();showToast(name+' を更新しました');
  await Promise.all([loadRoles(),loadEmployees()]);renderCurrent();
}

// ── 役職削除モーダル ──────────────────────────────────
function openDeleteRole(id){
  const role=roles.find(r=>r.id===id);if(!role)return;
  openModal(`
  <div style="text-align:center;margin-bottom:24px">
    <div style="font-size:40px;margin-bottom:12px">🗑️</div>
    <h2 style="font-size:18px;font-weight:700;color:#1e293b;margin-bottom:8px">役職を削除しますか？</h2>
    <p style="font-size:14px;color:#94a3b8"><strong style="color:#ef4444">${role.name}</strong> を削除します。この操作は取り消せません。<br>割り当て中の社員がいる場合は削除できません。</p>
  </div>
  <div style="display:flex;gap:12px">
    <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">キャンセル</button>
    <button class="btn btn-danger" style="flex:1" onclick="submitDeleteRole(${id})">削除する</button>
  </div>`);
}
async function submitDeleteRole(id){
  const r=await apiPost({action:'delete_role',id});
  if(!r.ok){showToast(r.error,'err');return;}
  closeModal();showToast('役職を削除しました');
  await Promise.all([loadRoles(),loadEmployees()]);renderCurrent();
}

// ══════════════════════════════════════════════════════════════════
function setView(v){
  currentView=v;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.view===v);
  });
  renderCurrent();
}
function renderCurrent(){
  if(currentView==='dashboard')renderDashboard();
  else if(currentView==='employees')renderEmployeeList();
  else if(currentView==='detail')renderDetail();
  else if(currentView==='calendar')renderCalendar();
  else if(currentView==='rules')renderRules();
  else if(currentView==='retired'){loadRetired().then(()=>renderRetired());}
  else if(currentView==='salary')renderSalary();
  else if(currentView==='monthly'){loadMonthly(currentMonthlyYM).then(()=>renderMonthly());}
  else if(currentView==='bonus'){loadBonus(currentBonusYM).then(()=>renderBonus());}
  else if(currentView==='roles')renderRoles();
}
document.querySelectorAll('.nav-item').forEach(el=>{
  el.addEventListener('click',()=>{selectedEmpId=null;setView(el.dataset.view);});
});

// ══════════════════════════════════════════════════════════════════
document.getElementById('today-label').textContent=TODAY;
(async()=>{await Promise.all([loadEmployees(),loadRoles()]);renderDashboard();})();
</script>
