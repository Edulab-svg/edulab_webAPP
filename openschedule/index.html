<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新教室オープン スケジュール管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;background:#f8f7f4;color:#1e293b;font-size:13px}
input,select,button,textarea{font-family:inherit;font-size:13px}
button{cursor:pointer}
::-webkit-scrollbar{width:6px;height:14px}
::-webkit-scrollbar-track{background:#f1f5f9;border-radius:7px}
::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:7px;border:2px solid #f1f5f9}
::-webkit-scrollbar-thumb:hover{background:#64748b}
.fade{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.sync-badge{animation:pulse 2s infinite}
.modal-bg{position:fixed;inset:0;z-index:1000;background:rgba(15,23,42,.4);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fff;border-radius:14px;width:100%;max-width:520px;max-height:85vh;overflow:auto;box-shadow:0 20px 50px rgba(0,0,0,.18)}
.modal-head{padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;border-radius:14px 14px 0 0}
.modal-head h3{font-size:15px;font-weight:700}
.modal-body{padding:18px 20px}
.close-btn{background:#f1f5f9;border:none;border-radius:7px;width:30px;height:30px;font-size:15px;display:flex;align-items:center;justify-content:center}
.fl{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:3px}
.fi{width:100%;padding:7px 10px;border-radius:7px;border:1.5px solid #e2e8f0;outline:none;transition:border .2s;font-size:13px}
.fi:focus{border-color:#3a7ca5}
.btn-p{padding:9px 18px;border-radius:9px;border:none;background:linear-gradient(135deg,#1e3a5f,#3a7ca5);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(30,58,95,.2)}
.btn-s{padding:9px 18px;border-radius:9px;border:1.5px solid #e2e8f0;background:#fff;color:#475569;font-weight:600}
.btn-d{padding:7px 12px;border-radius:7px;border:none;background:#fef2f2;color:#dc2626;font-weight:600;font-size:12px}
.btn-sm{width:22px;height:22px;border-radius:5px;border:none;background:rgba(0,0,0,.05);font-size:11px;display:inline-flex;align-items:center;justify-content:center}
.gap-sm{display:flex;flex-direction:column;gap:12px}
.st{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600;display:inline-block}
.st-0{background:#f1f5f9;color:#64748b}.st-1{background:#eff6ff;color:#2563eb}.st-2{background:#f0fdf4;color:#16a34a}.st-3{background:#fef2f2;color:#dc2626}
.badge{padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500;display:inline-block}
.badge-rakuten{background:#fef3c7;color:#92400e}.badge-mono{background:#e0e7ff;color:#3730a3}.badge-other{background:#f1f5f9;color:#475569}
.badge-honbu{background:#fce7f3;color:#be185d}.badge-self{background:#f0fdf4;color:#166534}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:12px;cursor:pointer;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.pbar{background:#e2e8f0;border-radius:4px;height:6px;overflow:hidden;flex:1}
.pbar-fill{height:100%;border-radius:4px;transition:width .4s}
.drag-handle{cursor:grab;color:#cbd5e1;padding:0 4px;flex-shrink:0;font-size:14px;user-select:none;line-height:1;display:flex;align-items:center}.drag-handle:hover{color:#94a3b8}.drag-handle:active{cursor:grabbing}
.drag-over-before{box-shadow:0 -2px 0 0 #3a7ca5!important}.drag-over-after{box-shadow:0 2px 0 0 #3a7ca5!important}
</style>
</head>
<body>
<div id="app"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#64748b">読み込み中...</div></div>
<script>
// ─── API ───
const B=(()=>{const p=document.baseURI.replace(/\/[^\/]*$/,'/');return p.endsWith('/')?p:p+'/'})();
function api(route,action,body){
  let url=B+'api/index.php?route='+encodeURI(route);
  if(action) url+='&action='+action;
  url+='&_t='+Date.now();
  const opts={headers:{'Content-Type':'application/json','Cache-Control':'no-cache'}};
  if(!action && !body){opts.method='GET'}
  else{opts.method='POST';opts.body=JSON.stringify(body||{})}
  return fetch(url,opts).then(r=>r.text()).then(t=>{
    try{return JSON.parse(t)}catch(e){console.error('API error:',t);alert('APIエラー: '+t.substring(0,300));return null}
  }).catch(e=>{console.error(e);alert('通信エラー: '+e.message);return null});
}
const A={
  g:r=>api(r),
  p:(r,b)=>api(r,'',b),
  u:(r,b)=>api(r,'update',b),
  pa:(r,b)=>api(r,'patch',b),
  d:r=>api(r,'delete',{}),
  copy:(r,b)=>api(r,'copy',b),
  shift:(r,b)=>api(r,'shift',b),
  delCat:(r,cat)=>api(r,'delete_category',{category:cat}),
};

// ─── DOM Helper ───
const h=(tag,props,...ch)=>{
  const el=document.createElement(tag);
  if(props)for(const[k,v]of Object.entries(props)){
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else if(k==='checked'){el.checked=v}
    else if(k==='value')el.value=v;
    else if(k==='selected')el.selected=v;
    else if(k==='disabled'){el.disabled=v}
    else el.setAttribute(k,v);
  }
  for(const c of ch.flat()){if(c==null||c===false)continue;el.appendChild(typeof c==='string'?document.createTextNode(c):c)}
  return el;
};

// ─── Utils ───
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r};
const fS=d=>{const x=new Date(d);return`${x.getMonth()+1}/${x.getDate()}`};
const fF=d=>{const x=new Date(d);return`${x.getFullYear()}/${x.getMonth()+1}/${x.getDate()}`};
const fI=d=>{const x=new Date(d);return`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`};
const DN=["日","月","火","水","木","金","土"];
const dB=(a,b)=>Math.round((new Date(b)-new Date(a))/864e5);
const CC=["#2563eb","#059669","#d97706","#dc2626","#7c3aed","#0891b2","#be185d","#65a30d","#ea580c","#6366f1","#0d9488","#c026d3","#ca8a04","#e11d48","#4f46e5"];
const SN=["未着手","進行中","完了","遅延"];
const SC=[{b:"#f1f5f9",f:"#64748b",r:"#94a3b8"},{b:"#eff6ff",f:"#2563eb",r:"#3b82f6"},{b:"#f0fdf4",f:"#16a34a",r:"#22c55e"},{b:"#fef2f2",f:"#dc2626",r:"#ef4444"}];

// ─── State ───
let PAGE='list', PID=null, PROJ=null, TASKS=[], EQUIP=[], TAB='schedule', VER=0, POLL=null, DRAG=null, DRAG_READY=false, CAT_DRAG_READY=false;

function getCategoryOrder(){
  const existing=[...new Set(TASKS.map(t=>t.category))];
  const from=PROJ&&PROJ.task_category_order;
  if(!Array.isArray(from)||!from.length)return existing;
  const out=[];
  for(const c of from){if(existing.includes(c)&&!out.includes(c))out.push(c);}
  for(const c of existing){if(!out.includes(c))out.push(c);}
  return out;
}
function rebuildTasksFromCategoryOrder(order){
  const next=[];
  order.forEach(c=>{
    next.push(...TASKS.filter(t=>t.category===c).sort((a,b)=>(a.sort_order-b.sort_order)||String(a.id).localeCompare(String(b.id))));
  });
  return next;
}

function field(label,type,ph,val,onChange){
  return h('div',null,h('label',{className:'fl'},label),
    h('input',{className:'fi',type,placeholder:ph,value:val,onInput:e=>onChange(e.target.value),onChange:e=>onChange(e.target.value)}));
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
async function render(){
  const app=document.getElementById('app');app.innerHTML='';
  if(PAGE==='list') app.appendChild(await renderList());
  else app.appendChild(await renderProject());
}

// ═══════════════════════════════════════
// PROJECT LIST (Dashboard)
// ═══════════════════════════════════════
async function renderList(){
  if(POLL){clearInterval(POLL);POLL=null}
  const projects=await A.g('dashboard');

  const wrap=h('div',{style:'min-height:100vh;background:linear-gradient(135deg,#1e3a5f 0%,#2d5a87 40%,#3a7ca5 100%);padding:30px 20px'});
  const inner=h('div',{style:'max-width:800px;margin:0 auto'});

  inner.appendChild(h('div',{style:'text-align:center;color:#fff;margin-bottom:30px'},
    h('div',{style:'font-size:40px;margin-bottom:8px'},'📚'),
    h('h1',{style:'font-size:24px;font-weight:800;margin:0'},'新教室オープン スケジュール管理'),
    h('p',{style:'opacity:.8;margin-top:6px;font-size:13px'},`${projects.length}件のプロジェクト`)
  ));

  // ─── Summary cards ───
  const active=projects.filter(p=>p.status==='準備中');
  if(active.length){
    const sumRow=h('div',{style:'display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:20px'});
    active.forEach(p=>{
      const dl=dB(new Date(),p.open_date);const pct=p.taskTotal?Math.round(p.taskDone/p.taskTotal*100):0;
      const c=h('div',{className:'card',style:'cursor:pointer',onClick:()=>openProject(p.id)});
      c.appendChild(h('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px'},
        h('div',{style:'font-weight:700;font-size:14px'},p.name),
        h('div',{style:`font-size:18px;font-weight:800;color:${dl<=7?'#dc2626':'#1e3a5f'}`},dl>0?`${dl}日`:dl===0?'本日':'済')
      ));
      const bar=h('div',{style:'display:flex;align-items:center;gap:8px'});
      bar.appendChild(h('div',{className:'pbar'},h('div',{className:'pbar-fill',style:`width:${pct}%;background:${pct>=80?'#22c55e':pct>=50?'#3b82f6':'#f59e0b'}`})));
      bar.appendChild(h('span',{style:'font-size:11px;color:#64748b;white-space:nowrap'},`${pct}%`));
      c.appendChild(bar);
      c.appendChild(h('div',{style:'font-size:11px;color:#94a3b8;margin-top:6px'},`オープン：${fF(p.open_date)}　タスク：${p.taskDone}/${p.taskTotal}　備品：${p.equipDone}/${p.equipTotal}`));
      sumRow.appendChild(c);
    });
    inner.appendChild(sumRow);
  }

  // ─── All projects list ───
  const listBox=h('div',null);
  const statGroups=[['準備中','🔨 準備中'],['オープン済','✅ オープン済'],['アーカイブ','📁 アーカイブ']];
  for(const [st,label] of statGroups){
    const gp=projects.filter(p=>p.status===st);
    if(!gp.length)continue;
    listBox.appendChild(h('div',{style:'color:rgba(255,255,255,.7);font-size:12px;font-weight:600;margin:16px 0 8px 4px'},label));
    gp.forEach(p=>{
      const pct=p.taskTotal?Math.round(p.taskDone/p.taskTotal*100):0;
      const row=h('div',{className:'card fade',style:'padding:14px 20px;display:flex;justify-content:space-between;align-items:center',onClick:()=>openProject(p.id)});
      row.appendChild(h('div',null,
        h('div',{style:'font-size:15px;font-weight:700'},p.name),
        h('div',{style:'font-size:12px;color:#64748b;margin-top:3px'},
          `オープン：${fF(p.open_date)}`,
          p.staff?.length?`　👤 ${JSON.parse(typeof p.staff==='string'?p.staff:'[]').join(', ')}`:'')
      ));
      row.appendChild(h('div',{style:'display:flex;align-items:center;gap:12px'},
        h('div',{style:'text-align:right'},
          h('div',{style:`font-size:16px;font-weight:700;color:${pct>=100?'#16a34a':'#1e3a5f'}`},`${pct}%`),
          h('div',{style:'font-size:10px;color:#94a3b8'},'タスク進捗')
        ),
        h('button',{onClick:e=>{e.stopPropagation();showCopyProject(p)},style:'background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;padding:5px 8px;font-size:11px;color:#64748b',title:'この教室を元に新規作成'},'📋 複製'),
        h('button',{onClick:e=>{e.stopPropagation();deleteProject(p)},style:'background:#fef2f2;border:none;border-radius:7px;padding:5px 8px;font-size:11px;color:#dc2626'},'削除')
      ));
      listBox.appendChild(row);
    });
  }
  inner.appendChild(listBox);

  // ─── New project button ───
  inner.appendChild(h('button',{className:'btn-p',style:'width:100%;margin-top:16px;padding:14px;font-size:14px;border-radius:14px',onClick:showNewProject},'＋ 新しい教室プロジェクトを作成'));

  wrap.appendChild(inner);
  return wrap;
}

async function deleteProject(p){
  if(!confirm('「'+p.name+'」を削除しますか？'))return;
  console.log('Deleting project:', p.id);
  const res=await A.d('projects/'+p.id);
  console.log('Delete result:', res);
  if(res&&res.ok){console.log('Delete OK, refreshing...');await render();console.log('Render done')}
  else{alert('削除に失敗しました: '+JSON.stringify(res))}
}

async function openProject(id){
  PID=id;PAGE='project';
  const [p,t,e]=await Promise.all([A.g(`projects/${id}`),A.g(`projects/${id}/tasks`),A.g(`projects/${id}/equipment`)]);
  PROJ=p;TASKS=t;EQUIP=e;VER=p.version;TAB='schedule';
  render();
  // Start polling
  POLL=setInterval(async()=>{
    try{const{version}=await A.g(`projects/${PID}/version`);
      if(version>VER){VER=version;
        const[p2,t2,e2]=await Promise.all([A.g(`projects/${PID}`),A.g(`projects/${PID}/tasks`),A.g(`projects/${PID}/equipment`)]);
        if(p2&&!p2.error)PROJ=p2;
        TASKS=t2;EQUIP=e2;render();
      }
    }catch(e){}
  },3000);
}

// ─── New Project Modal ───
function showNewProject(){
  const form={name:'',openDate:'',staff:['','','']};
  showModal('新規プロジェクト作成',(body,close)=>{
    const f=h('div',{className:'gap-sm'});
    const btn=h('button',{className:'btn-p',style:'width:100%;margin-top:12px;padding:12px;opacity:.5',disabled:true,onClick:async()=>{
      if(!form.name||!form.openDate)return;
      btn.textContent='作成中...';btn.disabled=true;
      const res=await A.p('projects',{name:form.name,open_date:form.openDate,staff:form.staff.filter(Boolean)});
      close();openProject(res.id);
    }},'テンプレートからスケジュールを生成 →');
    const upd=()=>{const ok=form.name&&form.openDate;btn.disabled=!ok;btn.style.opacity=ok?'1':'.5'};
    f.appendChild(field('教室名','text','例：英賀保駅前教室',form.name,v=>{form.name=v;upd()}));
    f.appendChild(field('オープン予定日','date','',form.openDate,v=>{form.openDate=v;upd()}));
    f.appendChild(h('div',null,h('label',{className:'fl'},'担当者名'),h('div',{style:'display:flex;gap:6px'},
      ...form.staff.map((s,i)=>h('input',{className:'fi',style:'flex:1',placeholder:`担当者${i+1}`,value:s,onInput:e=>{form.staff[i]=e.target.value}})))));
    f.appendChild(btn);
    body.appendChild(f);
  });
}

// ─── Copy Project Modal ───
function showCopyProject(src){
  const form={name:'',openDate:''};
  showModal(`「${src.name}」を元に新教室を作成`,(body,close)=>{
    const f=h('div',{className:'gap-sm'});
    f.appendChild(h('p',{style:'font-size:12px;color:#64748b;margin-bottom:4px'},`前回のタスク・備品リストをコピーします。日程はオープン日に合わせて自動調整されます。チェック状態はリセットされます。`));
    const btn=h('button',{className:'btn-p',style:'width:100%;margin-top:12px;padding:12px;opacity:.5',disabled:true,onClick:async()=>{
      if(!form.name||!form.openDate)return;
      btn.textContent='作成中...';btn.disabled=true;
      const daysDiff=dB(new Date(src.open_date),new Date(form.openDate));
      const res=await A.copy(`projects/${src.id}`,{name:form.name,open_date:form.openDate,daysDiff});
      close();openProject(res.id);
    }},'複製して作成 →');
    const upd=()=>{const ok=form.name&&form.openDate;btn.disabled=!ok;btn.style.opacity=ok?'1':'.5'};
    f.appendChild(field('新しい教室名','text','例：姫路駅前教室','',v=>{form.name=v;upd()}));
    f.appendChild(field('オープン予定日','date','','',v=>{form.openDate=v;upd()}));
    f.appendChild(btn);
    body.appendChild(f);
  });
}

// ═══════════════════════════════════════
// PROJECT PAGE
// ═══════════════════════════════════════
async function renderProject(){
  if(!PROJ)return h('div',null,'読込中');
  const od=new Date(PROJ.open_date);const dl=dB(new Date(),od);
  const done=TASKS.filter(t=>t.status==='完了').length;const eqDone=EQUIP.filter(e=>e.checked).length;
  const root=h('div',null);

  // Header
  const hdr=h('div',{style:'background:linear-gradient(135deg,#1e3a5f,#2d5a87);padding:14px 24px;color:#fff;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px'});
  hdr.appendChild(h('div',{style:'display:flex;align-items:center;gap:12px'},
    h('button',{className:'btn-s',style:'padding:5px 12px;font-size:12px;color:#fff;border-color:rgba(255,255,255,.3);background:transparent',onClick:()=>{clearInterval(POLL);POLL=null;PAGE='list';render()}},'← 戻る'),
    h('div',null,
      h('h1',{style:'font-size:17px;font-weight:700;margin:0'},PROJ.name),
      h('p',{style:'font-size:11px;opacity:.8;margin:0'},`オープン：${fF(od)}　残り ${dl>0?dl+'日':dl===0?'本日':'オープン済'}`)
    )
  ));
  const hright=h('div',{style:'display:flex;gap:8px;align-items:center'});
  // Status change
  const stSel=h('select',{style:'font-size:11px;padding:4px 8px;border-radius:7px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;cursor:pointer;font-family:inherit',onChange:async e=>{
    await A.u(`projects/${PID}`,{...PROJ,status:e.target.value});PROJ.status=e.target.value;
  }});
  ['準備中','オープン済','アーカイブ'].forEach(s=>{const o=h('option',{value:s,style:'color:#1e293b'},s);if(s===PROJ.status)o.selected=true;stSel.appendChild(o)});
  hright.appendChild(stSel);
  hright.appendChild(h('div',{style:'background:rgba(255,255,255,.15);border-radius:7px;padding:4px 10px;text-align:center'},h('div',{style:'font-size:9px;opacity:.8'},'タスク'),h('div',{style:'font-size:14px;font-weight:700'},`${done}/${TASKS.length}`)));
  hright.appendChild(h('div',{style:'background:rgba(255,255,255,.15);border-radius:7px;padding:4px 10px;text-align:center'},h('div',{style:'font-size:9px;opacity:.8'},'備品'),h('div',{style:'font-size:14px;font-weight:700'},`${eqDone}/${EQUIP.length}`)));
  hdr.appendChild(hright);
  root.appendChild(hdr);

  // Tabs
  const tabs=h('div',{style:'display:flex;background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px'});
  [['schedule','📅 スケジュール'],['equipment','📦 備品'],['summary','📊 進捗']].forEach(([id,lb])=>{
    tabs.appendChild(h('button',{style:`padding:11px 16px;border:none;background:none;font-size:13px;font-weight:${TAB===id?'600':'400'};color:${TAB===id?'#1e3a5f':'#64748b'};border-bottom:${TAB===id?'3px solid #1e3a5f':'3px solid transparent'}`,onClick:()=>{TAB=id;render()}},lb));
  });
  root.appendChild(tabs);

  const content=h('div',{style:'padding:18px 24px'});
  if(TAB==='schedule') content.appendChild(renderSchedule());
  else if(TAB==='equipment') content.appendChild(renderEquipment());
  else content.appendChild(renderSummary());
  root.appendChild(content);
  return root;
}

// ═══════════════════════════════════════
// SCHEDULE (Gantt - Sticky Left)
// ═══════════════════════════════════════
function renderSchedule(){
  const od=new Date(PROJ.open_date);const tasks=TASKS;
  const cats=getCategoryOrder();
  const allD=tasks.flatMap(t=>[new Date(t.start_date),new Date(t.end_date)]);
  const mn=allD.length?new Date(Math.min(...allD.map(d=>d.getTime()))):od;
  const mx=allD.length?new Date(Math.max(...allD.map(d=>d.getTime()),od.getTime())):od;
  const sd=addD(mn,-2);const ed=addD(mx,3);const td=dB(sd,ed);const todayOff=dB(sd,new Date());const W=28;
  const LW=240;const SW=72;

  const root=h('div',null);

async function reload(){
  const scrollY=window.scrollY;
  const g=document.querySelector('[data-gantt]');

  const g2=document.querySelector('[data-gantt]');

}
