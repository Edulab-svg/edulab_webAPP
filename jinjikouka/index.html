<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年度 人事考課</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #f0f2f7;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  background: #fff;
  border-bottom: 1px solid #e0e4ef;
  padding: 0 40px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.header-inner {
  max-width: 900px;
  margin: 0 auto;
  height: 64px;
  display: flex;
  align-items: center;
}
.header-title {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 900;
  font-size: 20px;
  letter-spacing: 0.04em;
  color: #1a1e2e;
}
.header-title span { color: #3a6ff8; }

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
}

.lead {
  text-align: center;
  margin-bottom: 48px;
}
.lead-title {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 900;
  font-size: 28px;
  color: #1a1e2e;
  margin-bottom: 10px;
  letter-spacing: 0.04em;
}
.lead-sub {
  font-size: 14px;
  color: #5a6380;
}

.brand-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  max-width: 720px;
  width: 100%;
}

.brand-card {
  background: #fff;
  border: 1.5px solid #e0e4ef;
  border-radius: 14px;
  padding: 32px 28px;
  cursor: pointer;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
  transition: all 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  position: relative;
  overflow: hidden;
}
.brand-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  border-radius: 14px 14px 0 0;
}
.brand-card:hover {
  border-color: var(--card-color);
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  transform: translateY(-3px);
}

.brand-card.manten      { --card-color: #3a6ff8; }
.brand-card.manten-plus { --card-color: #e07830; }
.brand-card.atama       { --card-color: #0fad7a; }
.brand-card.honbu       { --card-color: #7c3aed; }

.brand-card.manten::before      { background: #3a6ff8; }
.brand-card.manten-plus::before { background: #e07830; }
.brand-card.atama::before       { background: #0fad7a; }
.brand-card.honbu::before       { background: #7c3aed; }

.brand-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  margin-bottom: 4px;
}
.brand-card.manten      .brand-icon { background: #eef3ff; }
.brand-card.manten-plus .brand-icon { background: #fff4ed; }
.brand-card.atama       .brand-icon { background: #edfaf5; }
.brand-card.honbu       .brand-icon { background: #f5f0ff; }

.brand-name {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 900;
  font-size: 17px;
  color: #1a1e2e;
  line-height: 1.3;
}
.brand-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 900;
  padding: 2px 8px;
  border-radius: 4px;
  margin-left: 6px;
  vertical-align: middle;
}
.brand-card.manten-plus .brand-badge { background: #e07830; color: #fff; }
.brand-card.atama       .brand-badge { background: #0fad7a; color: #fff; }
.brand-card.honbu       .brand-badge { background: #7c3aed; color: #fff; }

.brand-desc {
  font-size: 12px;
  color: #9aa0b8;
  line-height: 1.5;
}

.brand-arrow {
  position: absolute;
  right: 22px;
  bottom: 22px;
  font-size: 18px;
  color: #c8cfe0;
  transition: all 0.2s;
}
.brand-card:hover .brand-arrow {
  color: var(--card-color);
  transform: translateX(3px);
}

.coming-soon {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  background: #f0f2f7;
  color: #9aa0b8;
  border: 1px solid #e0e4ef;
}

.footer {
  text-align: center;
  padding: 24px;
  font-size: 12px;
  color: #9aa0b8;
}

@media (max-width: 600px) {
  .brand-grid { grid-template-columns: 1fr; max-width: 400px; }
  .lead-title { font-size: 22px; }
  .header { padding: 0 20px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-title">2026年度　<span>人事考課システム</span></div>
  </div>
</div>

<div class="main">
  <div class="lead">
    <div class="lead-title">ブランドを選択してください</div>
    <div class="lead-sub">評価を入力するブランドの人事考課システムを開いてください</div>
  </div>

  <div class="brand-grid">

    <!-- まんてん個別 -->
    <a class="brand-card manten" href="./index_manten.html">
      <div class="brand-icon">📘</div>
      <div class="brand-name">まんてん個別</div>
      <div class="brand-desc">まんてん個別ブランドの<br>人事考課システム</div>
      <div class="brand-arrow">→</div>
    </a>

    <!-- まんてん個別プラス -->
    <a class="brand-card manten-plus" href="./index_plus.html">
      <div class="brand-icon">📙</div>
      <div class="brand-name">まんてん個別<span class="brand-badge">PLUS</span></div>
      <div class="brand-desc">まんてん個別プラスブランドの<br>人事考課システム</div>
      <div class="brand-arrow">→</div>
    </a>

    <!-- アタマプラスFC -->
    <a class="brand-card atama" href="./index_atama.html">
      <div class="brand-icon">📗</div>
      <div class="brand-name">アタマプラス<span class="brand-badge">FC</span></div>
      <div class="brand-desc">アタマプラスFCブランドの<br>人事考課システム</div>
      <div class="brand-arrow">→</div>
    </a>

    <!-- 本部 -->
    <a class="brand-card honbu" href="./index_honbu.html">
      <div class="brand-icon">🏢</div>
      <div class="brand-name">本部<span class="brand-badge">HQ</span></div>
      <div class="brand-desc">本部スタッフ向けの<br>人事考課システム</div>
      <div class="brand-arrow">→</div>
    </a>

  </div>
</div>

<div class="footer">
  © 2026 まんてん個別グループ　人事考課システム
</div>

</body>
</html>
