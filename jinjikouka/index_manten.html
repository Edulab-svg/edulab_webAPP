<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年度 人事考課（まんてん個別）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f7;
  --surface: #ffffff;
  --surface2: #f5f7fb;
  --border: #e0e4ef;
  --border2: #c8cfe0;
  --text: #1a1e2e;
  --text2: #5a6380;
  --text3: #9aa0b8;
  --accent: #3a6ff8;
  --accent2: #2558d6;
  --green: #0fad7a;
  --yellow: #c89a10;
  --red: #e03e3e;
  --A: #0fad7a;
  --B: #3a6ff8;
  --C: #e03e3e;
  --radius: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,0.07);
  --shadow2: 0 2px 12px rgba(0,0,0,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

.header { background: #fff; border-bottom: 1px solid var(--border); padding: 0 32px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
.header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; gap: 24px; }
.header-title { font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: 18px; letter-spacing: 0.04em; white-space: nowrap; }
.header-title span { color: var(--accent); }
.header-nav { display: flex; gap: 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 4px; }
.nav-btn { background: none; border: none; color: var(--text2); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; padding: 6px 16px; border-radius: 6px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.nav-btn.active { background: var(--accent); color: #fff; font-weight: 500; }
.nav-btn:hover:not(.active) { background: var(--border); color: var(--text); }

.main { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }
.view { display: none; }
.view.active { display: block; }

.staff-section { margin-bottom: 24px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-title { font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 0.04em; }
.section-title::before { content: ''; display: inline-block; width: 3px; height: 15px; background: var(--accent); border-radius: 2px; margin-right: 10px; vertical-align: middle; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 7px; border: none; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); color: var(--text); }

.staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.staff-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; transition: all 0.2s; position: relative; box-shadow: var(--shadow); }
.staff-card:hover { border-color: var(--accent); box-shadow: var(--shadow2); transform: translateY(-1px); }
.staff-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(58,111,248,0.15); }
.staff-card-name { font-weight: 700; font-size: 15px; margin-bottom: 3px; }
.staff-card-meta { color: var(--text2); font-size: 12px; margin-bottom: 8px; }
.staff-score-badge { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
.staff-score-badge.good { color: var(--green); border-color: #a0ddc8; background: #edfaf5; }
.staff-score-badge.warn { color: var(--yellow); border-color: #e8d080; background: #fdf8dc; }
.staff-score-badge.bad  { color: var(--red); border-color: #f0b0b0; background: #fff0f0; }

.add-staff-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow); }
.form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 11px; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; font-weight: 600; }
.form-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; padding: 7px 12px; outline: none; transition: border-color 0.15s; min-width: 150px; }
.form-input:focus { border-color: var(--accent); background: #fff; }
.form-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; padding: 7px 12px; outline: none; cursor: pointer; }
.form-select:focus { border-color: var(--accent); }

.eval-header { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 22px; margin-bottom: 18px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; box-shadow: var(--shadow); }
.eval-header-info { flex: 1; }
.eval-header-name { font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: 20px; margin-bottom: 3px; }
.eval-header-meta { color: var(--text2); font-size: 12px; }
.score-display { text-align: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 18px; min-width: 110px; }
.score-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; font-weight: 600; }
.score-value { font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: 28px; }
.score-value.good { color: var(--green); }
.score-value.warn { color: var(--yellow); }
.score-value.bad  { color: var(--red); }
.score-line { font-size: 10px; color: var(--text3); margin-top: 2px; }

.period-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
.period-tab { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; cursor: pointer; transition: all 0.2s; text-align: center; box-shadow: var(--shadow); }
.period-tab.active { background: var(--accent); border-color: var(--accent); }
.period-tab-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
.period-tab.active .period-tab-label { color: rgba(255,255,255,0.75); }
.period-tab-name { font-weight: 700; font-size: 12px; color: var(--text); }
.period-tab.active .period-tab-name { color: #fff; }

.eval-category { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow); }
.eval-category-header { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 9px 18px; display: flex; align-items: center; justify-content: space-between; }
.eval-category-name { font-weight: 700; font-size: 13px; }
.eval-category-score { font-size: 12px; color: var(--text2); }
.eval-category-score span { font-weight: 700; color: var(--accent); font-size: 14px; }
.eval-item { border-bottom: 1px solid var(--border); padding: 11px 18px; display: grid; grid-template-columns: 1fr auto auto auto auto; align-items: center; gap: 14px; }
.eval-item.no-self { grid-template-columns: 1fr auto auto auto; }
.eval-item:last-child { border-bottom: none; }
.eval-item:hover { background: var(--surface2); }
.eval-item-name { font-size: 13px; font-weight: 500; line-height: 1.4; }
.eval-item-criteria { font-size: 11px; color: var(--text3); margin-top: 2px; }
.eval-item-rate { font-size: 11px; color: var(--text3); text-align: center; white-space: nowrap; }
.eval-item-rate span { color: var(--text2); font-weight: 700; }
.eval-type-label { font-size: 10px; color: var(--text3); text-align: center; margin-bottom: 3px; }
.abc-selector { display: flex; gap: 3px; align-items: center; }
.abc-btn { width: 34px; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans JP', sans-serif; }
.abc-btn:hover { border-color: var(--border2); background: var(--border); color: var(--text); }
.abc-btn.selected-A { background: #edfaf5; border-color: var(--A); color: var(--A); }
.abc-btn.selected-B { background: #eef3ff; border-color: var(--B); color: var(--B); }
.abc-btn.selected-C { background: #fff0f0; border-color: var(--C); color: var(--C); }
.abc-btn.selected-評価なし { background: var(--surface2); border-color: var(--border2); color: var(--text3); }
.eval-item-score { min-width: 46px; text-align: right; }
.item-score-value { font-size: 16px; font-weight: 700; font-family: 'Zen Kaku Gothic New', sans-serif; }
.item-score-value.pos { color: var(--accent); }
.item-score-value.zero { color: var(--text3); }

.eval-staff-bar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 12px; margin-bottom: 14px; box-shadow: var(--shadow); }
.eval-staff-chip { display: flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.eval-staff-chip:hover { border-color: var(--accent); color: var(--text); }
.eval-staff-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
.eval-staff-chip.active .chip-score { color: rgba(255,255,255,0.8); }
.chip-score { font-size: 11px; color: var(--text3); }
.eval-add-btn { display: flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; border: 1px dashed var(--border2); background: none; color: var(--text3); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: all 0.15s; }
.eval-add-btn:hover { border-color: var(--accent); color: var(--accent); }

.dashboard-top { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 18px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); }
.kpi-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; font-weight: 600; }
.kpi-value { font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: 30px; line-height: 1; margin-bottom: 2px; }
.kpi-sub { font-size: 11px; color: var(--text3); }
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
.chart-card-title { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; font-weight: 600; }

.data-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 18px; box-shadow: var(--shadow); }
.data-table table { width: 100%; border-collapse: collapse; }
.data-table th { background: var(--surface2); border-bottom: 2px solid var(--border); padding: 9px 13px; text-align: left; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; white-space: nowrap; }
.data-table th.accent-head { background: #eef3ff; color: var(--accent); }
.data-table td { padding: 10px 13px; border-bottom: 1px solid var(--border); font-size: 13px; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--surface2); }
.rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 6px; font-size: 11px; font-weight: 700; }
.rank-1 { background: #fff8d0; color: #a87800; border: 1px solid #e8c840; }
.rank-2 { background: #f5f5f5; color: #777; border: 1px solid #ddd; }
.rank-3 { background: #fff0e4; color: #b05820; border: 1px solid #e8b880; }
.rank-n { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
.progress-bar-wrap { display: flex; align-items: center; gap: 8px; }
.progress-bar { flex: 1; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; min-width: 70px; }
.progress-fill { height: 100%; border-radius: 3px; }
.progress-fill.good { background: var(--green); }
.progress-fill.warn { background: var(--yellow); }
.progress-fill.bad  { background: var(--red); }
.progress-pct { font-size: 12px; white-space: nowrap; }
.badge-ok  { padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 700; background: #edfaf5; color: var(--green); border: 1px solid #a0ddc8; }
.badge-ng  { padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 700; background: #fff0f0; color: var(--red); border: 1px solid #f0b0b0; }
.sc-good { color: var(--green); font-weight: 700; font-family: 'Zen Kaku Gothic New', sans-serif; }
.sc-warn { color: var(--yellow); font-weight: 700; font-family: 'Zen Kaku Gothic New', sans-serif; }
.sc-bad  { color: var(--red);   font-weight: 700; font-family: 'Zen Kaku Gothic New', sans-serif; }
.sc-none { color: var(--text3); }

.mg-badge { display: inline-block; background: #fffbe0; border: 1px solid #e8d060; color: #a07800; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; letter-spacing: 0.04em; margin-left: 5px; vertical-align: middle; }
.mg-score-breakdown { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 11px 15px; min-width: 190px; }
.mg-score-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; font-size: 13px; color: var(--text2); padding: 3px 0; }
.mg-score-row + .mg-score-row { border-top: 1px solid var(--border); margin-top: 4px; padding-top: 4px; }
.mg-score-row.total { color: var(--text); font-weight: 700; }
.mg-score-num { font-weight: 700; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 15px; }
.assign-section { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 13px; margin-top: 10px; }
.assign-title { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 7px; font-weight: 600; }
.assign-list { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 7px; }
.assign-chip { background: #eef3ff; border: 1px solid #c0d0fc; color: var(--accent); border-radius: 20px; padding: 2px 9px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
.assign-chip-remove { cursor: pointer; color: var(--text3); font-size: 13px; line-height: 1; transition: color 0.15s; }
.assign-chip-remove:hover { color: var(--red); }
.assign-select { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; padding: 5px 9px; outline: none; cursor: pointer; max-width: 200px; }
.mg-detail-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 18px; box-shadow: var(--shadow); }
.mg-detail-table table { width: 100%; border-collapse: collapse; }
.mg-detail-table th { background: #fffbe0; border-bottom: 1px solid var(--border); padding: 8px 13px; text-align: left; font-size: 11px; color: #a07800; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
.mg-detail-table td { padding: 10px 13px; border-bottom: 1px solid var(--border); font-size: 13px; }
.mg-detail-table tr:last-child td { border-bottom: none; }
.mg-detail-table tr:hover td { background: var(--surface2); }

.empty-state { text-align: center; padding: 56px 32px; color: var(--text3); }
.empty-icon { font-size: 42px; margin-bottom: 12px; }
.empty-title { font-size: 15px; font-weight: 700; color: var(--text2); margin-bottom: 5px; }
.empty-sub { font-size: 13px; }
.notif { position: fixed; bottom: 22px; right: 22px; background: var(--surface); border: 1px solid var(--green); color: var(--green); padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transform: translateY(6px); transition: all 0.25s; pointer-events: none; box-shadow: var(--shadow2); }
.notif.show { opacity: 1; transform: translateY(0); }
/* 評価基準インライン表示 */
.criteria-inline { display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
.ci-a { font-size: 10px; color: var(--A); font-weight: 600; }
.ci-b { font-size: 10px; color: var(--B); font-weight: 600; }
.ci-c { font-size: 10px; color: var(--C); font-weight: 600; }
/* 編集モーダル */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 400; display: none; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 28px; width: 420px; max-width: 92vw; box-shadow: var(--shadow2); }
.modal-title { font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700; font-size: 17px; margin-bottom: 20px; }
.modal-field { margin-bottom: 14px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; }
/* マスタ編集テーブル */
.master-table { width: 100%; border-collapse: collapse; }
.master-table th { background: var(--surface2); border-bottom: 2px solid var(--border); padding: 8px 10px; text-align: left; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; white-space: nowrap; }
.master-table td { padding: 7px 8px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
.master-table tr:last-child td { border-bottom: none; }
.master-table tr:hover td { background: #fafbff; }
.master-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: 'Noto Sans JP',sans-serif; font-size: 12px; padding: 4px 7px; outline: none; width: 100%; box-sizing: border-box; }
.master-input:focus { border-color: var(--accent); background: #fff; }
.rate-input { width: 54px !important; text-align: center; }
.master-cat-badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; background: #eef3ff; color: var(--accent); border: 1px solid #c0d0fc; }
.master-del-btn { background: #fff0f0; border: 1px solid #f0b0b0; color: var(--red); border-radius: 5px; width: 26px; height: 26px; cursor: pointer; font-size: 12px; }
.master-del-btn:hover { background: #ffe0e0; }
/* エリアカードグリッド */
.area-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
.area-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow);
}
.area-card:hover { border-color: var(--accent); box-shadow: var(--shadow2); transform: translateY(-2px); }
.area-card-name { font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700; font-size: 15px; margin-bottom: 10px; color: var(--text); }
.area-card-count { margin-bottom: 4px; }
/* エリアグループ */
.area-group-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 6px 0; border-bottom: 2px solid var(--border); }
.area-group-name { font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700; font-size: 14px; color: var(--text); }
.area-group-count { font-size: 12px; color: var(--text3); background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1px 8px; }
.area-unset { color: var(--text3); font-style: italic; }
@media (max-width: 768px) {
  .main { padding: 14px; }
  .eval-item { grid-template-columns: 1fr; gap: 8px; }
  .charts-grid { grid-template-columns: 1fr; }
  .header-inner { flex-wrap: wrap; height: auto; padding: 10px 0; }
}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="header-title">2026年度　<span>人事考課（まんてん個別）</span></div>
    <div class="header-nav">
      <button class="nav-btn active" onclick="showView('staff',this)">👥 スタッフ管理</button>
      <button class="nav-btn" onclick="showView('eval',this)" id="evalNavBtn">📋 評価入力</button>
      <button class="nav-btn" onclick="showView('master',this)">⚙️ 評価シートマスタ</button>
      <button class="nav-btn" onclick="showView('dashboard',this)">📊 ダッシュボード</button>
    </div>
  </div>
</div>
<div class="main">
  <div class="view active" id="view-staff">
    <div class="staff-section">
      <div class="section-header">
        <div class="section-title">スタッフ一覧</div>
        <button class="btn btn-primary" onclick="toggleAddForm()">＋ スタッフ追加</button>
      </div>
      <div class="add-staff-form" id="addStaffForm" style="display:none">
        <div class="form-row">
          <div class="form-group"><div class="form-label">氏名</div><input class="form-input" id="newName" placeholder="例：山田 太郎"/></div>
          <div class="form-group"><div class="form-label">教室名</div><input class="form-input" id="newRoom" placeholder="例：〇〇教室"/></div>

function getMasterItems(sheet, period) {
  if (app.masterData && app.masterData[sheet] && app.masterData[sheet][period]) {
    return app.masterData[sheet][period].items.map(function(r){
      return {id:r.item_id, cat:r.item_cat, name:r.item_name, rate:r.rate!==null?parseInt(r.rate):null, cA:r.c_a, cB:r.c_b, cC:r.c_c};
    });
  }
  return getItems(sheet);
}
function getMasterRaiseLine(sheet, period) {
  if (app.masterData && app.masterData[sheet] && app.masterData[sheet][period]) {
    return parseInt(app.masterData[sheet][period].raise_line) || RAISE_LINE.default;
  }
  return getRaiseLineDefault(sheet);
}
function getRaiseLineDefault(sheet) {
  if(sheet==='masterMG') return RAISE_LINE.mg;
  if(sheet==='master40under') return RAISE_LINE.under;
  return RAISE_LINE.default;
}

async function apiGet(action,params){
  var qs=new URLSearchParams(Object.assign({action,_t:Date.now()},params||{}));
  var res=await fetch(API+'?'+qs);var json=await res.json();
  if(!json.ok) throw new Error(json.error);return json.data;
}
async function apiPost(body){
  var res=await fetch(API+'?_t='+Date.now(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  var json=await res.json();if(!json.ok) throw new Error(json.error);return json.data;
}

var masterDirty = false;

async function loadMaster() {
  var sheet  = document.getElementById('masterSheet').value;
  var period = parseInt(document.getElementById('masterPeriod').value);
  var tbl    = document.getElementById('masterTable');
  tbl.innerHTML = '<div class="empty-state"><div class="empty-icon">⚙️</div><div class="empty-title">読み込み中...</div></div>';
  try {
    var data = await apiGet('get_master', {sheet: sheet, period: period});
    document.getElementById('masterRaiseLine').value = data.raise_line;
    renderMasterTable(data.items);
    masterDirty = false;
  } catch(e) { showNotif('読み込み失敗: '+e.message, true); }
}

function renderMasterTable(items) {
  var tbl = document.getElementById('masterTable');
  if (!items.length) {
    tbl.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">評価項目がありません</div></div>';
    return;
  }
  var rows = items.map(function(item, idx) {
    var rateVal = item.rate !== null && item.rate !== '' ? item.rate : '';
    return '<tr id="mrow_'+idx+'">' +
      '<td><span class="master-cat-badge">'+item.item_cat+'</span></td>' +
      '<td style="color:var(--text3);font-size:11px;white-space:nowrap">'+item.item_id+'</td>' +
      '<td><input class="master-input" value="'+escHtml(item.item_name)+'" onchange="markDirty()" data-field="item_name" data-idx="'+idx+'" /></td>' +
      '<td><input class="master-input rate-input" type="number" min="0" max="99" value="'+rateVal+'" placeholder="—" onchange="markDirty()" data-field="rate" data-idx="'+idx+'" /></td>' +
      '<td><input class="master-input" value="'+escHtml(item.c_a)+'" onchange="markDirty()" data-field="c_a" data-idx="'+idx+'" /></td>' +
      '<td><input class="master-input" value="'+escHtml(item.c_b)+'" onchange="markDirty()" data-field="c_b" data-idx="'+idx+'" /></td>' +
      '<td><input class="master-input" value="'+escHtml(item.c_c)+'" onchange="markDirty()" data-field="c_c" data-idx="'+idx+'" /></td>' +
      '<td><button class="master-del-btn" onclick="deleteMasterItem(\''+item.item_id+'\')" title="削除">🗑</button></td>' +
    '</tr>';
  }).join('');

  tbl.innerHTML = '<table class="master-table">' +
    '<thead><tr>' +
      '<th>カテゴリ</th><th>ID</th><th>項目名</th>' +
      '<th>掛け率</th><th>A（3点）基準</th><th>B（2点）基準</th><th>C（1点）基準</th><th></th>' +
    '</tr></thead>' +
    '<tbody>'+rows+'</tbody>' +
  '</table>';

  // Store items data for save
  tbl._items = items;
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

async function saveMaster() {
  var sheet  = document.getElementById('masterSheet').value;
  var period = parseInt(document.getElementById('masterPeriod').value);
  var rl     = parseInt(document.getElementById('masterRaiseLine').value) || 128;
  var tbl    = document.getElementById('masterTable');
  var baseItems = tbl._items || [];

  // 現在のinput値を収集
  var items = baseItems.map(function(item, idx) {
    var nameEl  = tbl.querySelector('[data-field="item_name"][data-idx="'+idx+'"]');
    var rateEl  = tbl.querySelector('[data-field="rate"][data-idx="'+idx+'"]');
    var caEl    = tbl.querySelector('[data-field="c_a"][data-idx="'+idx+'"]');
    var cbEl    = tbl.querySelector('[data-field="c_b"][data-idx="'+idx+'"]');
    var ccEl    = tbl.querySelector('[data-field="c_c"][data-idx="'+idx+'"]');
    return {
      item_id:   item.item_id,
      item_name: nameEl  ? nameEl.value  : item.item_name,
      item_cat:  item.item_cat,
      rate:      rateEl && rateEl.value !== '' ? rateEl.value : null,
      c_a:       caEl    ? caEl.value    : item.c_a,
      c_b:       cbEl    ? cbEl.value    : item.c_b,
      c_c:       ccEl    ? ccEl.value    : item.c_c,
    };
  });

  try {
    await apiPost({action:'save_master', sheet, period, items, raise_line: rl});
    // masterDataを更新
    var updated = await apiGet('get_master_all');
    app.masterData = updated;
    masterDirty = false;
    showNotif('✓ 第'+(period+1)+'回のマスタを保存しました');
    await loadMaster(); // 再描画
  } catch(e) { showNotif('保存失敗: '+e.message, true); }
}

function getEval(sid,period,iid){return(app.evals[sid]&&app.evals[sid][period]&&app.evals[sid][period][iid])||'';}
function calcScore(ev,rate){if(!ev||!rate)return 0;var pts=ev==='A'?3:ev==='B'?2:ev==='C'?1:0;return pts*rate;}
function getTotalScore(sid,period){
  var s=app.staff.find(function(x){return x.id==sid;});if(!s)return 0;
  var items=getMasterItems(s.sheet, period);
  var total=items.reduce(function(sum,item){return sum+calcScore(getEval(sid,period,item.id),item.rate);},0);
  var m=getEval(sid,period,'c08');if(m==='A'||m==='B')total+=5;return total;
}
function getMGAvg(mgId,period){
  var mg=app.staff.find(function(x){return x.id==mgId;});
  if(!mg||!mg.assigned_staff||!mg.assigned_staff.length)return null;
  var scores=mg.assigned_staff.map(function(sid){return app.staff.find(function(x){return x.id==sid;});}).filter(Boolean).map(function(s){return getTotalScore(s.id,period);});
  if(!scores.length)return null;
  return scores.reduce(function(a,b){return a+b;},0)/scores.length;
}
function getJudgeScore(sid,period){
  var s=app.staff.find(function(x){return x.id==sid;});if(!s)return 0;
  if(s.sheet!=='masterMG')return getTotalScore(sid,period);
  var own=getTotalScore(sid,period),avg=getMGAvg(sid,period);
  return avg===null?own:own+avg;
}
function getRaiseLine(sid){
  var s=app.staff.find(function(x){return x.id==sid;});if(!s)return RAISE_LINE.default;
  return getMasterRaiseLine(s.sheet, app.currentPeriod||0);
}
function scCol(score,sid){var l=getRaiseLine(sid);return score>=l?'var(--green)':score>=l*0.7?'var(--yellow)':'var(--red)';}

function showNotif(msg,isErr){

  el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2500);
}

      var members=app.staff.filter(function(s){return (s.area||'')===(area);});

        var mg2=getMGAvg(s.id,2);

          (assigned.length?'<div class="assign-list">'+chips+'</div>':'<div style="font-size:12px;color:var(--text3);margin-bottom:7px">未設定</div>')+

          '</div>';
      }

    h+='<div class="score-display"><div class="score-label">'+PERIODS[period]+'</div><div class="score-value '+sc+'">'+own+'</div><div class="score-line">昇給ライン: '+line+'点</div></div>';
  }
  h+='<div class="score-display" style="min-width:145px"><div class="score-label" style="color:var(--yellow)">目標達成ボーナス</div><div style="font-size:19px;font-weight:900;font-family:\'Zen Kaku Gothic New\',sans-serif;margin-top:5px;color:'+(bonusOk?'var(--yellow)':'var(--text3)')+'">'+(bonusOk?'＋5点':(mok===''?'—':'対象外'))+'</div><div style="font-size:10px;margin-top:3px;color:var(--text3);line-height:1.4">'+(bonusOk?'目標達成率 '+mok+' で自動加算':(mok===''?'目標達成率を入力してください':'C評価：加算なし'))+'</div></div></div>';

  var tabs='<div class="period-tabs">'+PERIODS.map(function(p,i){return'<div class="period-tab '+(i===period?'active':'')+'" onclick="switchPeriod('+i+')"><div class="period-tab-label">評価期間</div><div class="period-tab-name">'+p+'</div></div>';}).join('')+'</div>';

  var cats=CATEGORIES.map(function(catName){
    var hasSelf = catName==='教務' || catName==='教室運営';
    var ci=items.filter(function(item){return item.cat===catName;});
    var cs=ci.reduce(function(sum,item){return sum+calcScore(getEval(s.id,period,item.id),item.rate);},0);
    var rows=ci.map(function(item){
      var val=getEval(s.id,period,item.id);var iscore=calcScore(val,item.rate);
      var btns=['A','B','C'].map(function(abc){
        var sel=val===abc?'selected-'+abc:'';
        return'<button class="abc-btn '+sel+'" onclick="setEval('+s.id+','+period+',\''+item.id+'\',\''+abc+'\')">'+abc+'</button>';
      }).join('');
      if(item.cA==='評価なし'){var s2=val==='評価なし'?'selected-評価なし':'';btns+='<button class="abc-btn '+s2+'" onclick="setEval('+s.id+','+period+',\''+item.id+'\',\'評価なし\')">—</button>';}
      var criteriaHtml='<div class="criteria-inline">'+
        '<span class="ci-a">A: '+item.cA+'</span>'+
        '<span class="ci-b">B: '+item.cB+'</span>'+
        '<span class="ci-c">C: '+item.cC+'</span>'+
      '</div>';

      // 自己評価列（教務・教室運営のみ）
      var selfCol='';
      if(hasSelf){
        var selfId=item.id+'_self';
        var selfVal=getEval(s.id,period,selfId);
        var selfBtns=['A','B','C'].map(function(abc){
          var sel=selfVal===abc?'selected-'+abc:'';
          return'<button class="abc-btn '+sel+'" onclick="setEval('+s.id+','+period+',\''+selfId+'\',\''+abc+'\')">'+abc+'</button>';
        }).join('');
        if(item.cA==='評価なし'){var s3=selfVal==='評価なし'?'selected-評価なし':'';selfBtns+='<button class="abc-btn '+s3+'" onclick="setEval('+s.id+','+period+',\''+selfId+'\',\'評価なし\')">—</button>';}
        selfCol='<div><div class="eval-type-label" style="color:var(--accent)">自己評価</div><div class="abc-selector">'+selfBtns+'</div></div>';
      }

      var itemClass='eval-item'+(hasSelf?'':' no-self');
      return'<div class="'+itemClass+'"><div><div class="eval-item-name">'+item.name+(item.id==='c08'?' <span style="font-size:10px;background:#fffbe0;color:var(--yellow);border:1px solid #e8d060;border-radius:4px;padding:1px 5px">A/B→＋5点</span>':'')+'</div>'+(item.note?'<div class="eval-item-criteria">'+item.note+'</div>':'')+criteriaHtml+'</div><div class="eval-item-rate">掛け率: <span>'+(item.rate!==null?item.rate:'—')+'</span></div>'+selfCol+'<div><div class="eval-type-label">監査評価</div><div class="abc-selector">'+btns+'</div></div><div class="eval-item-score"><div class="item-score-value '+(iscore>0?'pos':'zero')+'">'+iscore+'</div></div></div>';
    }).join('');
    return'<div class="eval-category"><div class="eval-category-header"><div class="eval-category-name">◆ '+catName+'</div><div class="eval-category-score">カテゴリ合計: <span>'+cs+'</span>点</div></div>'+rows+'</div>';
  }).join('');
  content.innerHTML=h+tabs+cats+'<div style="height:28px"></div>';
}

async function setEval(sid,period,iid,val){
  if(!app.evals[sid])app.evals[sid]={};if(!app.evals[sid][period])app.evals[sid][period]={};
  var prev=app.evals[sid][period][iid];var nv=prev===val?'':val;
  if(nv===''){delete app.evals[sid][period][iid];}else{app.evals[sid][period][iid]=nv;}
  renderEval();renderEvalStaffBar();
  try{await apiPost({action:'set_eval',staff_id:sid,period:period,item_id:iid,eval_value:nv});showNotif('✓ 保存しました');}
  catch(e){if(prev){app.evals[sid][period][iid]=prev;}else{delete app.evals[sid][period][iid];}renderEval();showNotif('保存失敗: '+e.message,true);}
}
function switchPeriod(p){app.currentPeriod=p;renderEvalStaffBar();renderEval();}

var chartInstances=[];
function renderDashboard(){
  var content=document.getElementById('dashboardContent');
  if(!app.staff.length){content.innerHTML='<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">データがありません</div></div>';return;}
  var sd=app.staff.map(function(s){
    var isMG=s.sheet==='masterMG';
    return{s:s,isMG:isMG,j0:getJudgeScore(s.id,0),j1:getJudgeScore(s.id,1),j2:getJudgeScore(s.id,2),j3:getJudgeScore(s.id,3),line:getRaiseLine(s.id),mgAvg2:isMG?getMGAvg(s.id,2):null,own2:getTotalScore(s.id,2)};
  }).sort(function(a,b){return b.j2-a.j2;});
  var avg2=sd.reduce(function(sum,x){return sum+x.j2;},0)/sd.length;
  var achieved=sd.filter(function(x){return x.j2>=x.line;}).length;

  // MG
  var mgList=sd.filter(function(x){return x.isMG;});
  var mgSec='';
  if(mgList.length){
    var mgRows=mgList.map(function(x){
      var ok=x.j2>=x.line;
      var names=(x.s.assigned_staff||[]).map(function(sid){var t=app.staff.find(function(y){return y.id==sid;});return t?t.name:'削除済み';}).join('、')||'未設定';
      return'<tr><td style="font-weight:700">'+x.s.name+'</td><td style="color:var(--accent);font-weight:700">'+x.own2+'点</td><td style="color:var(--yellow);font-weight:700">'+(x.mgAvg2!==null?x.mgAvg2.toFixed(1)+'点':'<span style="color:var(--text3)">未設定</span>')+'</td><td style="font-weight:700;font-size:14px;color:'+(ok?'var(--green)':'var(--red)')+'">'+(x.mgAvg2!==null?x.j2.toFixed(1)+'点':'—')+'</td><td style="color:var(--text2);font-size:12px">'+names+'</td><td><span class="'+(ok?'badge-ok':'badge-ng')+'">'+(ok?'✓ 達成':'✗ 未達成')+'</span></td></tr>';
    }).join('');
    mgSec='<div class="section-header" style="margin-bottom:12px"><div class="section-title">MG 判定内訳</div></div><div class="mg-detail-table"><table><thead><tr><th>MG名</th><th>自身のスコア</th><th>担当平均</th><th>判定スコア</th><th>担当教室長</th><th>昇給判定</th></tr></thead><tbody>'+mgRows+'</tbody></table></div>';
  }

  // スコア一覧（回別）
  var scoreRows=app.staff.map(function(s){
    var scores=[0,1,2,3].map(function(p){return getJudgeScore(s.id,p);});
    var line=getRaiseLine(s.id);var isMG=s.sheet==='masterMG';var ok=scores[2]>=line;
    var cells=scores.map(function(sc,i){
      if(sc===0)return'<td class="sc-none" style="text-align:center">—</td>';
      var cls=sc>=line?'sc-good':sc>=line*0.7?'sc-warn':'sc-bad';
      return'<td class="'+cls+'" style="text-align:center">'+(isMG&&i>=2?sc.toFixed(1):sc)+'</td>';
    }).join('');
    return'<tr><td style="font-weight:700;cursor:pointer;color:var(--accent)" onclick="goToEval('+s.id+')">'+s.name+(isMG?'<span class="mg-badge">MG</span>':'')+'</td><td style="color:var(--text2);font-size:12px">'+(s.room||'—')+'</td><td style="color:var(--text2);font-size:11px">'+SHEET_LABELS[s.sheet]+'</td>'+cells+'<td style="text-align:center"><span class="'+(ok?'badge-ok':'badge-ng')+'">'+(ok?'✓ 達成':'✗ 未達成')+'</span></td></tr>';
  }).join('');

  // 順位テーブル
  var rankRows=sd.map(function(x,i){
    var rc=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
    var ok=x.j2>=x.line;var maxJ=sd[0].j2||1;var pct=Math.round(x.j2/maxJ*100);
    var fc=ok?'good':x.j2>=x.line*0.7?'warn':'bad';
    return'<tr><td><div class="rank-badge '+rc+'">'+(i+1)+'</div></td><td style="font-weight:700;cursor:pointer;color:var(--accent)" onclick="goToEval('+x.s.id+')">'+x.s.name+(x.isMG?'<span class="mg-badge">MG</span>':'')+'</td><td style="color:var(--text2)">'+(x.s.room||'—')+'</td><td style="color:var(--text2);font-size:11px">'+SHEET_LABELS[x.s.sheet]+'</td><td><div class="progress-bar-wrap"><div class="progress-bar"><div class="progress-fill '+fc+'" style="width:'+pct+'%"></div></div><div class="progress-pct" style="color:var(--'+fc+')">'+(x.isMG?x.j2.toFixed(1):x.j2)+'点</div></div></td><td style="font-weight:700">'+(x.j3>0?(x.isMG?x.j3.toFixed(1):x.j3)+'点':'—')+'</td><td><span class="'+(ok?'badge-ok':'badge-ng')+'">'+(ok?'✓ 達成':'✗ 未達成')+'</span></td></tr>';
  }).join('');

  content.innerHTML=
    '<div class="dashboard-top">'+
      '<div class="kpi-card"><div class="kpi-label">スタッフ数</div><div class="kpi-value" style="color:var(--accent)">'+app.staff.length+'</div><div class="kpi-sub">名</div></div>'+
      '<div class="kpi-card"><div class="kpi-label">第3回 平均スコア</div><div class="kpi-value" style="color:var(--yellow)">'+Math.round(avg2)+'</div><div class="kpi-sub">点</div></div>'+
      '<div class="kpi-card"><div class="kpi-label">昇給ライン達成</div><div class="kpi-value" style="color:var(--green)">'+achieved+'</div><div class="kpi-sub">名 / '+app.staff.length+'名</div></div>'+
      '<div class="kpi-card"><div class="kpi-label">達成率</div><div class="kpi-value" style="color:'+(achieved/app.staff.length>=0.5?'var(--green)':'var(--red)')+'">'+Math.round(achieved/app.staff.length*100)+'%</div><div class="kpi-sub">昇給ライン到達率</div></div>'+
    '</div>'+
    mgSec+
    '<div class="section-header" style="margin-bottom:10px"><div class="section-title">人事スコア一覧（回別）</div></div>'+
    '<div class="data-table" style="margin-bottom:18px"><table><thead><tr><th>氏名</th><th>教室</th><th>評価シート</th><th class="accent-head" style="text-align:center">第1回</th><th class="accent-head" style="text-align:center">第2回</th><th class="accent-head" style="text-align:center">第3回</th><th class="accent-head" style="text-align:center">第4回</th><th style="text-align:center">昇給判定</th></tr></thead><tbody>'+scoreRows+'</tbody></table></div>'+
    '<div class="charts-grid"><div class="chart-card"><div class="chart-card-title">スタッフ別スコア比較（第3回）</div><canvas id="barChart" height="200"></canvas></div><div class="chart-card"><div class="chart-card-title">第3回 vs 第4回 推移</div><canvas id="lineChart" height="200"></canvas></div></div>'+
    '<div class="section-header" style="margin-bottom:10px"><div class="section-title">順位別一覧</div></div>'+
    '<div class="data-table"><table><thead><tr><th>順位</th><th>氏名</th><th>教室</th><th>評価シート</th><th>第3回スコア</th><th>第4回スコア</th><th>昇給判定</th></tr></thead><tbody>'+rankRows+'</tbody></table></div>';

  chartInstances.forEach(function(c){c.destroy();});chartInstances=[];
  var names=sd.map(function(x){return x.s.name;});
  var s2=sd.map(function(x){return x.j2;});
  var s3=sd.map(function(x){return x.j3;});
  chartInstances.push(new Chart(document.getElementById('barChart').getContext('2d'),{
    type:'bar',data:{labels:names,datasets:[{label:'第3回',data:s2,backgroundColor:sd.map(function(x){return x.j2>=x.line?'rgba(15,173,122,0.7)':'rgba(58,111,248,0.7)';}),borderRadius:4}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#5a6380',font:{family:'Noto Sans JP'}},grid:{color:'#e0e4ef'}},y:{ticks:{color:'#5a6380'},grid:{color:'#e0e4ef'},beginAtZero:true}}}
  }));
  chartInstances.push(new Chart(document.getElementById('lineChart').getContext('2d'),{
    type:'line',data:{labels:names,datasets:[{label:'第3回',data:s2,borderColor:'#3a6ff8',backgroundColor:'rgba(58,111,248,0.07)',tension:0.3,pointRadius:5,fill:true},{label:'第4回',data:s3.map(function(v){return v>0?v:null;}),borderColor:'#0fad7a',backgroundColor:'rgba(15,173,122,0.07)',tension:0.3,pointRadius:5,fill:true,borderDash:[4,2]}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#5a6380',font:{family:'Noto Sans JP'}}}},scales:{x:{ticks:{color:'#5a6380',font:{family:'Noto Sans JP'}},grid:{color:'#e0e4ef'}},y:{ticks:{color:'#5a6380'},grid:{color:'#e0e4ef'},beginAtZero:true}}}
  }));
}
function goToEval(sid){
  app.currentStaffId=sid;
  document.querySelectorAll('.nav-btn').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('active');});
  document.getElementById('view-eval').classList.add('active');document.getElementById('evalNavBtn').classList.add('active');
  renderEvalStaffBar();renderEval();
}
boot();
</script>
</body>
