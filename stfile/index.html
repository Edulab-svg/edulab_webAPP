// ===== TEXTBOOK MASTERS (atama+準拠) =====
// 各科目のatama+単元マスタ。学校ごとにどのマスタを使うか設定可能。
function mkTM(prefix, list) {
  let gi=0;
  const units=[];
  list.forEach(item=>{
    if(typeof item==='string'){
      gi++;
      units.push({id:`${prefix}-${gi}`,unit:String(gi),topic:item,isTest:false,chapter:'',level:1});
    } else if(item.__test){
      gi++;
      units.push({id:`${prefix}-t${gi}`,unit:String(gi),topic:item.__test,isTest:true,chapter:item.c||'',level:item.lv||1});
    } else if(item.t){
      // {c:章名, t:単元名, lv:難易度(1-3)} 形式
      gi++;
      units.push({id:`${prefix}-${gi}`,unit:String(gi),topic:item.t,isTest:false,chapter:item.c||'',level:item.lv||1});
    }
  });
  return units;
}

function getMastersForSlot(slotId) {

  if(!cat) return [];
  return Object.values(TEXTBOOK_MASTERS).filter(m=>m.category===cat);

// 生徒の受講科目 × 生徒の学年 → 表示タブ一覧を返す
// ・受講科目未設定 → デフォルト（英語4スロット）
// ・英語選択 → 英文法・英語教科書・英単語（生徒の学年）
// ・数学/理科 → 学年対応スロット1つ
// ・社会 → 歴史・地理・公民（3スロット）
// ・国語 → 学年対応スロット1つ
function filterSlotsByStudentGrade(slots, student) {
  const g = student?.grade;
  if (!g || !['中1','中2','中3'].includes(g)) return slots;
  return slots.filter(s => !s.grade || s.grade === g);
}

function getStudentSubjectSlots(student, school) {
  const subs = student?.subjects || [];
  if(!subs.length) return ALL_SUBJECT_SLOTS.filter(s=>['grammar1','textbook1','grammar2','textbook2','grammar3','textbook3'].includes(s.id));
  const result = [];
  subs.forEach(sub => {
    const push = id => { const sl=ALL_SUBJECT_SLOTS.find(s=>s.id===id); if(sl) result.push(sl); };
    if(sub==='英語')          ['grammar1','textbook1','grammar2','textbook2','grammar3','textbook3'].forEach(push);
    else if(sub==='英単語')   ['vocab1_shogaku','vocab1','vocab2','vocab3'].forEach(push);
    else if(sub==='数学') {
      // '数学①' or '数学②' が個別登録されている場合はそちらに任せる
      const hasMathCalc = subs.includes('数学①計算/関数');
      const hasMathFigure = subs.includes('数学②図形/データ');
      if (!hasMathCalc) ['math1_calc','math2_calc','math3_calc'].forEach(push);
      if (!hasMathFigure) ['math1_figure','math2_figure','math3_figure'].forEach(push);
    }
    else if(sub==='数学①計算/関数') ['math1_calc','math2_calc','math3_calc'].forEach(push);
    else if(sub==='数学②図形/データ') ['math1_figure','math2_figure','math3_figure'].forEach(push);
    else if(sub==='理科')     ['science1','science2','science3'].forEach(push);
    else if(sub==='国語')     ['japanese1','japanese2','japanese3'].forEach(push);
    else if(sub==='地理')     push('geography');
    else if(sub==='歴史')     push('history');
    else if(sub==='公民')     push('civics');
    else if(sub==='数学（入試）')  push('exam_math');
    else if(sub==='理科（入試）')  push('exam_science');
    else if(sub==='英文法（入試）') push('exam_grammar');
    else if(sub==='英語長文')      push('exam_reading');
    else if(sub==='社会（入試）')  push('exam_social');
  });
  const seen = new Set();
  return result.filter(s=>seen.has(s.id)?false:seen.add(s.id)||true);
}

function getSlotUnits(school, slotId) {
  const bookName = school?.textbooks?.['英語'] || 'NEW HORIZON';
  if(['vocab1_shogaku','vocab1','vocab2','vocab3'].includes(slotId)) { const u=SUBJECT_UNITS[slotId]; if(u) return u; }
  // 英語教科書スロット → 学校の使用教科書設定から解決
  if(slotId === 'textbook1' || slotId === 'textbook2' || slotId === 'textbook3') {
    const gradeNum = parseInt(slotId.replace('textbook',''));
    const masterId = TEXTBOOK_NAME_TO_MASTER[bookName]?.[gradeNum];
    if(masterId && TEXTBOOK_MASTERS[masterId]) return TEXTBOOK_MASTERS[masterId].units;
  }
  // 英文法スロット → 学校の使用教科書設定から解決
  if(slotId === 'grammar1' || slotId === 'grammar2' || slotId === 'grammar3') {
    const gradeNum = parseInt(slotId.replace('grammar',''));
    const grammarMasterMap = {
      'NEW HORIZON': {1:'grammar_nh_1', 2:'grammar_nh_2', 3:'grammar_nh_3'},
    };
    const masterId = grammarMasterMap[bookName]?.[gradeNum];
    if(masterId && TEXTBOOK_MASTERS[masterId]) return TEXTBOOK_MASTERS[masterId].units;
  }
  // スロットIDからデフォルトマスタを推定
  const defMasterId = SLOT_DEFAULT_MASTER[slotId];
  if(defMasterId && TEXTBOOK_MASTERS[defMasterId]) return TEXTBOOK_MASTERS[defMasterId].units;
  // フォールバック
  return SUBJECT_UNITS[slotId] || [];
}

// ===== STUDENT PAGE =====
function StudentPage({
  students,
  setStudents,
  schools,
  selSchoolId,
  toast
}) {
  const [selId, setSelId] = useState(students[0]?.id || null);
  const [editMode, setEditMode] = useState(false);
  const [draft, setDraft] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [addName, setAddName] = useState('');
  const [addGrade, setAddGrade] = useState('中1');
  const [saving, setSaving] = useState(false);
  const [examImporting, setExamImporting] = useState(false);
  const student = students.find(s => s.id === selId);
  const cur = editMode ? draft : student;
  const set = (f, v) => setDraft(p => ({
    ...p,
    [f]: v
  }));
  const startEdit = () => {
    setDraft({
      ...student
    });
    setEditMode(true);
  };
  const cancel = () => {
    setEditMode(false);
    setDraft(null);
  };

  const importExamCSV = async e => {
    const file = e.target.files[0]; if (!file) return;
    setExamImporting(true);
    try {
      const arrayBuffer = await file.arrayBuffer();
      const bytes = new Uint8Array(arrayBuffer);
      let binary = '';
      bytes.forEach(b => binary += String.fromCharCode(b));
      const csv_b64 = btoa(binary);
      const res = await apiPost({ action: 'import_exam_results', csv_b64 });
      if (res.updated && res.updated.length > 0) {
        setStudents(prev => prev.map(s => { const u = res.updated.find(x=>x.id===s.id); return u?{...s,exam_results:u.exam_results}:s; }));
        toast(res.updated.length + '件の生徒に試験結果を登録しました', 'ok');
      } else { toast('一致する生徒が見つかりませんでした（名前+学年で照合）', 'error'); }
      if (res.skipped > 0) toast(res.skipped + '件スキップ（重複）', 'ok');
    } catch(err) { toast('インポート失敗: ' + err.message, 'error'); }
    setExamImporting(false); e.target.value = '';
  };
  const save = async () => {
    setSaving(true);
    try {
      await apiPost({
        action: 'save_student',
        ...draft
      });
      setStudents(prev => prev.map(s => s.id === draft.id ? draft : s));
      setDraft(null);
      setEditMode(false);
      toast('保存しました', 'ok');
    } catch (e) {
      console.error('save_student error:', e);
      toast('保存に失敗: ' + String(e.message || e), 'error');
    }
    setSaving(false);
  };
  const addStudent = async () => {
    if (!addName.trim()) return;
    try {
      const ns = await apiPost({
        action: 'add_student',
        name: addName.trim(),
        grade: addGrade,
        school_id: null,
        classroom_id: selSchoolId || null,
