<body>

            ※ ここで編集した値は全年度に一括反映されます。給与は初年度基本給（半期ごとに¥2,500自動昇給）。入会数・退会率も全年度共通。

<script>
// ============================================================
// API設定・認証
// ============================================================
const API = 'api/index.php';

async function apiGet(route) {
  const token = sessionStorage.getItem('sim_token') || '';
  const r = await fetch(API + '?route=' + route + '&_t=' + Date.now(), {
    headers: { 'X-Sim-Token': token }
  });
  return r.json();
}
async function apiPost(route, data) {
  const token = sessionStorage.getItem('sim_token') || '';
  const fd = new FormData();
  fd.append('route', route);
  for (const [k, v] of Object.entries(data))
    fd.append(k, typeof v === 'object' ? JSON.stringify(v) : v);
  const r = await fetch(API, { method: 'POST', body: fd, headers: { 'X-Sim-Token': token } });
  return r.json();
}
let _saveTimer = null;
const _pendingSaves = {}; // {id_field: {id, field, value}}

function saveField(id, field, value) {
  // 仮ID（例: '2027-5'）はDBに存在しない。intval変換で他レコードを誤更新するのを防ぐためスキップ
  const idNum = Number(id);
  if (!id || isNaN(idNum) || idNum <= 0) return;
  // 同じid+fieldの保存はキューで上書き（無駄なリクエストを排除）
  _pendingSaves[id + '::' + field] = { id, field, value };
  clearTimeout(_saveTimer);
  document.getElementById('saving-indicator').style.display = 'block';
  _saveTimer = setTimeout(async () => {
    await flushSaves();
  }, 600);
}

async function flushSaves() {
  clearTimeout(_saveTimer);
  const entries = Object.values(_pendingSaves);
  if (!entries.length) {
    document.getElementById('saving-indicator').style.display = 'none';
    return;
  }
  Object.keys(_pendingSaves).forEach(k => delete _pendingSaves[k]);
  // 並列送信（50件ずつバッチ処理）
  const batchSize = 50;
  for (let i = 0; i < entries.length; i += batchSize) {
    const batch = entries.slice(i, i + batchSize);
    await Promise.all(batch.map(e =>
      apiPost('classroom', { action: 'update', id: e.id, field: e.field,
        value: typeof e.value === 'object' ? JSON.stringify(e.value) : e.value })
    ));
  }
  document.getElementById('saving-indicator').style.display = 'none';
}

// saveAll: 現在の年度の全教室の全フィールドをDBに保存
const JSON_FIELDS  = ['prices','enroll','ads','enroll_base','wd_base'];
const INT_FIELDS   = ['start_st','start_wd','max_st','open_month','rent','water','electric','phone','travel',
                      'consume_r','promo_r','recruit_fee','sys_per_st','mat_per_st','fee_r','welfare_r',
                      'repair','lease_cost','insurance','sanitation','other_exp','parttime_cost',
                      'recruit_fee_part','recruit_fee_oct','enroll_fee','salary1','salary2'];
const FLOAT_FIELDS = ['wd_rate','conv_r','exam_buy_r','exam_sell_r','legal_welf_r','tax_r'];

function saveAll() {
  const allFields = [...JSON_FIELDS, ...INT_FIELDS, ...FLOAT_FIELDS, 'name'];
  // 全年度の全教室を対象（名前同期で全年度更新済みのため）
  STATE.years.forEach(ys => {
    (STATE.classrooms[ys.fiscal_year] || []).forEach(c => {
      if (!c.id || String(c.id).includes('new')) return; // 未保存の新規はskip（addClassroomで別途処理）
      allFields.forEach(field => {
        if (c[field] !== undefined) {
          saveField(c.id, field, c[field]);
        }
      });
    });
  });
}

function saveClassroomField(id, field, value) {
  saveField(id, field, value);
}

// ============================================================
// 手動保存ボタン
// ============================================================
async function updateSaveInfo() {
  const el = document.getElementById('save-info');
  if (!el) return;
  try {
    const res = await apiGet('save_info_read');
    if (res && res.saved_at && res.saved_by) {
      const dt = res.saved_at.replace(/-/g,'/').slice(0,16);
      el.innerHTML = `最終保存: ${dt}<br>保存者: ${res.saved_by}`;
    } else {
      el.innerHTML = '未保存';
    }
  } catch(e) {
    el.innerHTML = '未保存';
  }
}

async function manualSave() {
  const choice = await showSaverDialog();
  if (choice === null) return;

  const btn = document.getElementById('manual-save-btn');
  btn.textContent = '保存中...';
  btn.disabled = true;

  // 仮IDの教室が残っていればDBに登録してリアルIDを取得
  const allSaveFields = ['prices','enroll','ads','enroll_base','wd_base',
    'start_st','start_wd','rent','water','electric','phone','travel','consume_r','promo_r',
    'sys_per_st','mat_per_st','exam_buy_r','fee_r','welfare_r','repair','lease_cost',
    'insurance','sanitation','other_exp','parttime_cost','recruit_fee','recruit_fee_oct',
    'recruit_fee_part','enroll_fee','salary1','wd_rate','conv_r','exam_sell_r',
    'legal_welf_r','tax_r','max_st','name','open_month'];

  for (const ys of STATE.years) {
    for (const c of (STATE.classrooms[ys.fiscal_year] || [])) {
      const idNum = Number(c.id);
      const isFakeId = !c.id || isNaN(idNum) || idNum <= 0;
      if (isFakeId) {
        // DBに登録してリアルIDを取得
        try {
          const res = await apiPost('classroom', { action: 'add', fiscal_year: ys.fiscal_year, name: c.name, open_month: c.open_month });
          if (res && res.id) c.id = res.id;
        } catch(e) { console.warn('add failed:', c.name, e); }
      }
    }
  }

  // 全教室の全フィールドをキューに積む
  STATE.years.forEach(ys => {
    (STATE.classrooms[ys.fiscal_year] || []).forEach(c => {
      const idNum = Number(c.id);
      if (!c.id || isNaN(idNum) || idNum <= 0) return; // まだ仮IDのものはスキップ
      allSaveFields.forEach(f => {
        if (c[f] !== undefined) saveField(c.id, f, c[f]);
      });
    });
  });

  try {
    // キューに溜まった保存を即時フラッシュ
    await flushSaves();
    const res = await apiPost('save_info_write', { saved_by: choice });
    if (res && res.saved_at) {
      const dt = res.saved_at.replace(/-/g,'/').slice(0,16);
      const el = document.getElementById('save-info');
      if (el) el.innerHTML = `最終保存: ${dt}<br>保存者: ${res.saved_by}`;
    }
  } catch(e) {}
  btn.innerHTML = '✅ 保存しました';
  btn.style.background = '#a8d5a2';
  btn.disabled = false;
  setTimeout(() => {
    btn.innerHTML = '💾 保存する';
    btn.style.background = '#fff';
  }, 2500);
}

function showSaverDialog() {
  return new Promise(resolve => {
    // オーバーレイ作成
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center';

    const box = document.createElement('div');
    box.style.cssText = 'background:#fff;border-radius:14px;padding:28px 32px;min-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.2);font-family:inherit';
    box.innerHTML = `
      <div style="font-size:16px;font-weight:700;color:#2D5016;margin-bottom:18px">💾 保存者は？</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="saver-btn" data-name="信定" style="padding:10px 16px;background:#f0f5ec;border:2px solid #c8dfc0;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;color:#2D5016;text-align:left">👤 信定</button>
        <button class="saver-btn" data-name="川口" style="padding:10px 16px;background:#f0f5ec;border:2px solid #c8dfc0;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;color:#2D5016;text-align:left">👤 川口</button>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="saver-btn" data-name="__other__" style="padding:10px 16px;background:#f5f5f5;border:2px solid #ddd;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;color:#555;white-space:nowrap">✏️ その他</button>
          <input id="saver-other-input" type="text" placeholder="名前を入力" style="flex:1;padding:9px 12px;border:2px solid #ddd;border-radius:8px;font-size:13px;display:none">
        </div>
      </div>
      <div style="margin-top:18px;text-align:right">
        <button id="saver-cancel" style="padding:7px 18px;background:#f5f5f5;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;color:#666">キャンセル</button>
        <button id="saver-confirm" style="padding:7px 18px;background:#2D5016;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;color:#fff;margin-left:8px;display:none">保存する</button>
      </div>
    `;
    overlay.appendChild(box);
    document.body.appendChild(overlay);

    let selectedName = null;

    box.querySelectorAll('.saver-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        box.querySelectorAll('.saver-btn').forEach(b => { b.style.borderColor='#ddd'; b.style.background=b.dataset.name==='__other__'?'#f5f5f5':'#f0f5ec'; });
        btn.style.borderColor = '#2D5016';
        btn.style.background = btn.dataset.name==='__other__' ? '#e8f0e4' : '#dcefd4';
        const otherInput = document.getElementById('saver-other-input');
        const confirmBtn = document.getElementById('saver-confirm');
        if (btn.dataset.name === '__other__') {
          otherInput.style.display = 'block';
          otherInput.focus();
          selectedName = null;
          confirmBtn.style.display = 'inline-block';
        } else {
          otherInput.style.display = 'none';
          selectedName = btn.dataset.name;
          confirmBtn.style.display = 'inline-block';
        }
      });
    });

    document.getElementById('saver-cancel').addEventListener('click', () => {
      document.body.removeChild(overlay);
      resolve(null);
    });

    document.getElementById('saver-confirm').addEventListener('click', () => {
      const otherInput = document.getElementById('saver-other-input');
      if (otherInput.style.display !== 'none') {
        selectedName = otherInput.value.trim() || 'その他';
      }
      if (!selectedName) return;
      document.body.removeChild(overlay);
      resolve(selectedName);
    });

    overlay.addEventListener('click', e => {
      if (e.target === overlay) { document.body.removeChild(overlay); resolve(null); }
    });
  });
}

// ============================================================
// まんてん個別プラス 計算定数
// ============================================================
const MONTHS = ["4月","5月","6月","7月","8月","9月","10月","11月","12月","1月","2月","3月"];
// 入会比率 (まんてん個別プラスはシンプルな均等分配ベース + 7月・12月集中)
// 入会比率ベース（まんてん個別実績準拠 - 教室ごとに上書き可能）
const ENROLL_BASE_DEFAULT = [92, 64, 91, 152, 43, 43, 39, 27, 66, 67, 80, 128]; // 2025年実績
const ENROLL_TOTAL_DEFAULT = ENROLL_BASE_DEFAULT.reduce((s,v)=>s+v, 0);
const ENROLL_RATIOS_PLUS = ENROLL_BASE_DEFAULT.map(v=>v/ENROLL_TOTAL_DEFAULT);
// 退会比率ベース（まんてん個別実績準拠）
const WD_BASE_DEFAULT = [18, 20, 21, 38, 36, 28, 39, 43, 46, 47, 127, 304]; // 2025年実績
const WD_TOTAL_DEFAULT = WD_BASE_DEFAULT.reduce((s,v)=>s+v, 0);
const WD_RATIOS_PLUS = WD_BASE_DEFAULT.map(v=>v/WD_TOTAL_DEFAULT);
const SALARY_RAISE = 2500; // 半期ごと昇給
const INIT_COST = 3000000; // 開校初期費用(その他経費に追加)

// ============================================================
// 全年度データ (Excelから抽出)
// ============================================================
const INITIAL_DATA = {
  years: [
    {fiscal_year:2026, bonus_mult:2.5},
    {fiscal_year:2027, bonus_mult:2.5},

function distributeEnroll(annual, openMonth, enrollBase) {
  if (!annual) return Array(12).fill(0);
  const base = (enrollBase && enrollBase.length===12) ? enrollBase : ENROLL_BASE_DEFAULT;
  const total = base.reduce((s,v)=>s+v,0);
  if (!total) return Array(12).fill(0);
  // openMonth=0は4月開校＝全月対象なので既存教室と同じ扱い
  const isOpenYear = (openMonth !== undefined && openMonth > 0);
  const raw = base.map((v, i) => {
    if (isOpenYear && i < openMonth) return 0;
    return annual * v / total;
  });
  const result = raw.map(v => Math.round(v));
  if (isOpenYear) {
    // 開校年（4月以外）は合計が annual より少なくて正しい（端数調整しない）
    return result;
  }
  // 既存教室・4月開校は合計がぴったり annual になるよう端数調整
  let diff = annual - result.reduce((s,v)=>s+v,0);
  const rem = raw.map((v,i)=>({i,r:v-Math.floor(v)})).filter(x=>x.r>0).sort((a,b)=>b.r-a.r);
  if (!rem.length) return result;
  for (let j=0; diff>0; j++) { result[rem[j%rem.length].i]++; diff--; }
  for (let j=rem.length-1; diff<0; j--) { result[rem[Math.abs(j)%rem.length].i]--; diff++; }
  return result;
}

function distributeWd(annual, wdBase) {
  if (!annual) return Array(12).fill(0);
  const base = (wdBase && wdBase.length===12) ? wdBase : WD_BASE_DEFAULT;
  const total = base.reduce((s,v)=>s+v,0);
  const raw = base.map(v=>annual*v/total);
  const result = raw.map(v=>Math.round(v));
  let diff = annual - result.reduce((s,v)=>s+v,0);
  const rem = raw.map((v,i)=>({i,r:v-Math.floor(v)})).sort((a,b)=>b.r-a.r);
  for(let j=0;diff>0;j++){result[rem[j%12].i]++;diff--;}
  for(let j=rem.length-1;diff<0;j--){result[rem[j%12].i]--;diff++;}
  return result;
}

// 広告費比率（実績ベース）
const ADS_BASE = [167, 24, 145, 117, 12, 21, 19, 80, 103, 22, 155, 136];
const ADS_TOTAL = ADS_BASE.reduce((s,v)=>s+v, 0);

function distributeAds(annual, openMonth) {
  if (!annual) return Array(12).fill(0);
  // 全月にADS_BASEの比率を適用し、端数を最大値の月に加算
  const result = ADS_BASE.map(v => Math.round(annual * v / ADS_TOTAL));
  const diff = annual - result.reduce((s,v)=>s+v, 0);
  if (diff !== 0) {
    const maxIdx = ADS_BASE.indexOf(Math.max(...ADS_BASE));
    result[maxIdx] += diff;
  }
  return result;
}

function generateAds(openMonth) {
  const ads = [35000,35000,35000,35000,35000,35000,35000,35000,300000,35000,200000,250000];
  if (openMonth >= 0) {
    ads[openMonth] = 250000;
    for(let i=0;i<openMonth;i++) ads[i]=0;
  }
  return ads;
}

function calcClassroom(p, fiscalYear) {
  const om = (p.open_month != null && p.open_month >= 0) ? p.open_month : -1;
  const firstYear = STATE.years[0].fiscal_year;

  // 退会数分配
  const wdRate = p.wd_rate || 0;
  let wdMonthly = Array(12).fill(0);
  let annualWd = 0;
  for (let iter = 0; iter < 3; iter++) {
    let estSt = 0, tmpSt = p.start_st;
    for (let m=0;m<12;m++){
      const base = tmpSt - (m===0?(p.start_wd||0):wdMonthly[m-1]);
      let active = base + p.enroll[m];
      estSt += active;
      tmpSt = active;
    }
    annualWd = Math.round(wdRate * estSt);
    wdMonthly = distributeWd(annualWd, p.wd_base);
  }

  // 開校年数を計算（修繕費などの年数判定に使用）
  const yearNum = (() => {
    if (typeof CLASSROOM_OPEN_FY !== 'undefined' && CLASSROOM_OPEN_FY[p.name] !== undefined) {
      return fiscalYear - CLASSROOM_OPEN_FY[p.name] + 1;
    }
    const allFy = STATE.years.map(y=>y.fiscal_year).sort((a,b)=>a-b);
    for(const fy of allFy){
      const cls = STATE.classrooms[fy]||[];
      if(cls.some(x=>x.name===p.name)) return fiscalYear - fy + 1;
    }
    return 1;
  })();

  const BONUS_MONTHS = [0, 6]; // 4月・10月が賞与（半期）
  const months = [];

  for (let m=0;m<12;m++) {
    const isPreOpen = (om > 0 && m < om);
    const isOpenMonth = (om >= 0 && m === om);
    const isSecondHalf = m >= 6;
    // 昇給は「この教室の1年目」を起点に計算
    const clFirstYear = (() => {
      const allFy = STATE.years.map(y=>y.fiscal_year).sort((a,b)=>a-b);
      for(const fy of allFy){
        const cls = STATE.classrooms[fy]||[];
        if(cls.some(x=>x.name===p.name)) return fy;
      }
      return firstYear;
    })();
    const semesters = (fiscalYear - clFirstYear) * 2 + (isSecondHalf ? 1 : 0);
    const baseSal = (isSecondHalf && p.salary2>0) ? p.salary2 : p.salary1;
    const effSal = baseSal > 0 ? baseSal + SALARY_RAISE * semesters : 0;
    const bMul = BONUS_MONTHS.includes(m) && !isOpenMonth ? 2.0 : 1;
    const salary = effSal * bMul;

    const prevSt = m===0 ? p.start_st : months[m-1][3];
    const prevWd = m===0 ? (p.start_wd||0) : months[m-1][2];
    const base = prevSt - prevWd;
    const enr = p.enroll[m];
    let active = base + enr;
    if(p.max_st && p.max_st > 0) active = Math.min(active, p.max_st);
    const wd = wdMonthly[m];

    if (isPreOpen) {
      // 10月開校など：開校前月は販管費・人件費すべて0
      months.push([
        0, enr, wd, active, 0,       // 0-4
        0, 0, 0, 0,                   // 5-8
        0, 0, 0, 0, 0,                // 9-13
        0, 0, 0, 0, 0, 0,             // 14-19
        0, 0, 0, 0,                   // 20-23
        0, 0, 0, 0, 0, 0,             // 24-29 admin detail=0
        0,                            // 30 adminTotal=0
        0, 0, 0, 0,                   // 31-34 salary/legalW/parttime/labor=0
        0, 0, 0,                      // 35-37 tax/expTotal/profit=0
        0                              // 38=inq
      ]);
    } else {
      const price = p.prices[m] || 25000;
      // 授業料: 生徒数×単価（入会月は半月分）
      const tuition = active * price - enr * price / 2;
      // 教材売上（入塾金）: 入会数×入塾金
      const matSale = enr * p.enroll_fee;
      // 模試売上: 授業料×exam_sell_r
      const examSale = tuition * p.exam_sell_r;
      // その他売上: 0 (プラスはなし)
      const revenue = tuition + matSale + examSale;

      // 経費
      const consume = active * p.consume_r;
      const promo = active * p.promo_r;
      const sys = p.sys_per_st * active;
      const matBuy = active * (p.mat_per_st || 4500); // 教材仕入 = 生徒数×単価/人
      const examBuy = examSale * p.exam_buy_r;
      const fee = active * (p.fee_r || 0);
      const welfare = p.welfare_r || 0;
      const otherExpM = (p.other_exp || 0) + (isOpenMonth ? INIT_COST : 0);
      const staffRecruit = 0; // 人材紹介費（個別プラスは0）
      const matBuyTraditional = 0; // 未使用（idx:20）
      const adminTotal = (p.rent||0) + (p.water||0) + (p.electric||0) + (p.phone||0) + (p.travel||0)
        + consume + promo + (yearNum===1&&m===0?(p.recruit_fee||0):0) + (yearNum===1&&m===6?(p.recruit_fee_oct||0):0) + (yearNum===1&&m===(om>=0?om:0)?(p.recruit_fee_part||0):0) + (p.ads[m]||0) + staffRecruit + sys
        + matBuyTraditional + matBuy + examBuy
        + fee + welfare + (yearNum >= 4 ? (p.repair||0) : 0) + (p.lease_cost||0) + (p.insurance||0) + (p.sanitation||0) + otherExpM;

      const legalW = salary * (p.legal_welf_r || 0.15);
      const parttime = p.parttime_cost || 0;
      const labor = salary + legalW + parttime;
      const tax = revenue * (p.tax_r || 0.07);
      const expTotal = adminTotal + labor + tax;
      const profit = revenue - expTotal;
      const cpo = enr > 0 ? (p.ads[m]||0) / enr : 0;

      // インデックス定義:
      // [0]=cpo, [1]=enr, [2]=wd, [3]=active, [4]=price,
      // [5]=tuition, [6]=matSale, [7]=examSale, [8]=revenue,
      // [9]=rent, [10]=water, [11]=electric, [12]=phone, [13]=travel,
      // [14]=consume, [15]=promo, [16]=ads, [17]=sys, [18]=matBuy, [19]=examBuy,
      // [20]=adminTotal,
      // [21]=salary, [22]=0(placeholder), [23]=legalW, [24]=labor,
      // [25]=tax, [26]=expTotal, [27]=profit
      months.push([
        cpo, enr, wd, active, price,                                    // 0-4
        tuition, matSale, examSale, revenue,                             // 5-8
        p.rent||0, p.water||0, p.electric||0, p.phone||0, p.travel||0,  // 9-13
        consume, promo, (m===0?(p.recruit_fee||0):(m===6?(p.recruit_fee_oct||0):0)), p.ads[m]||0, staffRecruit,    // 14-18 (16=正社員求人費 4月・10月のみ)
        sys, matBuyTraditional, matBuy, examBuy, fee,                    // 19-23
        welfare, (yearNum>=4?(p.repair||0):0), p.lease_cost||0, p.insurance||0, p.sanitation||0, otherExpM, // 24-29
        adminTotal,                                                       // 30
        salary, legalW, parttime, labor,                                 // 31-34
        tax, expTotal, profit,                                            // 35-37
        (p.conv_r>0 ? Math.round(enr/p.conv_r) : 0)                     // 38=inq
      ]);
    }
  }

  const sum = idx => months.reduce((s,r)=>s+(r[idx]||0),0);
  const last = months[11];
  return {
    months,
    revenue: sum(8),
    expense: sum(36),
    profit: sum(37),
    totalEnroll: sum(1),
    totalWd: sum(2),
    endStudents: last[3] - last[2],
  };
}


// 開校年数に応じた授業料単価
function getPriceByYear(yearNum) {
  if (yearNum <= 1) return 24000;
  if (yearNum === 2) return 25000;
  if (yearNum === 3) return 27500;
  if (yearNum === 4) return 28500;
  return 30000; // 5年目以降
}

function calcAllResults() {
  STATE.results = {};
  STATE.years.forEach((ys, yi) => {
    const fy = ys.fiscal_year;
    const cls = STATE.classrooms[fy] || [];

    // 前年度の計算結果から start_st を自動引き継ぎ、単価を年数に応じて設定
    if (yi > 0) {
      const prevFy = STATE.years[yi-1].fiscal_year;
      const prevResults = STATE.results[prevFy] || [];
      const prevCls = STATE.classrooms[prevFy] || [];
      cls.forEach((c, ci) => {
        const yn = getYearNum(c, fy);
        // 単価を年数に応じて自動設定（ユーザーが個別編集した場合は上書きしない判定は省略し常に適用）
        const price = getPriceByYear(yn);
        c.prices = Array(12).fill(price);
        // 新規教室（この年度が1年目）はstart_st=0のまま
        if (yn <= 1) return;
        // 前年度の同名教室を探す
        const prevIdx = prevCls.findIndex(pc => pc.name === c.name);
        if (prevIdx >= 0 && prevResults[prevIdx]) {
          c.start_st = prevResults[prevIdx].endStudents;
        }
      });
    } else {
      // 初年度も年数に応じて単価設定
      cls.forEach(c => {
        const yn = getYearNum(c, fy);
        const price = getPriceByYear(yn);
        c.prices = Array(12).fill(price);
      });
    }

    STATE.results[fy] = cls.map(c => calcClassroom(c, fy));
  });

  // 全社ダッシュボード向けエクスポート（月次データ含む）
  try {
    const exportData = STATE.years.map(ys => {
      const f = ys.fiscal_year;
      const res = STATE.results[f] || [];
      // 月次合算（全教室合計）
      const monthlyRev = Array(12).fill(0);
      const monthlyExp = Array(12).fill(0);
      const monthlyPro = Array(12).fill(0);
      res.forEach(r => {
        (r.months || []).forEach((m, mi) => {
          monthlyRev[mi] += Math.round(m[8] || 0);
          monthlyExp[mi] += Math.round(m[36] || 0);
          monthlyPro[mi] += Math.round(m[37] || 0);
        });
      });
      return {
        fy: f,
        revenue: monthlyRev.reduce((s,v)=>s+v, 0),
        expense: monthlyExp.reduce((s,v)=>s+v, 0),
        profit:  monthlyPro.reduce((s,v)=>s+v, 0),
        rooms:   res.length,
        monthly_revenue: JSON.stringify(monthlyRev),
        monthly_expense: JSON.stringify(monthlyExp),
        monthly_profit:  JSON.stringify(monthlyPro),
      };
    });
    // 5秒後に書き込み（ページ読み込み完了を待つ）
    setTimeout(function() {
      apiPost('export_write', { data: exportData })
        .then(function(res) { console.log('export_write result:', JSON.stringify(res)); })
        .catch(function(e) { console.error('export_write error:', e); });
    }, 5000);
  } catch(e) { console.error('export prep error:', e); }
}

// ============================================================
// Format
// ============================================================
function fmtYen(v){return Math.round(v).toLocaleString()}
function fmtShort(v){const a=Math.abs(v);if(a>=1e8)return (v/1e8).toFixed(1)+'億';if(a>=1e4)return Math.round(v/1e4).toLocaleString()+'万';return Math.round(v).toLocaleString()}
function fmtCell(fmt,v){if(fmt==='yen')return fmtYen(v);if(fmt==='num')return Math.round(v).toLocaleString();if(fmt==='pct')return(v*100).toFixed(1)+'%';return v}

function getAnnual(idx,M){
  if(idx===3)return M[11][3];
  if(idx===4){const ts=M.reduce((s,r)=>s+r[3],0);return ts>0?Math.round(M.reduce((s,r)=>s+r[5],0)/ts):0}
  if(idx===0){const a=M.reduce((s,r)=>s+(r[16]||0),0);const e=M.reduce((s,r)=>s+r[1],0);return e>0?a/e:0}
  return M.reduce((s,r)=>s+(r[idx]||0),0);
}

function calcSem(data,idx,sem){
  const slice=sem===0?data.slice(0,6):data.slice(6,12);
  if(idx===3)return sem===0?data[5][3]:data[11][3];
  if(idx===4){const ts=slice.reduce((s,r)=>s+r[3],0);return ts>0?Math.round(slice.reduce((s,r)=>s+r[5],0)/ts):0}
  if(idx===0){const a=slice.reduce((s,r)=>s+(r[16]||0),0);const e=slice.reduce((s,r)=>s+r[1],0);return e>0?a/e:0}
  return slice.reduce((s,r)=>s+(r[idx]||0),0);
}

  'たつの':    2024,

function getYearNum(c, fy) {
  // 開校年度マスタに登録があればそちらを優先
  if (CLASSROOM_OPEN_FY[c.name] !== undefined) {
    return fy - CLASSROOM_OPEN_FY[c.name] + 1;
  }
  // なければSTATEの初登場年度から計算
  const allFy = STATE.years.map(y=>y.fiscal_year).sort((a,b)=>a-b);
  for(const f of allFy){
    const cls=STATE.classrooms[f]||[];
    if(cls.some(x=>x.name===c.name)) return fy-f+1;
  }
  return 1;
}

function calcConsolidatedMonths(){
  const cls=curClassrooms();
  const results=curResults();
  const merged=[];
  for(let m=0;m<12;m++){
    const row=new Array(39).fill(0);
    cls.forEach((c,ci)=>{
      const mr=results[ci]?.months[m];
      if(!mr)return;
      for(let k=0;k<41;k++)row[k]+=(mr[k]||0);
    });
    merged.push(row);
  }
  // 単価(idx4)を生徒数加重平均で再計算
  for(let m=0;m<12;m++){
    merged[m][4]=merged[m][3]>0?Math.round(merged[m][5]/merged[m][3]):0;
  }
  return merged;
}

function renderPLTable(){
  const results=curResults();
  if(!results.length)return;
  const isCon=STATE.plMode==='consolidated';
  const data=isCon?calcConsolidatedMonths():results[STATE.clIdx].months;
  const p=isCon?null:curClassrooms()[STATE.clIdx];

  let html='<table><thead><tr>';
  html+='<th style="min-width:130px;position:sticky;left:0;z-index:3;background:#f8f9fa">項目</th>';
  if(!isCon)html+='<th style="min-width:70px" class="base-col">基準値</th>';

    }

      const tWd=data.reduce((s,m)=>s+m[2],0);
      const tSt=data.reduce((s,m)=>s+m[3],0);
      const ann=tSt>0?tWd/tSt:0;
      const wH1=data.slice(0,6).reduce((s,m)=>s+m[2],0);const sH1=data.slice(0,6).reduce((s,m)=>s+m[3],0);
      const wH2=data.slice(6,12).reduce((s,m)=>s+m[2],0);const sH2=data.slice(6,12).reduce((s,m)=>s+m[3],0);

      html+=`<td class="sem-col">${sH2>0?(wH2/sH2*100).toFixed(2):0}%</td>`;
      html+=`<td class="annual-col">${(ann*100).toFixed(2)}%</td></tr>`;
      return;
    }
    const s0=calcSem(data,row.idx,0);
    const s1=calcSem(data,row.idx,1);
    const ann=getAnnual(row.idx,data);
    html+=`<tr class="${row.bold?'row-bold':''} ${row.highlight?'row-highlight':''}">`;
    html+=`<td>${row.label}</td>`;

      html+=`<td class="base-col">${getBaseRef(row,p)}</td>`;

    });

    html+=`<td class="sem-col ${sc0}" style="${dimCss}">${fmtCell(row.fmt,s0)}</td>`;
    data.slice(6,12).forEach(md=>{

      const cl=row.profitColor?(v>=0?'profit-pos':'profit-neg'):'';
      html+=`<td class="${cl}">${fmtCell(row.fmt,v)}</td>`;
    });

    html+=`<td class="sem-col ${sc1}" style="${dimCss}">${fmtCell(row.fmt,s1)}</td>`;

  });
  html+='</tbody></table>';
  document.getElementById('pl-table-wrap').innerHTML=html;
}

function getBaseRef(row,p){
  if(!p)return'-';
  const f=n=>Math.round(n).toLocaleString();
  switch(row.idx){
    // KPI
    case 38:return p.conv_r>0?'入会÷'+Math.round(p.conv_r*100)+'%':'-';
    case 0: return'広告÷入会';
    case 1: return'月別設定';
    case 2: return'率'+(((p.wd_rate||0)*100).toFixed(1))+'%';
    case 3: return'期首'+p.start_st+'名';
    case 4: return'¥'+f(p.prices[0]||25000);
    // 売上
    case 5: return'-'; // 授業料売上
    case 6: return'入会数×¥'+f(p.enroll_fee||0); // 教材売上（入塾金）
    case 7: return'授業料×'+(p.exam_sell_r||0); // 模試売上
    case 8: return'-'; // 売上合計
    // 管理費（統合インデックス）
    case 9:  return f(p.rent||0);
    case 10: return f(p.water||0);
    case 11: return f(p.electric||0);
    case 12: return f(p.phone||0);
    case 13: return f(p.travel||0);
    case 14: return f(p.consume_r||0)+'/人';
    case 15: return f(p.promo_r||0)+'/人';
    case 16: return'月別設定'; // 採用費
    case 17: return'月別設定'; // 広告宣伝費
    case 18: return'-'; // 人材紹介費（0固定）
    case 19: return f(p.sys_per_st||0)+'/人';
    case 20: return'-'; // 教材仕入（0固定）
    case 21: return f(p.mat_per_st||4500)+'/人'; // 教材仕入
    case 22: return'模試売上×'+(p.exam_buy_r||0);
    case 23: return f(p.fee_r||0)+'/人';
    case 24: return f(p.welfare_r||0);
    case 25: return f(p.repair||0);
    case 26: return f(p.lease_cost||0);
    case 27: return f(p.insurance||0);
    case 28: return f(p.sanitation||0);
    case 29: return f(p.other_exp||0);
    case 30: return'-'; // 管理費計
    // 人件費
    case 31: return'¥'+f(p.salary1||0)+'〜';
    case 32: return'給与×'+(p.legal_welf_r||0.15);
    case 33: return f(p.parttime_cost||0)+'/月';
    case 34: return'-'; // 人件費計
    // 合計
    case 35: return'売上×'+(p.tax_r||0.07);
    case 36: return'-'; // 経費合計
    case 37: return'-'; // 営業利益
    default: return'-';
  }
}

  html+=`<td colspan="12" style="padding:4px 6px">`;
  html+=`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">`;
  html+=`<input type="number" value="${annAds}" style="width:130px;padding:5px 8px;border:2px solid #555;border-radius:6px;font-size:15px;font-weight:700;text-align:right" data-field="_annual_ads" onchange="onAnnualAdsChange(this)">`;
  html+=`<span style="font-size:12px;color:#666">円/年 → 比率自動配分</span>`;
  html+=`</div>`;
  html+=`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:6px">`;
  MONTHS.forEach((m,mi)=>{
    html+=`<div style="font-size:10px;color:#888;text-align:center;min-width:50px">${m}<br><b style="color:#555">${(p.ads[mi]||0).toLocaleString()}</b></div>`;

  html+=`</div>`;
  // 広告比率（常時表示・編集可）
  const adsBase3 = p.ads && p.ads.some(v=>v>0) ? p.ads : ADS_BASE;
  const adsBaseTotal = adsBase3.reduce((s,v)=>s+v,0);
  html+=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">`;
  adsBase3.forEach((v,mi)=>{
    const pct = adsBaseTotal > 0 ? (v/adsBaseTotal*100).toFixed(1) : '0.0';
    html+=`<div style="text-align:center"><div style="font-size:9px;color:#e65100">${MONTHS[mi]}</div><span style="display:inline-block;width:42px;font-size:10px;color:#e65100;text-align:right;font-weight:600">${pct}%</span></div>`;
  });
  html+=`</div><div style="font-size:10px;color:#aaa;margin-top:2px">各月の配分割合（%）</div>`;
  html+=`</td>`;
  html+=`<td style="background:#f8f8f8;font-size:10px;color:#888">${annAds.toLocaleString()}</td></tr>`;
  html+='</tbody></table></div>';

  // 入会比率・退会比率のカスタム設定（折りたたみ）
  html+=`<details style="margin-top:10px;padding:8px 12px;background:#f8f8f8;border-radius:8px;border:1px solid #e0e0e0;font-size:12px">
    <summary style="cursor:pointer;font-weight:600;color:#666">⚙ 入会比率・退会比率のカスタム設定（クリックで展開）</summary>
    <div style="margin-top:10px">
    <div style="font-size:11px;color:#888;margin-bottom:8px">※ 合計値は自動で正規化されます。変更すると月別入会数が再配分されます。</div>
    <table class="monthly-table"><thead><tr><th>項目</th>`;
  MONTHS.forEach(m=>{html+=`<th>${m}</th>`});
  html+=`<th>合計</th></tr></thead><tbody>`;
  html+=`<tr><td style="font-weight:600;color:#2D6A4F;font-size:11px">入会比率</td>`;
  enrollBase3.forEach((v,mi)=>{
    html+=`<td><input type="number" value="${v}" data-field="enroll_base" data-mi="${mi}" onchange="onRatioChange(this)" style="width:38px;font-size:10px;color:#2D6A4F;border-color:#a5d6a7"></td>`;
  });
  html+=`<td style="background:#e8f5e9;font-size:10px;font-weight:700;color:#2D6A4F">${eBaseTotal}</td></tr>`;
  html+=`<tr><td style="font-weight:600;color:#C1292E;font-size:11px">退会比率</td>`;
  wdBase3.forEach((v,mi)=>{
    html+=`<td><input type="number" value="${v}" data-field="wd_base" data-mi="${mi}" onchange="onRatioChange(this)" style="width:38px;font-size:10px;color:#C1292E;border-color:#ef9a9a"></td>`;
  });
  html+=`<td style="background:#fef5f5;font-size:10px;font-weight:700;color:#C1292E">${wBaseTotal}</td></tr>`;
  html+=`</tbody></table></div></details>`;

  el.innerHTML=html;
}

function makeNewClassroom(fy, idx, openMonth) {
  const base = (STATE.classrooms[2026] && STATE.classrooms[2026][0]) ? STATE.classrooms[2026][0] : INITIAL_DATA.classrooms[2026][0]; // たつのをテンプレートに
  const om = openMonth >= 0 ? openMonth : 0;
  const enroll = distributeEnroll(30, om, base.enroll_base);
  return {
    id: `${fy}-new-${Date.now()}-${idx}`,
    name: `新教室${idx+1}`,
    open_month: om,
    start_st: 0,
    prices: Array(12).fill(24000),
    enroll,
    ads: generateAds(om),
    rent: 220000, water: 2000, electric: 15000, phone: 10000, travel: 2000,
    consume_r: 700, promo_r: 150, recruit_fee: 0,
    sys_per_st: 300, mat_per_st: 4500,
    exam_buy_r: 0.9, enroll_fee: 11000,
    fee_r: 150, welfare_r: 0, repair: 10000, lease_cost: 0,
    insurance: 1000, sanitation: 1500, other_exp: 0,
    salary1: 275000, salary2: 0,
    legal_welf_r: 0.15, tax_r: 0.07,
    wd_rate: 0.035, start_wd: 0, max_st: 80,

async function addClassroom(openMonth) {
  const fy = curYear().fiscal_year;
  const cls = STATE.classrooms[fy];
  const newCl = makeNewClassroom(fy, cls.length, openMonth);
  // DBに新規作成してIDを取得
  const res = await apiPost('classroom', { action: 'add', fiscal_year: fy, name: newCl.name, open_month: openMonth });
  if (res && res.id) {
    newCl.id = res.id;
    // 全フィールドをDBに保存
    const allFields = ['prices','enroll','ads','enroll_base','wd_base',
      'start_st','start_wd','max_st','rent','water','electric','phone','travel',
      'consume_r','promo_r','recruit_fee','recruit_fee_oct','recruit_fee_part',
      'sys_per_st','mat_per_st','fee_r','welfare_r','repair','lease_cost',
      'insurance','sanitation','other_exp','parttime_cost','enroll_fee','salary1','salary2',
      'wd_rate','conv_r','exam_buy_r','exam_sell_r','legal_welf_r','tax_r'];
    allFields.forEach(f => { if (newCl[f] !== undefined) saveField(newCl.id, f, newCl[f]); });
  }
  cls.push(newCl);
  STATE.clIdx = cls.length - 1;
  STATE.plMode = 'single';
  calcAllResults();
  renderYearTabs();
  renderAll();
}

async function deleteClassroom(idx) {
  const fy = curYear().fiscal_year;
  const cls = STATE.classrooms[fy];
  if (cls.length <= 1) { alert('最低1教室は必要です'); return; }
  const name = cls[idx].name;
  if (!confirm(`「${name}」を削除しますか？\nこの操作は現在の年度のみに適用されます。`)) return;
  const cl = cls[idx];
  // DBから削除
  if (cl.id && !String(cl.id).includes('new') && !String(cl.id).includes('-')) {
    await apiPost('classroom', { action: 'delete', id: cl.id });
  }
  cls.splice(idx, 1);
  STATE.clIdx = Math.min(STATE.clIdx, cls.length - 1);
  STATE.plMode = 'single';
  calcAllResults();
  renderYearTabs();
  renderAll();
}

function onAdsRatioChange(el) {
  const mi = parseInt(el.dataset.mi);
  const val = parseFloat(el.value) || 0;
  const p = curClassrooms()[STATE.clIdx];
  // 現在のads配列を比率ベースに変換して更新
  const annAds = p.ads ? p.ads.reduce((s,v)=>s+v, 0) : 0;
  if (!annAds) return;
  // 現在の比率配列（%表示）を取得・更新
  const adsBase = p.ads && p.ads.some(v=>v>0) ? p.ads.slice() : ADS_BASE.slice();
  const total = adsBase.reduce((s,v)=>s+v, 0);
  const pcts = adsBase.map(v => total > 0 ? v/total*100 : 0);
  pcts[mi] = val;
  // pcts→実金額に変換
  const pctTotal = pcts.reduce((s,v)=>s+v, 0);
  if (!pctTotal) return;
  const newAds = pcts.map(p => Math.round(annAds * p / pctTotal));
  // 端数調整
  let diff = annAds - newAds.reduce((s,v)=>s+v, 0);
  const idx = pcts.indexOf(Math.max(...pcts));
  newAds[idx] += diff;
  p.ads = newAds;
  calcAllResults(); renderKPI(); renderPLTable(); renderParamArea();
  saveField(p.id, 'ads', p.ads);
}

function applyBulkChange() {
  const field = document.getElementById('bulk-field').value;
  const valStr = document.getElementById('bulk-value').value;
  if (valStr === '') { alert('値を入力してください'); return; }
  const selectedOpt = document.getElementById('bulk-field').selectedOptions[0];
  const step = parseFloat(selectedOpt?.dataset.step)||1;
  const special = selectedOpt?.dataset.special || '';
  const val = step < 1 ? parseFloat(valStr)||0 : parseInt(valStr)||0;
  const checked = document.querySelectorAll('.master-check:checked');
  if (!checked.length) { alert('教室を選択してください'); return; }
  if (!confirm(`選択中の${checked.length}教室の「${selectedOpt.text}」を${val}${special==='wd'?'%':''}に変更しますか？`)) return;

  checked.forEach(cb => {
    const name = cb.dataset.name;
    STATE.years.forEach(ys => {
      (STATE.classrooms[ys.fiscal_year]||[]).forEach(c => {
        if (c.name !== name) return;
        if (special === 'enroll') {
          c.enroll_annual = val;
          saveField(c.id, 'enroll_annual', val);
          c.enroll = distributeEnroll(val, c.open_month >= 0 ? c.open_month : undefined, c.enroll_base);
          saveField(c.id, 'enroll', c.enroll);
        } else if (special === 'wd') {
          c.wd_rate = val / 100;
          saveField(c.id, 'wd_rate', c.wd_rate);
        } else if (special === 'ads') {
          c.ads = distributeAds(val, c.open_month >= 0 ? c.open_month : undefined);
          saveField(c.id, 'ads', c.ads);
        } else {
          c[field] = val;
          saveField(c.id, field, val);
        }
      });
    });
  });
  calcAllResults(); renderKPI(); renderPLTable(); renderClassroomList(); renderMasterTable();
}

function renderYearSummary(){

    const s={year:fy,rooms:cls.length,revenue:0,expense:0,profit:0,enroll:0,wd:0,endSt:0,totalSt:0};
    cls.forEach((_,ci)=>{
      const r=res[ci];if(!r)return;
      s.revenue+=r.revenue;s.expense+=r.expense;s.profit+=r.profit;
      s.enroll+=r.totalEnroll;s.wd+=r.totalWd;s.endSt+=r.endStudents;
      s.totalSt+=r.months.reduce((sum,m)=>sum+m[3],0);
    });
    return s;
  });

  let html='<thead><tr><th style="text-align:left">年度</th><th>教室数</th><th>生徒数(末)</th><th>入会</th><th>退会</th><th>退会率</th><th>売上</th><th>経費</th><th>利益</th><th>利益率</th></tr></thead><tbody>';
  summaries.forEach((s,i)=>{
    const wdRate=s.totalSt>0?(s.wd/s.totalSt*100).toFixed(2)+'%':'-';
    const pr=s.revenue>0?(s.profit/s.revenue*100).toFixed(1)+'%':'-';

    html+=`<tr style="background:${bg}" onclick="STATE.yearIdx=${i};STATE.clIdx=0;renderYearTabs();renderAll()">

      <td style="color:#e67e22;font-weight:600">${wdRate}</td>
      <td>${fmtYen(s.revenue)}</td><td>${fmtYen(s.expense)}</td>
      <td style="font-weight:700;color:${s.profit>=0?'#2D6A4F':'#C1292E'}">${fmtYen(s.profit)}</td>
      <td>${pr}</td></tr>`;
  });
  html+='</tbody>';
  document.getElementById('year-summary-table').innerHTML=html;

  const ctx=document.getElementById('year-chart');
  if(STATE.yearChart)STATE.yearChart.destroy();
  STATE.yearChart=new Chart(ctx,{
    type:'bar',

      labels:summaries.map(s=>s.year+'年度'),

function switchMainTab(idx){
  STATE.mainTab=idx;
  document.querySelectorAll('[id^="main-tab-"]').forEach((el,i)=>{el.style.display=i===idx?'':'none'});
  document.querySelectorAll('.tabs')[1].querySelectorAll('.tab').forEach((el,i)=>{el.className='tab'+(i===idx?' active':'')});
  if(idx===1)renderParamArea();
  if(idx===2)renderMasterTable();
  if(idx===3)renderYearSummary();
}

function toggleCard(header){
  header.nextElementSibling.classList.toggle('collapsed');
}

// ============================================================
// Start
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('sim_token')) { loadFromAPI(); }
  else { showLoginScreen(); }
});

function showLoginScreen() {
  document.getElementById('loading').innerHTML = `
    <div style="max-width:340px;margin:0 auto;padding:40px 20px;text-align:center">
      <div style="font-size:36px;margin-bottom:16px">🌿</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px;color:#2D5016">まんてん個別プラス</div>
      <div style="font-size:13px;color:#888;margin-bottom:24px">シミュレーター</div>
      <input type="password" id="pw-input" placeholder="パスワードを入力"
        style="width:100%;padding:10px 14px;border:2px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:12px;text-align:center"
        onkeydown="if(event.key==='Enter')doLogin()">
      <button onclick="doLogin()"
        style="width:100%;padding:10px;background:#2D5016;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer">
        ログイン
      </button>
      <div id="pw-error" style="color:#C1292E;font-size:13px;margin-top:10px;display:none">パスワードが違います</div>
    </div>`;
  setTimeout(() => document.getElementById('pw-input')?.focus(), 100);
}
async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  const fd = new FormData(); fd.append('route','auth'); fd.append('password',pw);
  const r = await fetch(API, { method:'POST', body:fd });
  const d = await r.json();
  if (d.ok) { sessionStorage.setItem('sim_token', pw); loadFromAPI(); }
  else { document.getElementById('pw-error').style.display = 'block'; }
}
async function loadFromAPI() {
  document.getElementById('loading').innerHTML = 'データを読み込み中...';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('app').style.display = 'none';
  try {
    const data = await apiGet('all');
    if (data.error) {
      if (data.error === 'Unauthorized') { sessionStorage.removeItem('sim_token'); showLoginScreen(); return; }
      document.getElementById('loading').innerHTML = '<div style="color:#C1292E">APIエラー: '+data.error+'</div>';
      return;
    }
    // 年度設定はAPIから（なければINITIAL_DATAを使用）
    STATE.years = (data.years && data.years.length > 0) ? data.years : INITIAL_DATA.years;
    // 2025年度の教室データはAPIから取得（正しいIDを持つ）
    // 2026年度：DBにデータがあればそれを使用、なければEXCEL_PROJECTIONSから生成
    const _raw2026 = data.classrooms?.[2026];
    if (_raw2026 && Array.isArray(_raw2026) && _raw2026.length > 0) {
      STATE.classrooms[2026] = _raw2026;
    } else {
      // DBになければinitDataと同じロジックで2026年度を生成
      const _openPlan2026 = OPEN_MONTH_PLAN[2026] || {};
      const _proj2026 = EXCEL_PROJECTIONS[2026];
      const _base2026 = INITIAL_DATA.classrooms[2026];
      STATE.classrooms[2026] = _proj2026 ? _proj2026.map((pr, i) => {
        const base = _base2026[i] || _base2026[0];
        const isNew = _openPlan2026[i] !== undefined;
        const om = isNew ? _openPlan2026[i] : -1;
        const baseTemplate = {..._base2026[0],rent:220000,water:2000,electric:15000,phone:10000,travel:2000,repair:10000,insurance:1000,sanitation:1500,other_exp:0,salary1:275000,parttime_cost:0,recruit_fee:0,recruit_fee_part:0};
        const src = isNew ? {...baseTemplate} : (base ? {...base} : {...baseTemplate});
        return {
          id: `2026-${i}`,
          name: pr.name || (base?base.name:`新教室${i+1}`),
          open_month: om, start_st: pr.start_st||0,
          prices: src.prices?src.prices.slice():Array(12).fill(25000),
          enroll: src.enroll ? src.enroll.slice() : distributeEnroll(30, om >= 0 ? om : undefined, src.enroll_base),
          ads: isNew ? generateAds(om) : (src.ads?src.ads.slice():Array(12).fill(35000)),
          rent:src.rent||220000,water:src.water||2000,electric:src.electric||15000,phone:src.phone||10000,travel:src.travel||2000,
          consume_r:src.consume_r||700,promo_r:src.promo_r||150,sys_per_st:src.sys_per_st||300,mat_per_st:src.mat_per_st||4500,
          exam_buy_r:src.exam_buy_r||0.9,fee_r:src.fee_r||150,welfare_r:src.welfare_r||0,repair:src.repair||10000,
          lease_cost:src.lease_cost||0,insurance:src.insurance||1000,sanitation:src.sanitation||1500,
          other_exp:isNew?0:(src.other_exp||5000),recruit_fee:src.recruit_fee||0,recruit_fee_part:src.recruit_fee_part||0,parttime_cost:src.parttime_cost||0,
          salary1:pr.salary1||src.salary1||275000,salary2:0,legal_welf_r:src.legal_welf_r||0.15,tax_r:src.tax_r||0.07,
          enroll_fee:src.enroll_fee||11000,exam_sell_r:src.exam_sell_r||0.03,
          wd_rate:src.wd_rate||0.035,start_wd:0,max_st:src.max_st||80,conv_r:src.conv_r||0.6,
          enroll_base:src.enroll_base?src.enroll_base.slice():ENROLL_BASE_DEFAULT.slice(),
          wd_base:src.wd_base?src.wd_base.slice():WD_BASE_DEFAULT.slice(),
        };
      }) : _base2026;
    }

    // mat_per_stを4500に強制上書き・英賀保/姫路中地のopen_monthを-1に修正
    (STATE.classrooms[2026]||[]).forEach(c => {
      if ((c.mat_per_st||0) !== 4500) {
        c.mat_per_st = 4500;
        if (c.id) saveField(c.id, 'mat_per_st', 4500);
      }
      // 2025年開校教室は2026年度では既存扱い・adsも全月配分に強制上書き
      if (c.name==='英賀保駅前' || c.name==='姫路中地') {
        if (c.open_month !== -1) {
          c.open_month = -1;
          if (c.id) saveField(c.id, 'open_month', -1);
        }
        // adsが4〜9月に0が並んでいる（旧データ）場合は全月配分に修正
        const adsTotal = (c.ads||[]).reduce((s,v)=>s+v,0);
        const adsZeroCount = (c.ads||[]).slice(0,6).filter(v=>v===0).length;
        if (adsZeroCount >= 4 && adsTotal > 0) {
          // 年間合計を保持したまま全月比率で再配分
          c.ads = distributeAds(adsTotal, undefined);
          if (c.id) saveField(c.id, 'ads', c.ads);
        } else if (adsTotal === 0) {
          // 合計0の場合はデフォルト855,000円で配分
          c.ads = distributeAds(855000, undefined);
          if (c.id) saveField(c.id, 'ads', c.ads);
        }
      }
    });
    // 2026年度以降はinitDataと同じロジックで自動生成（計算ロジックと完全一致）
    for (const fy of [2027,2028,2029,2030]) {
      const prev_fy = fy - 1;
      const prevCls = STATE.classrooms[prev_fy] || [];
      const proj = EXCEL_PROJECTIONS[fy];
      if (!proj) continue;
      const openPlan = OPEN_MONTH_PLAN[fy] || {};
      const baseClassrooms = STATE.classrooms[2026] || INITIAL_DATA.classrooms[2026];
      const cls = proj.map((pr, i) => {
        const prevCl = i < prevCls.length ? prevCls[i] : null;
        const nameMap = CLASSROOM_NAMES_BY_YEAR[fy] || {};
        const name = pr.name || nameMap[i] || (prevCl ? prevCl.name : `新教室${i+1}`);
        const isNew = openPlan[i] !== undefined;
        const om = isNew ? openPlan[i] : -1;
        const baseTemplate = {
          ...baseClassrooms[0],
          rent:220000,water:2000,electric:15000,phone:10000,travel:2000,
          repair:10000,insurance:1000,sanitation:1500,other_exp:0,salary1:275000,
          parttime_cost:0,recruit_fee:0,recruit_fee_oct:0,recruit_fee_part:0,
          atama_r:baseClassrooms[0]?.atama_r||0.2,teacher_monthly:baseClassrooms[0]?.teacher_monthly||50000,
        };
        const base = isNew ? {...baseTemplate} : (prevCl ? {...prevCl} : {...baseTemplate});
        const annualEnroll = isNew
          ? distributeEnroll(30, om, base.enroll_base)
          : distributeEnroll(30, undefined, base.enroll_base);
        // DB上のIDを持つ教室があれば引き継ぐ（パラメータ編集のsaveFieldのため）
        // sort_order（配列インデックス i）でDB行をid照合する。
        // 名前ベース照合は教室名が変わると失敗するため、位置ベースを優先する。
        const dbCl = (data.classrooms[fy] && i < data.classrooms[fy].length)
          ? data.classrooms[fy][i] : null;
        // DB側の名前が現在の期待名と異なる場合は更新予約（ロード後のflushSavesで送信）
        if (dbCl?.id && dbCl.name !== name) saveField(dbCl.id, 'name', name);
        const result = {
          id: dbCl ? dbCl.id : `${fy}-${i}`,
          name, open_month:om, start_st:pr.start_st||0,
          prices: dbCl ? dbCl.prices?.slice() : (base.prices?.slice() || Array(12).fill(25000)),
          enroll: dbCl ? dbCl.enroll?.slice() : (isNew ? distributeEnroll(30, om, base.enroll_base) : annualEnroll),
          ads: dbCl ? dbCl.ads : (isNew ? generateAds(om) : base.ads?.slice()),
          rent:       dbCl ? dbCl.rent       : (base.rent||220000),
          water:      dbCl ? dbCl.water      : base.water,
          electric:   dbCl ? dbCl.electric   : base.electric,
          phone:      dbCl ? dbCl.phone      : base.phone,
          travel:     dbCl ? dbCl.travel     : base.travel,
          consume_r:  dbCl ? dbCl.consume_r  : base.consume_r,
          promo_r:    dbCl ? dbCl.promo_r    : base.promo_r,
          sys_per_st: dbCl ? dbCl.sys_per_st : base.sys_per_st,
          mat_per_st: dbCl ? dbCl.mat_per_st : base.mat_per_st,
          exam_buy_r: dbCl ? dbCl.exam_buy_r : base.exam_buy_r,
          fee_r:      dbCl ? dbCl.fee_r      : base.fee_r,
          welfare_r:  dbCl ? dbCl.welfare_r  : base.welfare_r,
          repair:     dbCl ? dbCl.repair     : (base.repair||10000),
          lease_cost: dbCl ? dbCl.lease_cost : (base.lease_cost||0),
          insurance:  dbCl ? dbCl.insurance  : (base.insurance||1000),
          sanitation: dbCl ? dbCl.sanitation : (base.sanitation||1500),
          other_exp:  dbCl ? dbCl.other_exp  : (isNew ? 0 : (base.other_exp||5000)),
          recruit_fee:      dbCl ? dbCl.recruit_fee      : 0,
          recruit_fee_oct:  dbCl ? dbCl.recruit_fee_oct  : 0,
          recruit_fee_part: dbCl ? dbCl.recruit_fee_part : 0,
          parttime_cost: dbCl ? dbCl.parttime_cost : (base.parttime_cost||0),
          salary1: dbCl ? dbCl.salary1 : (pr.salary1||base.salary1||275000),
          salary2: 0,
          legal_welf_r: dbCl ? dbCl.legal_welf_r : base.legal_welf_r,
          tax_r:        dbCl ? dbCl.tax_r        : base.tax_r,
          enroll_fee:   dbCl ? dbCl.enroll_fee   : base.enroll_fee,
          exam_sell_r:  dbCl ? dbCl.exam_sell_r  : (base.exam_sell_r||0),
          wd_rate:   dbCl ? dbCl.wd_rate   : (base.wd_rate||0.035),
          start_wd: 0,
          max_st:   dbCl ? dbCl.max_st   : (base.max_st||80),
          conv_r:   dbCl ? dbCl.conv_r   : (base.conv_r||0.6),
          enroll_base: dbCl ? dbCl.enroll_base?.slice() : (base.enroll_base?.slice() || ENROLL_BASE_DEFAULT.slice()),
          wd_base:     dbCl ? dbCl.wd_base?.slice()     : (base.wd_base?.slice() || WD_BASE_DEFAULT.slice()),
          enroll_annual: dbCl ? (dbCl.enroll_annual != null ? dbCl.enroll_annual : null) : null,
        };
        return result;
      });
      STATE.classrooms[fy] = cls;
    }
    // 全教室のadsをADS_BASEの比率で強制再計算（DB保存値の差異を吸収）
    STATE.years.forEach(ys => {
      (STATE.classrooms[ys.fiscal_year]||[]).forEach(c => {
        const annAds = (c.ads||[]).reduce((s,v)=>s+v, 0);
        if (annAds > 0) {
          const newAds = distributeAds(annAds, undefined);
          // 比率が異なる場合のみ更新
          const isSame = newAds.every((v,i) => v === (c.ads[i]||0));
          if (!isSame) {
            c.ads = newAds;
            if (c.id) saveField(c.id, 'ads', c.ads);
          }
        }
      });
    });
    // enroll_annualをDBから取得。未設定の場合はenroll合計からフォールバック
    STATE.years.forEach(ys => {
      (STATE.classrooms[ys.fiscal_year]||[]).forEach(c => {
        if (c.enroll_annual == null) {
          c.enroll_annual = (c.enroll||[]).reduce((s,v)=>s+v, 0);
        }
      });
    });
    // ロード時の自動保存をすべてフラッシュ
    await flushSaves();
    calcAllResults();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    const totalRooms = Object.values(STATE.classrooms).reduce((s,a)=>s+a.length,0);
    document.getElementById('header-badge').textContent = STATE.years.length+'カ年計画 (2026-2030)';
    document.getElementById('header-sub').textContent = '全'+totalRooms+'教室データ反映済 ｜ DBデータ準拠';
    renderYearTabs(); renderAll();
    updateSaveInfo(); // 保存情報を表示
    // ダッシュボード向けエクスポート書き込み

  } catch(e) {
    document.getElementById('loading').innerHTML = '<div style="color:#C1292E">読み込み失敗: '+e.message+'</div>';
  }
}
</script>
