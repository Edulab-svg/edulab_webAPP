/* Section title */

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}

.record-body{border-top:1px solid #f1f5f9;background:#f8fafc;padding:14px}
.grid-form{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}

/* Discount note */
.discount-note{background:#fefce8;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;font-size:11px;color:#92400e;margin-top:8px}

/* confirm button row */
.confirm-btns{display:flex;gap:10px;margin-top:20px}

  .cat-grid{grid-template-columns:1fr!important}

/* Collapse arrow */
.arrow{font-size:10px;color:#94a3b8;flex-shrink:0;transition:transform .2s}

/* Edit detail panel */
.detail-panel{padding:12px;background:#f8fafc;border-top:1px solid #f1f5f9}

/* Green complete btn */
.complete-btn{flex:1;padding:10px;border-radius:12px;font-size:13px;font-weight:700;transition:all .15s}
.complete-btn.done{background:#f1f5f9;color:#475569}
.complete-btn.done:hover{background:#e2e8f0}
.complete-btn.notdone{background:linear-gradient(135deg,#4ade80,#22c55e);color:#fff;box-shadow:0 4px 12px rgba(34,197,94,.3)}

.cloud-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;border:1px solid transparent;transition:all .2s}

.cloud-badge.idle{background:#f8fafc;border-color:#e2e8f0;color:#94a3b8}

</style>

/* ─ SaveLoadBar（シンプル版：クラウド状態＋JSONバックアップ）─ */
function SaveLoadBar({userName,getSnapshot,onLoad,cloudStatus,onSwitch}){
  const saveJson=()=>{
    const snap=getSnapshot();
    const blob=new Blob([JSON.stringify(snap,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`研修タスク_${userName||""}${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  const cloudLabel={saved:"自動保存済",saving:"保存中…",error:"保存失敗",idle:""}[cloudStatus]||"";
  const cloudIcon={saved:"☁️ ✓",saving:"☁️ ↻",error:"⚠️",idle:"☁️"}[cloudStatus]||"☁️";
  return <div className="save-bar">
    <span className={"cloud-badge "+cloudStatus}>{cloudIcon} {cloudLabel}</span>
    <button onClick={onSwitch} style={{background:"#f1f5f9",color:"#475569",border:"1px solid #e2e8f0",borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>
      👥 ユーザー切替
    </button>
    <button onClick={saveJson} style={{background:"#f8fafc",color:"#475569",border:"1px solid #e2e8f0",borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>
      💾 JSONを保存
    </button>
    <label style={{background:"#fff7ed",color:"#ea580c",border:"1.5px solid #fed7aa",borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
      📂 JSONを読込む
      <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
        const f=e.target.files?.[0];if(!f)return;
        const r=new FileReader();
        r.onload=ev=>{try{onLoad(JSON.parse(ev.target.result));}catch{alert("読み込み失敗");}};
        r.readAsText(f);e.target.value="";
      }}/>
    </label>
  </div>;
}

/* ─ TemplateEditScreen ─ */
function TemplateEditScreen({template,onSave,onBack,busy}){
  const [name,setName]=useState(template.name);
  // tasks は {text:string, assignee:string} オブジェクト（後方互換で string も許容）
  const [cats,setCats]=useState(JSON.parse(JSON.stringify(template.cats||[])));
  const [newCat,setNewCat]=useState("");
  const [newTaskText,setNewTaskText]=useState({});
  const [newTaskAssignee,setNewTaskAssignee]=useState({});
  const [addingTask,setAddingTask]=useState({});
  const tText=t=>typeof t==="string"?t:(t.text||"");
  const tAssignee=t=>typeof t==="string"?"":( t.assignee||"");
  const addCat=()=>{const n=newCat.trim();if(!n)return;setCats(c=>[...c,{category:n,tasks:[]}]);setNewCat("");};
  const delCat=ci=>setCats(c=>c.filter((_,i)=>i!==ci));
  const addTask=ci=>{
    const t=(newTaskText[ci]||"").trim();if(!t)return;
    const a=(newTaskAssignee[ci]||"").trim();
    setCats(c=>c.map((cat,i)=>i===ci?{...cat,tasks:[...cat.tasks,{text:t,assignee:a}]}:cat));
    setNewTaskText(p=>({...p,[ci]:""}));setNewTaskAssignee(p=>({...p,[ci]:""}));setAddingTask(p=>({...p,[ci]:false}));
  };
  const delTask=(ci,ti)=>setCats(c=>c.map((cat,i)=>i===ci?{...cat,tasks:cat.tasks.filter((_,j)=>j!==ti)}:cat));
  const setAssignee=(ci,ti,v)=>setCats(c=>c.map((cat,i)=>i===ci?{...cat,tasks:cat.tasks.map((task,j)=>j===ti?{text:tText(task),assignee:v}:task)}:cat));
  const setText=(ci,ti,v)=>setCats(c=>c.map((cat,i)=>i===ci?{...cat,tasks:cat.tasks.map((task,j)=>j===ti?{text:v,assignee:tAssignee(task)}:task)}:cat));
  const [dragSrc,setDragSrc]=useState(null); // "ci-ti"
  const [dragOver,setDragOver]=useState(null); // "ci-ti"
  const onDragStart=(e,ci,ti)=>{setDragSrc(`${ci}-${ti}`);e.dataTransfer.effectAllowed="move";};
  const onDragOver=(e,ci,ti)=>{e.preventDefault();setDragOver(`${ci}-${ti}`);};
  const onDrop=(e,tgtCi,tgtTi)=>{
    e.preventDefault();setDragOver(null);
    if(!dragSrc)return;
    const [srcCi,srcTi]=[parseInt(dragSrc.split("-")[0]),parseInt(dragSrc.split("-")[1])];
    if(srcCi!==tgtCi||srcTi===tgtTi)return;
    const tasks=[...cats[srcCi].tasks];
    const [moved]=tasks.splice(srcTi,1);
    tasks.splice(tgtTi,0,moved);
    setCats(c=>c.map((cat,i)=>i===srcCi?{...cat,tasks}:cat));
    setDragSrc(null);
  };
  const onDragEnd=()=>{setDragSrc(null);setDragOver(null);};
  return <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#eff6ff 0%,#e0e7ff 50%,#f0fdf4 100%)",padding:16}}>
    <div style={{maxWidth:640,margin:"0 auto",paddingTop:16}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button onClick={onBack} style={{padding:"6px 14px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",color:"#475569",fontSize:12,fontWeight:600,cursor:"pointer",flexShrink:0}}>← 戻る</button>
        <span style={{fontWeight:800,fontSize:17,color:"#1e293b"}}>{template.id?"テンプレートを編集":"テンプレートを新規作成"}</span>
      </div>
      <div style={{background:"#fff",borderRadius:16,padding:20,marginBottom:16,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
        <label className="form-label">テンプレート名</label>
        <input className="form-input" value={name} onChange={e=>setName(e.target.value)} placeholder="例：標準研修コース" style={{fontSize:15,fontWeight:600}}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr",gap:14,marginBottom:14}}>
        {cats.map((cat,ci)=>{
          const s=CAT_STYLES[ci%CAT_STYLES.length];
          return <div key={ci} className="cat-card" style={{background:s.light,borderColor:s.border}}>
            <div className="cat-header" style={{background:s.color}}>
              <span style={{fontWeight:700,color:"#fff",fontSize:13}}>{cat.category}</span>
              <button onClick={()=>delCat(ci)} style={{color:"rgba(255,255,255,.6)",fontSize:14,padding:"2px 6px",borderRadius:6,background:"rgba(0,0,0,.1)"}}>🗑</button>
            </div>
            <div style={{padding:8}}>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {cat.tasks.map((task,ti)=>{
                  const key=`${ci}-${ti}`;
                  const isOver=dragOver===key;
                  return <div key={ti}
                    draggable onDragStart={e=>onDragStart(e,ci,ti)} onDragOver={e=>onDragOver(e,ci,ti)} onDrop={e=>onDrop(e,ci,ti)} onDragEnd={onDragEnd}
                    style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderRadius:8,border:isOver?"2px solid #3b82f6":"1px solid #e2e8f0",background:"#fff",transition:"border-color .1s"}}>
                    <span className="drag-handle" style={{fontSize:13,flexShrink:0}}>⠿</span>
                    <input value={tText(task)} onChange={e=>setText(ci,ti,e.target.value)} placeholder="タスク名"
                      style={{flex:1,fontSize:12,color:"#334155",border:"none",background:"transparent",outline:"none",minWidth:0,padding:0,lineHeight:1.5}}/>
                    <input value={tAssignee(task)} onChange={e=>setAssignee(ci,ti,e.target.value)} placeholder="担当者"
                      style={{width:72,border:"1px solid #e2e8f0",borderRadius:6,padding:"2px 6px",fontSize:11,color:"#475569",outline:"none",flexShrink:0}}/>
                    <button onClick={()=>delTask(ci,ti)} style={{background:"#fef2f2",color:"#ef4444",border:"none",borderRadius:6,padding:"2px 7px",fontSize:11,cursor:"pointer",flexShrink:0}}>🗑</button>
                  </div>;
                })}
              </div>
              {addingTask[ci]?
                <div style={{display:"flex",flexWrap:"wrap",gap:6,padding:"6px 4px 2px"}}>
                  <input className="form-input" style={{fontSize:12,flex:"2 1 120px"}} value={newTaskText[ci]||""} onChange={e=>setNewTaskText(p=>({...p,[ci]:e.target.value}))} placeholder="タスク名を入力" onKeyDown={e=>e.key==="Enter"&&addTask(ci)} autoFocus/>
                  <input className="form-input" style={{fontSize:12,flex:"1 1 80px"}} value={newTaskAssignee[ci]||""} onChange={e=>setNewTaskAssignee(p=>({...p,[ci]:e.target.value}))} placeholder="担当者（任意）" onKeyDown={e=>e.key==="Enter"&&addTask(ci)}/>
                  <button onClick={()=>addTask(ci)} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"4px 12px",fontSize:12,fontWeight:700,flexShrink:0,cursor:"pointer"}}>追加</button>
                  <button onClick={()=>setAddingTask(p=>({...p,[ci]:false}))} style={{color:"#94a3b8",fontSize:18,padding:"0 4px"}}>×</button>
                </div>:
                <button onClick={()=>setAddingTask(p=>({...p,[ci]:true}))} style={{width:"100%",padding:"6px",marginTop:4,borderRadius:8,border:"1.5px dashed "+s.border,color:s.color,fontSize:12,fontWeight:600,background:"transparent",cursor:"pointer"}}>＋ タスクを追加</button>}
            </div>
          </div>;
        })}
      </div>
      <div className="add-cat-box" style={{marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:8}}>＋ カテゴリを追加</div>
        <div style={{display:"flex",gap:8}}>
          <input className="form-input" value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="カテゴリ名" onKeyDown={e=>e.key==="Enter"&&addCat()}/>
          <button onClick={addCat} style={{background:"#334155",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:12,fontWeight:700,flexShrink:0,cursor:"pointer"}}>追加</button>
        </div>
      </div>
      <button onClick={()=>onSave({...template,name,cats})} disabled={busy||!name.trim()}
        style={{width:"100%",padding:"14px",borderRadius:12,background:"linear-gradient(135deg,#3b82f6,#6366f1)",color:"#fff",fontSize:14,fontWeight:700,border:"none",cursor:(!name.trim()||busy)?"not-allowed":"pointer",opacity:(!name.trim()||busy)?.5:1,boxShadow:"0 4px 12px rgba(99,102,241,.3)"}}>
        💾 保存する
      </button>
    </div>
  </div>;
}

/* ─ TemplateManagerScreen ─ */
function TemplateManagerScreen({templates,setTemplates,onBack}){
  const [editing,setEditing]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);
  const [busy,setBusy]=useState(false);
  const doDelete=async(id)=>{
    setBusy(true);
    try{
      const r=await fetch(API,{method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"delete_template",id})});
      const d=await r.json();
      if(d.ok){setTemplates(t=>t.filter(x=>x.id!==id));setConfirmDel(null);}
      else alert("削除に失敗しました");
    }catch{alert("通信エラーが発生しました");}
    setBusy(false);
  };
  const doSave=async(tmpl)=>{
    setBusy(true);
    try{
      if(tmpl.id){
        const r=await fetch(API,{method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"update_template",id:tmpl.id,name:tmpl.name,cats:tmpl.cats})});
        const d=await r.json();
        if(d.ok)setTemplates(ts=>ts.map(t=>t.id===tmpl.id?{...t,name:tmpl.name,cats:tmpl.cats}:t));
        else alert("保存に失敗しました");
      }else{
        const r=await fetch(API,{method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"add_template",name:tmpl.name,cats:tmpl.cats})});
        const d=await r.json();
        if(d.ok)setTemplates(ts=>[...ts,d.template]);
        else alert("作成に失敗しました");
      }
    }catch{alert("通信エラーが発生しました");}
    setEditing(null);
    setBusy(false);
  };
  const doCopy=async(t)=>{
    setBusy(true);
    try{
      const r=await fetch(API,{method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"add_template",name:t.name+"のコピー",cats:JSON.parse(JSON.stringify(t.cats))})});
      const d=await r.json();
      if(d.ok)setTemplates(ts=>[...ts,d.template]);
      else alert("コピーに失敗しました");
    }catch{alert("通信エラーが発生しました");}
    setBusy(false);
  };
  if(editing!==null) return <TemplateEditScreen template={editing} onSave={doSave} onBack={()=>setEditing(null)} busy={busy}/>;
  return <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#eff6ff 0%,#e0e7ff 50%,#f0fdf4 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}}>
    {confirmDel&&<Confirm msg={`「${confirmDel.name}」を削除しますか？この操作は取り消せません。`} onOk={()=>doDelete(confirmDel.id)} onCancel={()=>setConfirmDel(null)}/>}
    <div style={{width:"100%",maxWidth:480}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:68,height:68,background:"linear-gradient(135deg,#3b82f6,#6366f1)",borderRadius:20,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:32,marginBottom:14,boxShadow:"0 8px 24px rgba(99,102,241,.3)"}}>📝</div>
        <h1 style={{fontSize:22,fontWeight:800,color:"#1e293b",letterSpacing:"-0.3px"}}>テンプレート管理</h1>
        <p style={{fontSize:13,color:"#64748b",marginTop:6}}>研修タスクのテンプレートを管理します</p>
      </div>
      <div style={{background:"#fff",borderRadius:20,boxShadow:"0 20px 40px rgba(0,0,0,.12)",padding:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <button onClick={onBack} style={{fontSize:12,fontWeight:600,padding:"4px 12px",borderRadius:8,border:"1px solid #e2e8f0",background:"#f8fafc",color:"#475569",cursor:"pointer"}}>← 戻る</button>
          <button onClick={()=>setEditing({name:"",cats:[]})} style={{fontSize:12,fontWeight:700,padding:"6px 14px",borderRadius:8,background:"#3b82f6",color:"#fff",border:"none",cursor:"pointer"}}>＋ 新規作成</button>
        </div>
        {templates.length===0?
          <div style={{textAlign:"center",padding:"24px 0",color:"#94a3b8",fontSize:13}}>テンプレートがありません<br/>「＋ 新規作成」から作成してください</div>:
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {templates.map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderRadius:12,border:"1.5px solid #e2e8f0",background:"#f8fafc"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>{t.name}</div>
                <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{t.cats.length}カテゴリ・{t.cats.reduce((s,c)=>s+c.tasks.length,0)}タスク</div>
              </div>
              <button onClick={()=>setEditing({...t,cats:JSON.parse(JSON.stringify(t.cats))})} style={{padding:"6px 12px",borderRadius:8,background:"#eff6ff",border:"1px solid #bfdbfe",color:"#3b82f6",fontSize:12,fontWeight:600,cursor:"pointer",flexShrink:0}}>✏️ 編集</button>

              <button onClick={()=>setConfirmDel(t)} disabled={busy} style={{padding:"6px 10px",borderRadius:8,background:"#fef2f2",border:"1px solid #fecaca",color:"#ef4444",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0}}>🗑</button>
            </div>)}
          </div>}
      </div>
    </div>
  </div>;
}

/* ─ UserSelectScreen ─ */
function UserSelectScreen({onSelect}){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [newName,setNewName]=useState("");
  const [adding,setAdding]=useState(false);
  const [selectedTmplId,setSelectedTmplId]=useState("");
  const [confirmDel,setConfirmDel]=useState(null);
  const [busy,setBusy]=useState(false);
  const [templates,setTemplates]=useState([]);
  const [showTmplMgr,setShowTmplMgr]=useState(false);

  const loadUsers=()=>{
    setLoading(true);
    fetch(`${API}?action=get_users&_=${Date.now()}`,{credentials:"same-origin"})
      .then(r=>r.json())
      .then(d=>{if(d.ok)setUsers(d.users||[]);})
      .catch(()=>{})
      .finally(()=>setLoading(false));
  };
  const loadTemplates=()=>{
    fetch(`${API}?action=get_templates&_=${Date.now()}`,{credentials:"same-origin"})
      .then(r=>r.json()).then(d=>{if(d.ok)setTemplates(d.templates||[]);}).catch(()=>{});
  };
  useEffect(()=>{loadUsers();loadTemplates();},[]);

  const addUser=async()=>{
    const name=newName.trim();if(!name)return;
    setBusy(true);
    try{
      const r=await fetch(API,{method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"add_user",name})});
      const d=await r.json();
      if(d.ok){
        if(selectedTmplId){
          const tmpl=templates.find(t=>String(t.id)===String(selectedTmplId));
          if(tmpl){
            // tasks が {text,assignee} オブジェクトの場合は文字列に変換（buildTasks互換）
            const tmplCats=tmpl.cats.map(c=>({...c,tasks:c.tasks.map(t=>typeof t==="string"?t:(t.text||""))}));
            const freshMeta=buildMeta(buildTasks(tmplCats));
            // テンプレートの担当者設定を meta に反映
            buildTasks(tmplCats).forEach(taskObj=>{
              const orig=tmpl.cats[taskObj.ci]?.tasks[taskObj.ti];
              if(orig&&typeof orig==="object"&&orig.assignee){
                freshMeta[taskObj.id]={...freshMeta[taskObj.id],assignee:orig.assignee};
              }
            });
            const snap={profile:{name:"",classroom:"",startYear:"",startMonth:"",endYear:"",endMonth:""},cats:tmplCats,meta:freshMeta,inqs:[newInq()],lecs:[newLec()],savedAt:new Date().toISOString()};
            await fetch(API,{method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"save",user_id:d.user.id,data:snap})});
          }
        }
        setUsers(u=>[...u,d.user]);setNewName("");setAdding(false);setSelectedTmplId("");
      }else alert("追加に失敗しました");
    }catch{alert("通信エラーが発生しました");}
    setBusy(false);
  };

  const deleteUser=async(id)=>{
    setBusy(true);
    try{
      const r=await fetch(API,{method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"delete_user",user_id:id})});
      const d=await r.json();
      if(d.ok){setUsers(u=>u.filter(x=>x.id!==id));setConfirmDel(null);}
      else alert("削除に失敗しました");
    }catch{alert("通信エラーが発生しました");}
    setBusy(false);
  };

  const COLORS=["#3b82f6","#22c55e","#f59e0b","#ec4899","#a855f7","#f97316","#14b8a6","#6366f1","#ef4444","#84cc16"];

  if(showTmplMgr) return <TemplateManagerScreen templates={templates} setTemplates={setTemplates} onBack={()=>setShowTmplMgr(false)}/>;

  return <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#eff6ff 0%,#e0e7ff 50%,#f0fdf4 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}}>
    {confirmDel&&<Confirm msg={`「${confirmDel.display_name}」のデータをすべて削除しますか？\nこの操作は取り消せません。`} onOk={()=>deleteUser(confirmDel.id)} onCancel={()=>setConfirmDel(null)}/>}

    <div style={{width:"100%",maxWidth:480}}>
      {/* タイトル */}
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:68,height:68,background:"linear-gradient(135deg,#3b82f6,#6366f1)",borderRadius:20,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:32,marginBottom:14,boxShadow:"0 8px 24px rgba(99,102,241,.3)"}}>📋</div>
        <h1 style={{fontSize:22,fontWeight:800,color:"#1e293b",letterSpacing:"-0.3px"}}>新入社員研修タスク管理</h1>
        <p style={{fontSize:13,color:"#64748b",marginTop:6}}>あなたの名前を選んでください</p>
      </div>

      {/* ユーザー一覧カード */}
      <div style={{background:"#fff",borderRadius:20,boxShadow:"0 20px 40px rgba(0,0,0,.12)",padding:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{fontSize:13,fontWeight:700,color:"#334155"}}>👥 社員一覧</span>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setShowTmplMgr(true)} style={{fontSize:11,fontWeight:600,padding:"4px 12px",borderRadius:8,border:"1px solid #e2e8f0",background:"#f8fafc",color:"#475569",cursor:"pointer",transition:"all .15s"}}>📝 テンプレート</button>
            <button onClick={()=>setAdding(a=>!a)} style={{fontSize:11,fontWeight:600,padding:"4px 12px",borderRadius:8,border:"1px solid #e2e8f0",background:adding?"#334155":"#3b82f6",color:"#fff",cursor:"pointer",transition:"all .15s"}}>
              {adding?"✕ キャンセル":"＋ 追加"}
            </button>
          </div>
        </div>

        {loading?<div style={{textAlign:"center",padding:"24px 0",color:"#94a3b8",fontSize:13}}>読み込み中…</div>:
        users.length===0?<div style={{textAlign:"center",padding:"24px 0",color:"#94a3b8",fontSize:13}}>社員が登録されていません<br/>「＋ 追加」から登録してください</div>:
        <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:300,overflowY:"auto",marginBottom:16}}>
          {users.map((u,i)=>{
            const col=COLORS[i%COLORS.length];
            return <div key={u.id} style={{display:"flex",alignItems:"center",gap:12}}>
              <button onClick={()=>onSelect(u)}
                style={{flex:1,display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:12,border:"1.5px solid #e2e8f0",background:"#f8fafc",cursor:"pointer",textAlign:"left",transition:"all .15s"}}
                onMouseEnter={e=>e.currentTarget.style.cssText+=";background:#eff6ff;border-color:#bfdbfe"}
                onMouseLeave={e=>e.currentTarget.style.cssText+=";background:#f8fafc;border-color:#e2e8f0"}>
                <div style={{width:36,height:36,borderRadius:10,background:col,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:"#fff",flexShrink:0}}>
                  {u.display_name.charAt(0)}
                </div>
                <span style={{fontWeight:600,fontSize:14,color:"#1e293b"}}>{u.display_name}</span>
              </button>
              <button onClick={()=>setConfirmDel(u)} disabled={busy}
                style={{padding:"8px 12px",borderRadius:10,background:"#fef2f2",border:"1px solid #fecaca",color:"#ef4444",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0}}>
                🗑
              </button>
            </div>;
          })}
        </div>}

        {/* 追加フォーム */}
        {adding&&<div style={{borderTop:users.length?"1px solid #f1f5f9":"none",paddingTop:users.length?12:0,display:"flex",flexDirection:"column",gap:8}}>
          <input className="form-input" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="社員名（例：山田 太郎）" onKeyDown={e=>e.key==="Enter"&&addUser()} autoFocus/>
          <select className="form-input" value={selectedTmplId} onChange={e=>setSelectedTmplId(e.target.value)} style={{color:selectedTmplId?"#1e293b":"#94a3b8"}}>
            <option value="">テンプレートなし（空白で作成）</option>
            {templates.map(t=><option key={t.id} value={t.id}>{t.name}（{t.cats.length}カテゴリ・{t.cats.reduce((s,c)=>s+c.tasks.length,0)}タスク）</option>)}
          </select>
          <div style={{display:"flex",gap:8}}>
            <button onClick={addUser} disabled={busy||!newName.trim()} style={{flex:1,background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"10px 16px",fontSize:13,fontWeight:700,cursor:"pointer",opacity:(!newName.trim()||busy)?.5:1}}>追加</button>
            <button onClick={()=>{setAdding(false);setNewName("");setSelectedTmplId("");}} style={{color:"#94a3b8",fontSize:20,padding:"0 8px"}}>×</button>
          </div>
        </div>}
      </div>
    </div>
  </div>;
}

/* ─ TaskListTab ─ */
function TaskListTab({cats,meta,onToggle,onUpdate,onCatsChange,onMetaChange}){
  const [filt,setFilt]=useState("all");
  const [modal,setModal]=useState(null);
  const [newCat,setNewCat]=useState("");
  const [addTask,setAddTask]=useState({});
  const [newTaskText,setNewTaskText]=useState({});
  const [newTaskAssignee,setNewTaskAssignee]=useState({});
  const [dragSrc,setDragSrc]=useState(null);
  const [dragOver,setDragOver]=useState(null);

  const all=buildTasks(cats);
  const total=all.length,done=all.filter(t=>meta[t.id]?.done).length;

  const addCategory=()=>{
    const name=newCat.trim();if(!name)return;
    onCatsChange(c=>[...c,{category:name,tasks:[]}]);
    setNewCat("");
  };
  const delCategory=ci=>onCatsChange(c=>c.filter((_,i)=>i!==ci));
  const addTaskTocat=(ci)=>{
    const t=(newTaskText[ci]||"").trim();if(!t)return;
    const assignee=(newTaskAssignee[ci]||"").trim();
    const newTi=cats[ci].tasks.length;
    const newId=`t_${ci}_${newTi}_${t.slice(0,3)}`;
    onCatsChange(c=>c.map((cat,i)=>i===ci?{...cat,tasks:[...cat.tasks,t]}:cat));
    onMetaChange({...meta,[newId]:{done:false,assignee,date:""}});
    setNewTaskText(p=>({...p,[ci]:""}));setNewTaskAssignee(p=>({...p,[ci]:""}));setAddTask(p=>({...p,[ci]:false}));
  };
  const delTask=(ci,ti)=>onCatsChange(c=>c.map((cat,i)=>i===ci?{...cat,tasks:cat.tasks.filter((_,j)=>j!==ti)}:cat));

  const onDragStart=(e,id)=>{setDragSrc(id);e.dataTransfer.effectAllowed="move";};
  const onDragOver=(e,id)=>{e.preventDefault();setDragOver(id);};
  const onDrop=(e,targetId)=>{
    e.preventDefault();setDragOver(null);
    if(!dragSrc||dragSrc===targetId)return;
    const all2=buildTasks(cats);
    const si=all2.findIndex(t=>t.id===dragSrc),ti=all2.findIndex(t=>t.id===targetId);
    if(si<0||ti<0)return;
    const src=all2[si],tgt=all2[ti];
    if(src.ci!==tgt.ci)return;
    const ci=src.ci;
    const tasks=[...cats[ci].tasks];
    tasks.splice(si-all2.findIndex(t=>t.ci===ci),1);
    tasks.splice(ti-all2.findIndex(t=>t.ci===ci),0,src.task);
    onCatsChange(c=>c.map((cat,i)=>i===ci?{...cat,tasks}:cat));
    const newMeta={...meta};
    const oldKey=`t_${ci}_${src.ti}_${src.task.slice(0,3)}`;
    const newKey=`t_${ci}_${tasks.indexOf(src.task)}_${src.task.slice(0,3)}`;
    if(oldKey!==newKey&&newMeta[oldKey]){newMeta[newKey]=newMeta[oldKey];delete newMeta[oldKey];}
    onMetaChange(newMeta);
    setDragSrc(null);
  };

  const filters=[["all","すべて"],["done","完了"],["undone","未完了"]];
  const catColorMap={};cats.forEach((c,ci)=>{catColorMap[c.category]=CAT_STYLES[ci%CAT_STYLES.length].color;});

  return <div>
    {modal&&<TaskEditModal {...modal} onClose={()=>setModal(null)} onToggle={onToggle} onUpdate={onUpdate}/>}
    <div className="card" style={{padding:16,marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontWeight:700,fontSize:13,color:"#334155"}}>進捗 {done}/{total}</span>
        <div style={{display:"flex",gap:6}}>
          {filters.map(([k,lbl])=><button key={k} onClick={()=>setFilt(k)} className={"pill"+(filt===k?" active":"")}>{lbl}</button>)}
        </div>
      </div>
      <div className="progress-track"><div className="progress-bar" style={{width:(total?Math.round(done/total*100):0)+"%"}}/></div>
    </div>

    <div className="cat-grid" style={{display:"grid",gridTemplateColumns:"1fr",gap:14}}>
      {cats.map((cat,ci)=>{
        const style=CAT_STYLES[ci%CAT_STYLES.length];
        const catTasks=buildTasks([cat]).map(t=>({...t,id:`t_${ci}_${t.ti}_${t.task.slice(0,3)}`,ci,meta:meta[`t_${ci}_${t.ti}_${t.task.slice(0,3)}`]||{done:false,assignee:"",date:""}}));
        const vis=filt==="done"?catTasks.filter(t=>t.meta.done):filt==="undone"?catTasks.filter(t=>!t.meta.done):catTasks;
        const cdone=catTasks.filter(t=>t.meta.done).length;
        return <div key={ci} className="cat-card" style={{background:style.light,borderColor:style.border}}>
          <div className="cat-header" style={{background:style.color}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontWeight:700,color:"#fff",fontSize:13}}>{cat.category}</span>
              {cat.note&&<span style={{fontSize:10,background:"rgba(255,255,255,.2)",color:"#fff",padding:"1px 6px",borderRadius:999}}>{cat.note}</span>}
              <span style={{fontSize:11,color:"rgba(255,255,255,.7)"}}>{cdone}/{catTasks.length}</span>
            </div>
            <button onClick={()=>delCategory(ci)} style={{color:"rgba(255,255,255,.6)",fontSize:14,padding:"2px 6px",borderRadius:6,background:"rgba(0,0,0,.1)"}}>🗑</button>
          </div>
          <div style={{padding:"8px"}}>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {vis.map(t=><div key={t.id} className={"task-item"+(dragOver===t.id?" drag-over":"")}
                draggable onDragStart={e=>onDragStart(e,t.id)} onDragOver={e=>onDragOver(e,t.id)} onDrop={e=>onDrop(e,t.id)} onDragEnd={()=>{setDragSrc(null);setDragOver(null);}}>
                <div className="task-row">
                  <span className="drag-handle">⠿</span>
                  <div className={"checkbox"+(t.meta.done?" checked":"")} onClick={()=>onToggle(t.id)}>{t.meta.done&&<span className="checkmark">✓</span>}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,color:t.meta.done?"#94a3b8":"#334155",textDecoration:t.meta.done?"line-through":"none",lineHeight:1.5}}>{t.task}</div>
                    {(t.meta.assignee||t.meta.date)&&<div style={{display:"flex",gap:6,marginTop:2,flexWrap:"wrap"}}>
                      {t.meta.assignee&&<span style={{fontSize:10,color:"#64748b"}}>👤{t.meta.assignee}</span>}
                      {t.meta.date&&<span style={{fontSize:10,color:"#94a3b8"}}>📅{t.meta.date}</span>}
                    </div>}
                  </div>
                  <div style={{display:"flex",gap:4,flexShrink:0}}>
                    <button onClick={()=>setModal({taskId:t.id,task:t.task,meta:t.meta})} style={{background:"#eff6ff",color:"#3b82f6",border:"none",borderRadius:6,padding:"3px 8px",fontSize:11,fontWeight:600}}>✏️</button>
                    <button onClick={()=>delTask(ci,t.ti)} style={{background:"#fef2f2",color:"#ef4444",border:"none",borderRadius:6,padding:"3px 8px",fontSize:11}}>🗑</button>
                  </div>
                </div>
              </div>)}
            </div>
            {addTask[ci]?<div style={{display:"flex",flexWrap:"wrap",gap:6,padding:"6px 4px 2px"}}>
              <input className="form-input" style={{fontSize:12,flex:"2 1 120px"}} value={newTaskText[ci]||""} onChange={e=>setNewTaskText(p=>({...p,[ci]:e.target.value}))} placeholder="タスク名を入力" onKeyDown={e=>e.key==="Enter"&&addTaskTocat(ci)} autoFocus/>
              <input className="form-input" style={{fontSize:12,flex:"1 1 72px"}} value={newTaskAssignee[ci]||""} onChange={e=>setNewTaskAssignee(p=>({...p,[ci]:e.target.value}))} placeholder="担当者（任意）" onKeyDown={e=>e.key==="Enter"&&addTaskTocat(ci)}/>
              <button onClick={()=>addTaskTocat(ci)} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"4px 12px",fontSize:12,fontWeight:700,flexShrink:0}}>追加</button>
              <button onClick={()=>setAddTask(p=>({...p,[ci]:false}))} style={{color:"#94a3b8",fontSize:18,padding:"0 4px"}}>×</button>
            </div>:
            <button onClick={()=>setAddTask(p=>({...p,[ci]:true}))} style={{width:"100%",padding:"6px",marginTop:4,borderRadius:8,border:"1.5px dashed "+style.border,color:style.color,fontSize:12,fontWeight:600,background:"transparent"}}>＋ タスクを追加</button>}
          </div>
        </div>;
      })}
    </div>

    <div className="add-cat-box">
      <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:8}}>＋ カテゴリを追加</div>
      <div style={{display:"flex",gap:8}}>
        <input className="form-input" value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="カテゴリ名" onKeyDown={e=>e.key==="Enter"&&addCategory()}/>
        <button onClick={addCategory} style={{background:"#334155",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:12,fontWeight:700,flexShrink:0}}>追加</button>
      </div>
    </div>
  </div>;
}

/* ─ AssigneeTab ─ */
function AssigneeTab({cats,meta,onToggle,onUpdate}){
  const [modal,setModal]=useState(null);
  const [showUnassigned,setShowUnassigned]=useState(false);
  const all=buildTasks(cats);
  const catColorMap={};cats.forEach((c,ci)=>{catColorMap[c.category]=CAT_STYLES[ci%CAT_STYLES.length].color;});
  const groups={};
  all.forEach(t=>{
    const mt=meta[t.id]||{};
    const k=mt.assignee||"__unassigned__";
    if(!groups[k])groups[k]=[];
    groups[k].push({...t,meta:mt});
  });
  const assignees=Object.keys(groups).filter(k=>k!=="__unassigned__").sort();
  const unassigned=groups["__unassigned__"]||[];

  return <div>
    {modal&&<TaskEditModal {...modal} onClose={()=>setModal(null)} onToggle={onToggle} onUpdate={onUpdate}/>}
    {!assignees.length&&!unassigned.length&&<div style={{textAlign:"center",color:"#94a3b8",padding:"32px 0",fontSize:13}}>担当者が設定されていません</div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:14}}>
      {assignees.map(k=>{
        const tasks=groups[k];const done=tasks.filter(t=>t.meta.done).length;const vis=tasks;
        return <div key={k} style={{background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden",boxShadow:"0 2px 6px rgba(0,0,0,.06)"}}>
          <div style={{background:"linear-gradient(135deg,#334155,#475569)",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontWeight:700,color:"#fff",fontSize:13}}>👤 {k}</span>
            <span style={{color:"rgba(255,255,255,.6)",fontSize:11}}>{done}/{tasks.length}</span>
          </div>
          <div style={{padding:"8px",display:"flex",flexDirection:"column",gap:4}}>
            {vis.map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,border:"1px solid #f1f5f9",background:t.meta.done?"#f8fafc":"#fff",opacity:t.meta.done?.7:1}}>
              <div className={"checkbox"+(t.meta.done?" checked":"")} onClick={()=>onToggle(t.id)}>{t.meta.done&&<span className="checkmark">✓</span>}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,color:t.meta.done?"#94a3b8":"#334155",textDecoration:t.meta.done?"line-through":"none",lineHeight:1.5}}>{t.task}</div>
                <div style={{display:"flex",gap:6,marginTop:3,flexWrap:"wrap"}}>
                  <span style={{fontSize:10,padding:"1px 6px",borderRadius:999,background:catColorMap[t.category]||"#94a3b8",color:"#fff"}}>{t.category}</span>
                  {t.meta.date&&<span style={{fontSize:10,color:"#94a3b8"}}>📅 {t.meta.date}</span>}
                </div>
              </div>
              <button onClick={()=>setModal({taskId:t.id,task:t.task,meta:t.meta})} style={{background:"#eff6ff",color:"#3b82f6",border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer",flexShrink:0}}>✏️ 編集</button>
            </div>)}
          </div>
        </div>;
      })}
    </div>
    {unassigned.length>0&&<div style={{marginTop:14}}>
      <button onClick={()=>setShowUnassigned(s=>!s)} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,color:"#64748b",cursor:"pointer",marginBottom:10}}>
        {showUnassigned?"▲":"▼"} 担当者未設定 ({unassigned.length}件)
      </button>
      {showUnassigned&&<div style={{display:"flex",flexDirection:"column",gap:4}}>
        {unassigned.map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:8,border:"1px solid #f1f5f9",background:t.meta.done?"#f8fafc":"#fff",opacity:t.meta.done?.7:1}}>
          <div className={"checkbox"+(t.meta.done?" checked":"")} onClick={()=>onToggle(t.id)}>{t.meta.done&&<span className="checkmark">✓</span>}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,color:t.meta.done?"#94a3b8":"#334155",textDecoration:t.meta.done?"line-through":"none"}}>{t.task}</div>
            <span style={{fontSize:10,padding:"1px 6px",borderRadius:999,background:catColorMap[t.category]||"#94a3b8",color:"#fff",marginTop:3,display:"inline-block"}}>{t.category}</span>
          </div>
          <button onClick={()=>setModal({taskId:t.id,task:t.task,meta:t.meta})} style={{background:"#eff6ff",color:"#3b82f6",border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer",flexShrink:0}}>✏️ 編集</button>
        </div>)}
      </div>}
    </div>}
  </div>;

/* ─ CalendarTab ─ */
function CalendarTab({cats,meta,onToggle,onUpdate}){
  const today=new Date();
  const [yr,setYr]=useState(today.getFullYear()),[mo,setMo]=useState(today.getMonth());
  const [modal,setModal]=useState(null);
  const [selDay,setSelDay]=useState(null);
  const all=buildTasks(cats);
  const catColorMap={};cats.forEach((c,ci)=>{catColorMap[c.category]=CAT_STYLES[ci%CAT_STYLES.length].color;});
  const byDate=useMemo(()=>{const m={};all.forEach(t=>{const mt=meta[t.id]||{};if(mt.date){if(!m[mt.date])m[mt.date]=[];m[mt.date].push({...t,meta:mt});}});return m;},[all,meta]);
  const fd=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  const cells=[...Array(fd).fill(null),...Array.from({length:dim},(_,i)=>i+1)];
  const prev=()=>{if(mo===0){setYr(y=>y-1);setMo(11);}else setMo(m=>m-1);};
  const next=()=>{if(mo===11){setYr(y=>y+1);setMo(0);}else setMo(m=>m+1);};
  const selDs=selDay?`${yr}-${String(mo+1).padStart(2,"0")}-${String(selDay).padStart(2,"0")}`:null;
  const selTasks=selDs?byDate[selDs]||[]:[];
  return <div>
    {modal&&<TaskEditModal {...modal} onClose={()=>setModal(null)} onToggle={onToggle} onUpdate={onUpdate}/>}
    <div className="card" style={{padding:16,marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <button onClick={prev} style={{background:"#f1f5f9",border:"none",borderRadius:8,padding:"6px 12px",fontSize:13,cursor:"pointer",fontWeight:700,color:"#475569"}}>◀</button>
        <span style={{fontWeight:700,fontSize:15,color:"#1e293b"}}>{yr}年 {mo+1}月</span>
        <button onClick={next} style={{background:"#f1f5f9",border:"none",borderRadius:8,padding:"6px 12px",fontSize:13,cursor:"pointer",fontWeight:700,color:"#475569"}}>▶</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
        {["日","月","火","水","木","金","土"].map((d,i)=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,padding:"4px 0",color:i===0?"#ef4444":i===6?"#3b82f6":"#94a3b8"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {cells.map((d,i)=>{
          if(!d)return<div key={`e${i}`}/>;
          const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`,dt=byDate[ds]||[];
          const isToday=d===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();
          const isSel=d===selDay,dow=(fd+d-1)%7;
          return <div key={d} onClick={()=>setSelDay(d===selDay?null:d)}
            style={{minHeight:58,borderRadius:8,padding:4,border:isSel?"2px solid #3b82f6":isToday?"2px solid #93c5fd":"1px solid #f1f5f9",background:isSel?"#dbeafe":isToday?"#eff6ff":"#f8fafc",cursor:"pointer",transition:"all .15s"}}>
            <div style={{fontSize:11,fontWeight:700,marginBottom:2,color:dow===0?"#ef4444":dow===6?"#3b82f6":"#475569"}}>{d}</div>
            {dt.slice(0,2).map(t=><div key={t.id} className="cal-chip" style={{background:catColorMap[t.category]||"#94a3b8",opacity:t.meta.done?.5:1,textDecoration:t.meta.done?"line-through":"none"}}>{t.task.length>5?t.task.slice(0,5)+"…":t.task}</div>)}
            {dt.length>2&&<div style={{fontSize:9,color:"#94a3b8"}}>+{dt.length-2}</div>}
          </div>;
        })}
      </div>
    </div>
    {selDay&&<div className="card" style={{padding:16}}>
      <div style={{fontWeight:700,fontSize:13,color:"#334155",marginBottom:12}}>📅 {yr}年{mo+1}月{selDay}日（{selTasks.length}件）</div>
      {!selTasks.length?<div style={{textAlign:"center",color:"#94a3b8",fontSize:12,padding:"16px 0"}}>この日のタスクはありません</div>:
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {selTasks.map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",borderRadius:10,border:"1px solid #f1f5f9",background:t.meta.done?"#f8fafc":"#fff",opacity:t.meta.done?.7:1}}>
            <div className={"checkbox"+(t.meta.done?" checked":"")} onClick={()=>onToggle(t.id)}>{t.meta.done&&<span className="checkmark">✓</span>}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,color:t.meta.done?"#94a3b8":"#334155",textDecoration:t.meta.done?"line-through":"none"}}>{t.task}</div>
              <div style={{display:"flex",gap:6,marginTop:3}}>
                <span style={{fontSize:10,padding:"1px 6px",borderRadius:999,background:catColorMap[t.category]||"#94a3b8",color:"#fff"}}>{t.category}</span>
                {t.meta.assignee&&<span style={{fontSize:10,color:"#94a3b8"}}>👤{t.meta.assignee}</span>}
              </div>
            </div>
            <button onClick={()=>setModal({taskId:t.id,task:t.task,meta:t.meta})} style={{background:"#eff6ff",color:"#3b82f6",border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer",flexShrink:0}}>✏️ 編集</button>
          </div>)}
        </div>}
    </div>}
  </div>;
}

function LectureTab({lecs,setLecs}){
  const [confId,setConfId]=useState(null);
  const add=()=>setLecs(r=>[...r,newLec()]);
  const del=id=>{setLecs(r=>r.filter(x=>x.id!==id));setConfId(null);};
  const upd=u=>setLecs(r=>r.map(x=>x.id===u.id?u:x));
  const grand=lecs.reduce((acc,row)=>{const sub=SUBS.reduce((s,su)=>s+n(row[su.toLowerCase()+"Koma"]),0);return acc+taxIn(calcP(row.unitPrice,sub))+taxIn(n(row.materialFee));},0);
  const cr=confId?lecs.find(r=>r.id===confId):null;
  return <div>
    {confId&&<Confirm msg={`「${cr?.name||"この案件"}」を削除しますか？`} onOk={()=>del(confId)} onCancel={()=>setConfId(null)}/>}
    <div className="card" style={{padding:16,marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:grand?8:0}}>
        <span style={{fontWeight:700,fontSize:13,color:"#334155"}}>📚 講習面談（{lecs.length}件）</span>

      </div>
      {grand>0&&<div style={{fontSize:13,color:"#475569"}}>全体合計（税込）：<span style={{fontSize:20,fontWeight:700,color:"#4338ca"}}>  {yen(grand)}</span></div>}
    </div>
    {lecs.map(row=><LecRow key={row.id} row={row} onChange={upd} onDelete={id=>setConfId(id)}/>)}
  </div>;
}

/* ─ App ─ */
function App(){
  // screen: "loading" | "userSelect" | "main"
  const [screen,setScreen]=useState("loading");
  const [currentUser,setCurrentUser]=useState(null); // {id, display_name}

  const [editProf,setEditProf]=useState(false);
  const [profile,setProfile]=useState({name:"",classroom:"",startYear:"",startMonth:"",endYear:"",endMonth:""});
  const [cats,setCats]=useState(INIT_CATS);
  const [meta,setMeta]=useState(()=>buildMeta(buildTasks(INIT_CATS)));
  const [inqs,setInqs]=useState([newInq()]);
  const [lecs,setLecs]=useState([newLec()]);
  const [tab,setTab]=useState("list");

  const [cloudStatus,setCloudStatus]=useState("idle");
  const [toast,setToast]=useState("");
  const saveTimer=useRef(null);
  const toastTimer=useRef(null);
  const initDone=useRef(false);

  const showToast=msg=>{
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current=setTimeout(()=>setToast(""),2500);
  };

  /* 初期画面：ユーザー選択へ */
  useEffect(()=>{setScreen("userSelect");},[]);

  /* ユーザー選択 → データロード */
  const handleSelectUser=async(user)=>{
    initDone.current=false;
    setCurrentUser(user);
    setCloudStatus("idle");
    // データリセット
    const freshMeta=buildMeta(buildTasks(INIT_CATS));
    setCats(INIT_CATS);setMeta(freshMeta);setInqs([newInq()]);setLecs([newLec()]);
    setProfile({name:"",classroom:"",startYear:"",startMonth:"",endYear:"",endMonth:""});
    try{
      const r=await fetch(`${API}?action=load&user_id=${user.id}&_=${Date.now()}`,{credentials:"same-origin"});
      const d=await r.json();
      if(d.ok&&d.data){
        if(d.data.profile)setProfile(d.data.profile);
        if(d.data.cats)setCats(d.data.cats);
        if(d.data.meta)setMeta(d.data.meta);
        if(d.data.inqs)setInqs(d.data.inqs);
        if(d.data.lecs)setLecs(d.data.lecs);
      }
    }catch(e){}
    setTimeout(()=>{initDone.current=true;},500);
    setScreen("main");
  };

  /* ユーザー切替 */
  const handleSwitch=()=>{
    clearTimeout(saveTimer.current);
    initDone.current=false;
    setCurrentUser(null);
    setScreen("userSelect");
  };

  /* 変更時オートセーブ（デバウンス 1.5秒）*/
  useEffect(()=>{
    if(!initDone.current||!currentUser)return;
    clearTimeout(saveTimer.current);
    setCloudStatus("saving");
    const snap={profile,cats,meta,inqs,lecs,savedAt:new Date().toISOString()};
    saveTimer.current=setTimeout(()=>{
      fetch(API,{
        method:"POST",credentials:"same-origin",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"save",user_id:currentUser.id,data:snap})
      })
      .then(r=>r.json())
      .then(d=>setCloudStatus(d.ok?"saved":"error"))
      .catch(()=>setCloudStatus("error"));
    },1500);
  },[profile,cats,meta,inqs,lecs]);

  const getSnap=()=>({profile,cats,meta,inqs,lecs,savedAt:new Date().toISOString()});
  const loadSnap=d=>{
    try{
      if(d.profile)setProfile(d.profile);
      if(d.cats)setCats(d.cats);
      if(d.meta)setMeta(d.meta);
      if(d.inqs)setInqs(d.inqs);
      if(d.lecs)setLecs(d.lecs);
    }catch(e){}
  };
  const saveProf=p=>{setProfile(p);setEditProf(false);};
  const toggleT=id=>setMeta(m=>({...m,[id]:{...m[id],done:!m[id]?.done}}));
  const updateT=(id,k,v)=>setMeta(m=>({...m,[id]:{...m[id],[k]:v}}));

  const all=buildTasks(cats);
  const total=all.length,done=all.filter(t=>meta[t.id]?.done).length,pct=total?Math.round(done/total*100):0;
  const TABS=[["list","📋","タスク一覧"],["assignee","👥","担当者別"],["calendar","📅","カレンダー"],["inquiry","🗒","新規面談"],["lecture","📚","講習面談"]];

  if(screen==="loading") return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f1f5f9"}}>
      <div style={{fontSize:13,color:"#94a3b8"}}>読み込み中…</div>
    </div>
  );

  if(screen==="userSelect") return <UserSelectScreen onSelect={handleSelectUser}/>;

  return(
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
      {/* Header */}
      <div className="app-header">
        <div style={{maxWidth:896,margin:"0 auto",padding:"12px 16px 0"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div>
              <div style={{fontWeight:800,fontSize:15,color:"#1e293b",letterSpacing:"-0.2px"}}>📋 研修タスク管理</div>
              <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>
                {currentUser&&<span style={{marginRight:8,fontWeight:600,color:"#3b82f6"}}>👤 {currentUser.display_name}</span>}
                {profile.classroom&&<span style={{marginRight:8}}>🏫 {profile.classroom}</span>}
                {profile.startYear&&<span>📅 {profile.startYear}{profile.startMonth} ～ {profile.endYear}{profile.endMonth}</span>}
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:11,color:"#94a3b8",marginBottom:3}}>{done}/{total}</div>
                <div style={{width:72,background:"#e2e8f0",borderRadius:999,height:8,overflow:"hidden"}}>
                  <div style={{width:pct+"%",height:"100%",background:"linear-gradient(90deg,#4ade80,#22c55e)",borderRadius:999,transition:"width .4s"}}/>
                </div>
              </div>
              <button onClick={()=>setEditProf(true)} style={{background:"#f1f5f9",border:"none",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:600,color:"#475569",cursor:"pointer"}}>編集</button>
            </div>
          </div>
          <SaveLoadBar
            userName={currentUser?.display_name}
            getSnapshot={getSnap}
            onLoad={loadSnap}
            cloudStatus={cloudStatus}
            onSwitch={handleSwitch}
          />
          <div className="tab-bar">
            {TABS.map(([k,icon,lbl])=><button key={k} onClick={()=>setTab(k)} className={"tab-btn"+(tab===k?" active":"")}>{icon} {lbl}</button>)}
          </div>
        </div>
      </div>

      {editProf&&<div className="modal-overlay">
        <div className="modal-box">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <span style={{fontWeight:700,fontSize:15}}>研修情報の編集</span>
            <button onClick={()=>setEditProf(false)} style={{fontSize:20,color:"#94a3b8"}}>×</button>
          </div>
          <ProfileForm profile={profile} onSave={saveProf}/>
        </div>
      </div>}

      <div style={{maxWidth:896,margin:"0 auto",padding:"16px"}}>
        {tab==="list"&&<TaskListTab cats={cats} meta={meta} onToggle={toggleT} onUpdate={updateT} onCatsChange={setCats} onMetaChange={setMeta}/>}
        {tab==="assignee"&&<AssigneeTab cats={cats} meta={meta} onToggle={toggleT} onUpdate={updateT}/>}
        {tab==="calendar"&&<CalendarTab cats={cats} meta={meta} onToggle={toggleT} onUpdate={updateT}/>}
        {tab==="inquiry"&&<InquiryTab inqs={inqs} setInqs={setInqs}/>}
        {tab==="lecture"&&<LectureTab lecs={lecs} setLecs={setLecs}/>}
      </div>

      <Toast msg={toast}/>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
